    }
    var floorDotsContainer = document.getElementById('raveFloorDotsContainer');
    if (floorDotsContainer && floorDotsContainer.object3D.visible) {
      var dots = floorDotsContainer.querySelectorAll('[id^="raveFloorDot"]');
      for (var d = 0; d < dots.length; d++) {
        var dot = dots[d];
        var c = dot.getAttribute('data-dot-color') || '#ff00e5';
        var ei = 0.3 + accentLevel * 1.4;
        var op = 0.4 + accentLevel * 0.5;
        dot.setAttribute('material', 'emissive:' + c + ';emissiveIntensity:' + ei + ';metalness:0;roughness:0.5;side:double;transparent:true;opacity:' + op);
      }
    }
    // Animate each laser wrapper so beams pivot from their bases (faster swing)
    var t = time / 1000;
    var swayY = 28 * Math.sin(t * 1.4);
    var swayX = 18 * Math.sin(t * 1.05 + 1);
    for (var i = 0; i < 12; i++) {
      var wrap = document.getElementById('raveLaserWrap' + (i + 1));
      if (!wrap) continue;
      var cfg = typeof RAVE_LASER_CONFIGS !== 'undefined' && RAVE_LASER_CONFIGS[i] ? RAVE_LASER_CONFIGS[i] : null;
      if (!cfg) continue;
      var base = (cfg.rotation || '0 0 0').split(' ').map(parseFloat);
      var rx = (base[0] || 0) + swayX;
      var ry = (base[1] || 0) + swayY;
      var rz = base[2] || 0;
      wrap.setAttribute('rotation', rx + ' ' + ry + ' ' + rz);
    }
    // Pulse half the lasers (light-harp style: flowing intensity + opacity)
    var pulsePhase = time / 1200;
    for (var p = 0; p < 12; p += 2) {
      var cyl = document.getElementById('raveLaser' + (p + 1));
      if (!cyl) continue;
      var flow = 0.45 + 0.5 * Math.sin(pulsePhase + p * 0.7) + 0.2 * Math.sin(pulsePhase * 2.2 + p);
      var opacity = 0.28 + 0.22 * Math.sin(pulsePhase * 1.3 + p * 0.5);
      var intensity = Math.max(0.08, (_raveLaserIntensities[p] || 0.1) * flow);
      var color = (RAVE_LASER_CONFIGS[p] && RAVE_LASER_CONFIGS[p].color) || '#ff00e5';
      cyl.setAttribute('material', 'emissive:' + color + ';emissiveIntensity:' + intensity + ';metalness:0;roughness:0.5;side:double;transparent:true;opacity:' + opacity);
    }
    // Slower rotation so smoke drifts gently
    var smokeContainer = document.getElementById('raveSmokeContainer');
    if (smokeContainer) {
      var rot = smokeContainer.getAttribute('rotation') || { x: 0, y: 0, z: 0 };
      var y = (typeof rot.y === 'number' ? rot.y : 0) + timeDelta * 0.018;
      smokeContainer.setAttribute('rotation', (rot.x || 0) + ' ' + (y % 360) + ' ' + (rot.z || 0));
    }
    // When sequencer is stopped, still pulse lights/lasers to BPM (club mode)
    if (!state.isPlaying && typeof onRaveBeat === 'function') {
      const tempo = Math.max(1, state.tempo || 120);
      const stepIntervalMs = 60000 / tempo / 4; // 16th note in ms (this project's tick uses ms: see time/1000 for audio)
      if (!this._raveLastBeatTime) this._raveLastBeatTime = time;
      let catchUpCount = 0;
      const maxCatchUpPerFrame = 32;
      while (time >= this._raveLastBeatTime + stepIntervalMs && catchUpCount < maxCatchUpPerFrame) {
        this._raveVirtualStep = ((this._raveVirtualStep || 0) + 1) % 64;
        onRaveBeat(this._raveVirtualStep);
        this._raveLastBeatTime += stepIntervalMs;
        catchUpCount++;
      }
      if (catchUpCount >= maxCatchUpPerFrame) this._raveLastBeatTime = time;
    }
  } else {
    this._raveLastBeatTime = 0;
    this._raveVirtualStep = 0;
  }
  // Tape: wow/flutter on playback
  if (tapePlaybackSource && tapePlaybackSource.source && tapeState.deck2 && tapeState.deck2.playing) {
    applyTapeWowFlutter();
  }
  // Tape mode: counter, spindle rotation, display updates (throttle to every 2nd frame to save CPU)
  if (state.tapeMode) {
    this._tapeTickCount = (this._tapeTickCount || 0) + 1;
    var dt = timeDelta / 1000;
    [1, 2].forEach(function(deckIdx) {
      var d = tapeState['deck' + deckIdx];
      if (!d) return;
      var active = !d.doorOpen && (d.playing || d.recording || d.ff || d.rw || state.isPlaying);
      var speed = d.ff ? 16 : d.rw ? -16 : (d.playing || d.recording || state.isPlaying) ? 1 : 0;
      if (d.ff || d.rw) {
        if (active && speed !== 0) d.counter += speed * dt * 2;
        d.counterTarget = d.counter;
      } else if (state.isPlaying) {
        d.counter = Math.floor(state.currentStep / 16);
      } else if (active && speed !== 0) {
        d.counter += speed * dt * 2;
        d.counterTarget = d.counter;
      }
      d.counter = Math.max(0, Math.min(9999, d.counter));
      // Spindle: wrapper has no tilt; rotation.z only = spin clockwise/anticlockwise as you look at cassette
      var degPerSec = (d.ff ? 720 : d.rw ? -720 : (d.playing || d.recording) ? 180 : 0);
      if (degPerSec !== 0 && !d.doorOpen) {
        [1, 2].forEach(function(reelNum) {
          var spindle = document.getElementById('tapeSpindle' + deckIdx + '-' + reelNum);
          if (spindle) {
            var rot = spindle.getAttribute('rotation') || { x: 0, y: 0, z: 0 };
            var parts = typeof rot === 'object' ? [rot.x, rot.y, rot.z] : String(rot).split(' ').map(parseFloat);
            var sign = -1;
            var rz = (parts[2] || 0) + degPerSec * dt * sign;
            spindle.setAttribute('rotation', '0 0 ' + rz);
          }
        });
      }
    });
    if (this._tapeTickCount % 2 === 0) {
      if (typeof updateTapeDeckDisplays === 'function') updateTapeDeckDisplays();
      if (typeof updateTapeButtonHighlight === 'function') updateTapeButtonHighlight();
      if (typeof lightUpTapeDeckButtons === 'function') lightUpTapeDeckButtons();
      if (typeof updateTapeModeButtons === 'function') updateTapeModeButtons();
    }
  }

  // Run oscilloscope on seq page every 5 frames even when not playing (so piano keys move it)
  this._oscFrameCount = (this._oscFrameCount || 0) + 1;
  if (state.currentPage === 'seq' && this._oscFrameCount % 5 === 0) {
    updateOsc();
  }

  // If not playing, reset timer and clear high-res driver, skip the rest
  if (!state.isPlaying) {
    this.nextStepTime = 0;
    this._lastRenderedStep = -1;
    this._lastRenderedStepView = -1;
    if (this._stepClockIntervalId) {
      clearInterval(this._stepClockIntervalId);
      this._stepClockIntervalId = null;
    }
    return;
  }

  // Use AudioContext time for step timing so audio stays tight when main thread is busy
  const currentTime = (audioContext && audioContext.state !== 'suspended') ? audioContext.currentTime : (time / 1000);
  if (audioContext && audioContext.state === 'suspended' && state.isPlaying) {
    audioContext.resume().catch(function() {});
  }

  if (this.nextStepTime === 0) {
    this.nextStepTime = currentTime;
  }

  const stepInterval = 60.0 / state.tempo / 4.0;
  const chordLineActive = state.drumReduceOn && (state.chordLineArpOn || state.chordLineChordOn || state.chordLineStringsOn);

  // High-resolution step driver: always when playing (not tied to 60fps) for consistent audio timing
  const stepDriverIntervalMs = 4;
  const lookaheadSec = 0.012;
  if (!this._stepClockIntervalId && audioContext) {
    const self = this;
    this._stepClockIntervalId = setInterval(function stepClockTick() {
      if (!state.isPlaying) {
        if (self._stepClockIntervalId) {
          clearInterval(self._stepClockIntervalId);
          self._stepClockIntervalId = null;
        }
        return;
      }
      const interval = 60.0 / (state.tempo || 120) / 4.0;
      const now = (audioContext && audioContext.state !== 'suspended') ? audioContext.currentTime : 0;
      if (now >= self.nextStepTime - lookaheadSec) {
        if (now - self.nextStepTime > interval * 6) self.nextStepTime = now;
        playStep(self.nextStepTime);
        const stepJustPlayed = (state.currentStep - 1 + 64) % 64;
        const stepInBar = stepJustPlayed % 16;
        const isFirstSixteenthOfEighth = (stepInBar % 2) === 0;
        const shuffle = (state.timeSignature68 && isFirstSixteenthOfEighth) ? interval * 0.65 : 0;
        self.nextStepTime += interval + shuffle;
      }
    }, stepDriverIntervalMs);
  }

  // When high-res driver is active, tick does not run the step loop (interval drives it); only view updates
  const useHighResStepDriver = !!this._stepClockIntervalId;
  if (!useHighResStepDriver) {
    const maxStepsPerFrame = 4;
    var stepsThisFrame = 0;
    if (currentTime - this.nextStepTime > stepInterval * 8) this.nextStepTime = currentTime;
    while (currentTime >= this.nextStepTime && stepsThisFrame < maxStepsPerFrame) {
      playStep(this.nextStepTime);
      stepsThisFrame++;
      const stepJustPlayed = (state.currentStep - 1 + 64) % 64;
      const stepInBar = stepJustPlayed % 16;
      const isFirstSixteenthOfEighth = (stepInBar % 2) === 0;
      const shuffle = (state.timeSignature68 && isFirstSixteenthOfEighth) ? stepInterval * 0.65 : 0;
      this.nextStepTime += stepInterval + shuffle;
    }
  }

  // Only update view if not in block mode
  if (!state.playBlockMode) {
    const playheadView = Math.floor(state.currentStep / 16);
    if (playheadView !== state.currentStepView) {
      state.currentStepView = playheadView;
    }
  }

  // Only run step UI updates when step or view actually changed (big CPU save: ~60fps -> ~4–8 updates per beat)
  const stepChanged = (this._lastRenderedStep !== state.currentStep) || (this._lastRenderedStepView !== state.currentStepView);
  if (stepChanged) {
    this._lastRenderedStep = state.currentStep;
    this._lastRenderedStepView = state.currentStepView;
    updateSteps();
    if (state.currentPage === 'drum') updateDrumSeqSteps();
    if (state.currentPage === 'chord') updateChordSteps();
    if (state.currentPage === 'song') updateSongSlots();
    ensureLitButtonsHaveDarkText();
    updatePageButtonsHighlight();
  }

}
});

// Function to dynamically scan GitHub folder for JPEG skyboxes
async function loadSkyboxesFromGitHub() {
  try {
    console.log('🔍 Scanning GitHub folder for JPEG skyboxes...');
    const response = await fetch('https://api.github.com/repos/pixelblip/vrsequencer/contents/');
    if (!response.ok) {
      throw new Error(`GitHub API error: ${response.status}`);
    }
    const files = await response.json();
    console.log(`📁 GitHub API returned ${files.length} items`);
    
    // Filter for JPEG/PNG files (case-insensitive)
    const imageFiles = files.filter(file => 
      file.type === 'file' && 
      (file.name.toLowerCase().endsWith('.jpeg') || file.name.toLowerCase().endsWith('.jpg') || file.name.toLowerCase().endsWith('.png'))
    );
    
    // Sort alphabetically for consistent ordering
    imageFiles.sort((a, b) => a.name.localeCompare(b.name));
    
    // Skip first 3 files in folder - they are not skyboxes
    const SKIP_SKYBOX_FILES = 3;
    const jpegFiles = imageFiles.length <= SKIP_SKYBOX_FILES ? [] : imageFiles.slice(SKIP_SKYBOX_FILES);
    
    console.log(`✅ Found ${imageFiles.length} image files, using ${jpegFiles.length} as skyboxes (skipped first ${SKIP_SKYBOX_FILES}):`, jpegFiles.map(f => f.name));
    
    if (jpegFiles.length === 0) {
      console.warn('⚠️ No skybox images after skipping first ' + SKIP_SKYBOX_FILES);
      skyboxUrls = [];
      return 0;
    }
    
    // Build skyboxUrls array - try direct URLs first
    // If CORS fails, we'll use a proxy
    skyboxUrls = jpegFiles.map(file => {
      // Use direct GitHub raw URL - these should work with CORS
      return file.download_url;
    });
    console.log(`📋 Skybox URLs (${skyboxUrls.length}):`, skyboxUrls);
    
    // Test if images load (check CORS)
    if (skyboxUrls.length > 0) {
      const testImg = new Image();
      testImg.crossOrigin = 'anonymous';
      testImg.onload = () => {
        console.log('✅ Test: Image loads with CORS:', skyboxUrls[0]);
      };
      testImg.onerror = () => {
        console.warn('⚠️ Test: Image failed with CORS, will use proxy if needed');
      };
      testImg.src = skyboxUrls[0];
    }
    
    // Create <img> elements in <a-assets> - this is what was working before!
    const assetsEl = document.getElementById('skyboxAssets');
    if (!assetsEl) {
      console.error('❌ skyboxAssets element not found!');
      const scene = document.getElementById('mainScene');
      if (scene) {
        let assets = scene.querySelector('a-assets');
        if (!assets) {
          assets = document.createElement('a-assets');
          assets.id = 'skyboxAssets';
          scene.insertBefore(assets, scene.firstChild);
        } else {
          assets.id = 'skyboxAssets';
        }
        // Retry
        const retryAssets = document.getElementById('skyboxAssets');
        if (retryAssets) {
          jpegFiles.forEach((file, index) => {
            const img = document.createElement('img');
            img.id = 'skybox-img-' + index;
            img.crossOrigin = 'anonymous'; // Set BEFORE src
            img.onload = () => console.log(`  ✅ Loaded skybox-img-${index}: ${file.name}`);
            img.onerror = () => console.error(`  ❌ Failed skybox-img-${index}: ${file.name}`);
            img.src = file.download_url;
            retryAssets.appendChild(img);
            console.log(`  📥 Added skybox-img-${index}: ${file.name}`);
          });
          await new Promise(resolve => setTimeout(resolve, 2000));
        }
      }
    } else {
      // Clear any existing skybox images
      const existing = assetsEl.querySelectorAll('img[id^="skybox-img-"]');
      existing.forEach(img => img.remove());
      
      // Add new images and wait for them to load
      const sceneEl = document.getElementById('mainScene');
      const imagePromises = [];
      
      jpegFiles.forEach((file, index) => {
        const img = document.createElement('img');
        img.id = 'skybox-img-' + index;
        
        // Don't set crossOrigin - GitHub raw URLs might not support it
        // Try without it first (many servers work without explicit CORS)
        
        const loadPromise = new Promise((resolve) => {
          img.onload = function() {
            if (this.naturalWidth > 0) {
              console.log(`  ✅ Loaded skybox-img-${index}: ${file.name} (${this.naturalWidth}x${this.naturalHeight})`);
              resolve(true);
            } else {
              console.error(`  ❌ skybox-img-${index} loaded but 0 width: ${file.name}`);
              resolve(false);
            }
          };
          img.onerror = function() {
            console.error(`  ❌ Failed to load skybox-img-${index}: ${file.name}`);
            console.error(`     URL: ${file.download_url}`);
            resolve(false);
          };
        });
        
        img.src = file.download_url;
        assetsEl.appendChild(img);
        imagePromises.push(loadPromise);
        console.log(`  📥 Adding skybox-img-${index}: ${file.name}`);
      });
      
      console.log(`✅ Created ${jpegFiles.length} skybox image assets, waiting for load...`);
      
      // Wait for all images to load (or fail)
      const results = await Promise.allSettled(imagePromises);
      const loadedCount = results.filter(r => r.value === true).length;
      console.log(`✅ ${loadedCount}/${jpegFiles.length} images loaded successfully`);
      
      // Force A-Frame to update assets
      if (sceneEl && sceneEl.systems && sceneEl.systems.assets) {
        sceneEl.systems.assets.update();
        console.log('✅ Triggered A-Frame assets update');
      }
    }
    
    return jpegFiles.length;
  } catch (err) {
    console.error('❌ Failed to load skyboxes from GitHub:', err);
    console.error('Error details:', err.message, err.stack);
    // Fallback to empty array - skybox will be disabled
    skyboxUrls = [];
    return 0;
  }
}

document.addEventListener('keydown', (e) => {
  // Don't intercept if typing in an input
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
 
  const key = e.key.toLowerCase();
 
  // ═══════════════════════════════════════════════════════════════════════
  // UNIVERSAL CONTROLS (ALL PAGES)
  // ═══════════════════════════════════════════════════════════════════════
 
 // SPACEBAR - Play/Stop (ALL PAGES). Start from current block to end of pattern.
if (key === ' ') {
  e.preventDefault();
  if (state.isPlaying) {
    state.isPlaying = false;
    state.arrangementMode = false;
    stopAllSources();
    showMessage('⏹ STOPPED');
  } else {
    state.isPlaying = true;
    state.arrangementMode = true;
    state.currentArrangementIndex = ui.selectedSongSlot || 0;
    const patLen = patterns[state.currentPattern] ? patterns[state.currentPattern].length : 64;
    state.currentStep = Math.min(state.currentStepView * 16, Math.max(0, patLen - 1));
    if (audioContext) nextNoteTime = audioContext.currentTime;
    showMessage('▶ PLAY');
  }
  updateUI();
  return;
}
 
  // ARROW KEYS - Navigation (ALL PAGES)
  if (key === 'arrowleft') {
    e.preventDefault();
    state.highlightedStep = Math.max(0, state.highlightedStep - 1);
    const newView = Math.floor(state.highlightedStep / 16);
    if (newView !== state.currentStepView) state.currentStepView = newView;
    updateSteps();
    if (state.currentPage === 'chord') updateChordSteps();
    if (state.currentPage === 'drum') updateDrumSeqSteps();
    updateHUD();
    return;
  }
 
  if (key === 'arrowright') {
    e.preventDefault();
    state.highlightedStep = Math.min(patterns[state.currentPattern].length - 1, state.highlightedStep + 1);
    const newView = Math.floor(state.highlightedStep / 16);
    if (newView !== state.currentStepView) state.currentStepView = newView;
    updateSteps();
    if (state.currentPage === 'chord') updateChordSteps();
    if (state.currentPage === 'drum') updateDrumSeqSteps();
    updateHUD();
    return;
  }
 
  if (key === 'arrowup') {
    e.preventDefault();
    if (state.currentPage !== 'chord') {
      state.currentTrack = Math.max(0, state.currentTrack - 1);
      if (state.currentTrack === 0) state.selectedDrum = 'kick';
      updateUI();
      updateSteps();
      showMessage(`TRACK: ${trackNames[state.currentTrack]}`);
    }
    return;
  }
 
  if (key === 'arrowdown') {
    e.preventDefault();
    if (state.currentPage !== 'chord') {
      state.currentTrack = Math.min(4, state.currentTrack + 1);
      updateUI();
      updateSteps();
      showMessage(`TRACK: ${trackNames[state.currentTrack]}`);
    }
    return;
  }
 
  // ═══════════════════════════════════════════════════════════════════════
  // CHORD MODE - ROOT NOTE LETTERS
  // ═══════════════════════════════════════════════════════════════════════
  if (state.currentPage === 'chord') {
    const chordKeyMap = {
      'c': 0,  // C
      'd': 2,  // D
      'e': 4,  // E
      'f': 5,  // F
      'g': 7,  // G
      'a': 9,  // A
      'b': 11  // B
    };
   
    if (chordKeyMap.hasOwnProperty(key)) {
      e.preventDefault();
      state.chordSelectionRoot = chordKeyMap[key];
     
      // Highlight the root button
      for (let i = 0; i < 12; i++) {
        const btn = document.getElementById(`chord-root-${i}`);
        if (btn) {
          const lbl = btn.querySelector('a-text');
          if (i === state.chordSelectionRoot) {
            btn.setAttribute('material', `metalness:.3;roughness:.6;emissive:#FFFFFF;emissiveIntensity:2.0`);
            btn.setAttribute('scale', '1.15 1.15 1.15');
            if (lbl) lbl.setAttribute('color', '#000000');
          } else {
            btn.setAttribute('material', 'metalness:.3;roughness:.6;emissive:#000;emissiveIntensity:0');
            btn.setAttribute('scale', '1 1 1');
            if (lbl) lbl.setAttribute('color', 'white');
          }
        }
      }
     
      updateChordSteps();
      updateHUD();
      showMessage(`ROOT: ${chordRoots[state.chordSelectionRoot]}`);
      return;
    }
  }
 
  // ═══════════════════════════════════════════════════════════════════════
  // QWERTY PIANO INPUT (SEQ, EDIT, DRUM PAGES)
  // ═══════════════════════════════════════════════════════════════════════
  if (state.currentPage === 'seq' || state.currentPage === 'edit' || state.currentPage === 'drum') {
    const noteMap = {
      'a': 'C', 'w': 'C#', 's': 'D', 'e': 'D#', 'd': 'E',
      'f': 'F', 't': 'F#', 'g': 'G', 'y': 'G#', 'h': 'A',
      'u': 'A#', 'j': 'B', 'k': 'C'  // Extra C for octave
    };

    // Melodic track = displayTrack 4–7 (Bass, Lead, Pad, Arp)
    if (noteMap[key] && state.displayTrack >= 4) {
      e.preventDefault();
      syncTrackFromDisplay();
      let note = noteMap[key] + (state.octave + 3);
      const trackIdx = state.displayTrack - 4;
      const trackKey = ['bass', 'lead', 'pad', 'arp'][trackIdx];

      // Record note if recording (step-time)
      if (state.isRecording) {
        saveUndoState();
        const pat = patterns[state.currentPattern];
        pat[trackKey][state.highlightedStep] = note;
        state.highlightedStep = (state.highlightedStep + 1) % patterns[state.currentPattern].length;
        const newView = Math.floor(state.highlightedStep / 16);
        if (newView !== state.currentStepView) state.currentStepView = newView;
        updateSteps();
      }

      // Always play the note
      playInstrument(trackIdx, note);
      flashPianoKeyByNote(note, trackIdx + 1);
      return;
    }
  }
 
  // Z/X - Octave down/up
  if (key === 'z') {
    e.preventDefault();
    state.octave = Math.max(-2, state.octave - 1);
    updateHUD();
    showMessage(`OCTAVE: ${state.octave}`);
    return;
  }
  if (key === 'x') {
    e.preventDefault();
    state.octave = Math.min(2, state.octave + 1);
    updateHUD();
    showMessage(`OCTAVE: ${state.octave}`);
    return;
  }
 
  // R - Toggle recording
  if (key === 'r') {
    e.preventDefault();
    state.isRecording = !state.isRecording;
    updateUI();
    showMessage(state.isRecording ? '⏺ RECORDING' : '⏹ REC OFF');
    return;
  }
});

function loadFromFile(event) {
  const file = event.target.files[0];
  if (!file) return;

  showMessage('⏳ READING FILE...');

  const reader = new FileReader();
  reader.onload = async function(e) {
    try {
      const json = e.target.result;
      const data = JSON.parse(json);

      // 1. Stop Audio
      state.isPlaying = false;
      stopAllSources();

      // 2. FIRST - Create ALL 16 empty patterns to prevent undefined errors
      for (let i = 0; i < 16; i++) {
        patterns[i] = createEmptyPattern();
      }

      // 3. NOW load the saved patterns on top of the empty ones
      if (data.patterns && Array.isArray(data.patterns)) {
        for (let i = 0; i < Math.min(data.patterns.length, 16); i++) {
          if (data.patterns[i]) {
            const loadedPat = data.patterns[i];
           
            // Copy all properties from loaded pattern
            if (loadedPat.drums) patterns[i].drums = { ...patterns[i].drums, ...loadedPat.drums };
            if (loadedPat.drumVelocity) patterns[i].drumVelocity = { ...patterns[i].drumVelocity, ...loadedPat.drumVelocity };
            if (loadedPat.bass) patterns[i].bass = [...loadedPat.bass];
            if (loadedPat.lead) patterns[i].lead = [...loadedPat.lead];
            if (loadedPat.pad) patterns[i].pad = [...loadedPat.pad];
            if (loadedPat.arp) patterns[i].arp = [...loadedPat.arp];
            if (loadedPat.arpChords) patterns[i].arpChords = JSON.parse(JSON.stringify(loadedPat.arpChords));
            if (loadedPat.strings && Array.isArray(loadedPat.strings)) patterns[i].strings = [...loadedPat.strings];
            else if (!patterns[i].strings) patterns[i].strings = new Array(64).fill(false);
            if (loadedPat.mix) patterns[i].mix = JSON.parse(JSON.stringify(loadedPat.mix));
            if (loadedPat.velocity) patterns[i].velocity = { ...patterns[i].velocity, ...loadedPat.velocity };
           
            // CRITICAL: Set the length property
            if (loadedPat.length) {
  patterns[i].length = loadedPat.length;
} else {
  patterns[i].length = 64; // Default if not specified
}
          }
        }
      }

      // 4. Load State
      if (data.tempo) state.tempo = data.tempo;
      if (data.arrangement) state.songArrangement = [...data.arrangement];
      if (data.tapeState) {
        if (data.tapeState.deck1) Object.assign(tapeState.deck1, data.tapeState.deck1);
        if (data.tapeState.deck2) Object.assign(tapeState.deck2, data.tapeState.deck2);
        if (typeof data.tapeState.bounce !== 'undefined') tapeState.bounce = data.tapeState.bounce;
        if (typeof data.tapeState.seqToTape !== 'undefined') tapeState.seqToTape = data.tapeState.seqToTape;
        if (typeof data.tapeState.radio !== 'undefined') tapeState.radio = data.tapeState.radio;
        if (typeof data.tapeState.mic !== 'undefined') tapeState.mic = data.tapeState.mic;
        if (typeof data.tapeState.browser !== 'undefined' && !('mic' in data.tapeState)) tapeState.mic = false;
      }
      if (data.tapeMetadata) Object.assign(tapeMetadata, data.tapeMetadata);
      if (data.tapeRecordingData && typeof audioContext !== 'undefined' && audioContext) {
        const promises = [];
        Object.keys(data.tapeRecordingData).forEach(function(slotId) {
          const ab = decodeWavBase64ToArrayBuffer(data.tapeRecordingData[slotId]);
          if (ab) promises.push(audioContext.decodeAudioData(ab.slice(0)).then(function(buf) { tapeRecordings[slotId] = buf; }).catch(function() {}));
        });
        if (promises.length) Promise.all(promises).then(function() { if (typeof updateDeckCassetteLabel === 'function') { updateDeckCassetteLabel(1); updateDeckCassetteLabel(2); } });
      }
      if (data.trackVolumes && Array.isArray(data.trackVolumes)) {
        state.trackVolumes = data.trackVolumes.length >= 6 ? [...data.trackVolumes] : [...data.trackVolumes, 0.8, 1, 0.9, 0.9, 0.3, 0.7].slice(0, 6);
      }
      if (data.trackPans && Array.isArray(data.trackPans)) {
        state.trackPans = data.trackPans.length >= 6 ? [...data.trackPans] : [...data.trackPans, 0, 0, 0, 0, 0, 0].slice(0, 6);
      }
      if (data.drumVolumes && Array.isArray(data.drumVolumes)) state.drumVolumes = [...data.drumVolumes];
      if (data.drumPans && Array.isArray(data.drumPans)) state.drumPans = [...data.drumPans];
      if (data.trackDecay && Array.isArray(data.trackDecay)) {
        state.trackDecay = data.trackDecay.length >= 6 ? [...data.trackDecay] : [...data.trackDecay, 1, 1, 1, 1, 1, 1].slice(0, 6);
      }
      if (data.drumDecay && Array.isArray(data.drumDecay)) state.drumDecay = [...data.drumDecay];
      if (data.arp) state.arp = { ...data.arp };
      if (typeof data.drumReduceOn !== 'undefined') state.drumReduceOn = data.drumReduceOn;
      if (typeof data.chordLineArpOn !== 'undefined') state.chordLineArpOn = data.chordLineArpOn;
      if (typeof data.chordLineChordOn !== 'undefined') state.chordLineChordOn = data.chordLineChordOn;
      if (typeof data.chordLineStringsOn !== 'undefined') state.chordLineStringsOn = data.chordLineStringsOn;
      if (data.chordLineRhythmOffsets && Array.isArray(data.chordLineRhythmOffsets)) state.chordLineRhythmOffsets = data.chordLineRhythmOffsets.slice();
      if (typeof data.chordLineArpStyle === 'number') state.chordLineArpStyle = Math.max(0, Math.min(15, data.chordLineArpStyle));
      if (typeof data.chordLineChordStyle === 'number') state.chordLineChordStyle = Math.max(0, Math.min(15, data.chordLineChordStyle));
      if (typeof data.chordLineArpSubdivision === 'number') state.chordLineArpSubdivision = Math.max(0, Math.min(2, data.chordLineArpSubdivision));
      if (typeof data.chordLineTimingIndex === 'number') state.chordLineTimingIndex = Math.max(0, data.chordLineTimingIndex);
      if (typeof data.chordLineInversionIndex === 'number') state.chordLineInversionIndex = Math.max(0, data.chordLineInversionIndex);
      if (data.miscSection === 'enviro' || data.miscSection === 'fx' || data.miscSection === 'general') state.miscSection = data.miscSection;
      if (typeof data.speakerSmokeRingsOn !== 'undefined') state.speakerSmokeRingsOn = data.speakerSmokeRingsOn;
      if (typeof data.midiOutEnabled !== 'undefined') state.midiOutEnabled = data.midiOutEnabled;
      if (typeof data.lightingEnabled !== 'undefined') state.lightingEnabled = data.lightingEnabled;
      if (typeof data.tableVisible !== 'undefined') state.tableVisible = data.tableVisible;
      if (typeof data.scaleCycleOn !== 'undefined') state.scaleCycleOn = data.scaleCycleOn;
      if (typeof data.scaleRoot !== 'undefined') state.scaleRoot = data.scaleRoot;
      if (typeof data.scaleType !== 'undefined') state.scaleType = data.scaleType;
      if (typeof data.timeSignature68 !== 'undefined') state.timeSignature68 = data.timeSignature68;
      if (typeof data.desktopMode !== 'undefined') state.desktopMode = data.desktopMode;
      if (typeof data.echoEnabled !== 'undefined') state.echoEnabled = data.echoEnabled;
      if (typeof data.echoTrack !== 'undefined') state.echoTrack = data.echoTrack;
      if (typeof data.echoTimingIndex !== 'undefined') state.echoTimingIndex = data.echoTimingIndex;
      if (typeof data.loopEnabled !== 'undefined') state.loopEnabled = data.loopEnabled;
      if (typeof data.loopTrack !== 'undefined') state.loopTrack = data.loopTrack;
      if (typeof data.loopStartTime !== 'undefined') {
        if (Array.isArray(data.loopStartTime)) {
          state.loopStartTime = [...data.loopStartTime];
        } else {
          // Legacy: convert single value to array
          state.loopStartTime = [0.0, data.loopStartTime || 0.0, 0.0, 0.0, 0.0];
        }
      }
      if (typeof data.loopEndTime !== 'undefined') {
        if (Array.isArray(data.loopEndTime)) {
          state.loopEndTime = [...data.loopEndTime];
        } else {
          // Legacy: convert single value to array
          state.loopEndTime = [0.0, data.loopEndTime || 0.0, 0.0, 0.0, 0.0];
        }
      }
      if (typeof data.reverbEnabled !== 'undefined') state.reverbEnabled = data.reverbEnabled;
      if (typeof data.reverbTrack !== 'undefined') state.reverbTrack = data.reverbTrack;
      if (typeof data.chorusEnabled !== 'undefined') state.chorusEnabled = data.chorusEnabled;
      if (typeof data.chorusTrack !== 'undefined') state.chorusTrack = data.chorusTrack;
      if (typeof data.gazeModeOn !== 'undefined') state.gazeModeOn = data.gazeModeOn;
      if (typeof data.currentBank !== 'undefined') state.currentBank = Math.min(7, Math.max(0, data.currentBank));
      if (typeof loadBankFromGitHub === 'function' && state.currentBank >= 0 && state.currentBank < 6) {
        loadBankFromGitHub(state.currentBank).then(() => {
          if (typeof updateSynthBankButtonVisuals === 'function') updateSynthBankButtonVisuals();
        }).catch(() => {});
      }
      if (typeof data.synthEnabled !== 'undefined') state.synthEnabled = data.synthEnabled;
      if (typeof data.drumKit !== 'undefined') state.drumKit = data.drumKit;
      if (data.drumDecay && Array.isArray(data.drumDecay) && data.drumDecay.length >= 4) state.drumDecay = [...data.drumDecay];
      if (typeof data.chordOn !== 'undefined') state.chordOn = data.chordOn;
      if (typeof data.bassMode !== 'undefined') state.bassMode = data.bassMode;
      if (typeof data.padMode !== 'undefined') state.padMode = data.padMode;
      if (typeof data.arpMode !== 'undefined') state.arpMode = data.arpMode;
      if (typeof data.bassSlideOn !== 'undefined') state.bassSlideOn = data.bassSlideOn;
      if (typeof data.arpDelayIndex !== 'undefined') state.arpDelayIndex = data.arpDelayIndex;
      if (typeof data.arpSweepOn !== 'undefined') state.arpSweepOn = data.arpSweepOn;
      if (data.fx && typeof data.fx === 'object') {
        state.fx = JSON.parse(JSON.stringify(data.fx));
        ensureFxTracks();
      }
      if (typeof applyGazeModeVisuals === 'function') applyGazeModeVisuals();
      // Do not restore workstation position/rotation from file – keeps synth/camera where user left it (avoids jump)
      state._workstationPositionApplyCooldownUntil = Date.now() + 2500;
      syncWorkstationStateFromDOM();

      // 5. Reset View
      state.currentPattern = 0;
      state.currentStep = 0;
      state.currentStepView = 0;
      state.highlightedStep = 0;

      // 6. Update UI
      if (typeof buildPageButtonsRow === 'function') buildPageButtonsRow();
      if (typeof applyMiscPanelVisibility === 'function') applyMiscPanelVisibility();
      updateUI();
      updateSteps();
      if (typeof updateMiscButtons === 'function') updateMiscButtons();
      if (typeof updateEffectTrackDisplays === 'function') updateEffectTrackDisplays();
     
      if (typeof updateChordSteps === 'function') {
        setTimeout(() => updateChordSteps(), 50);

      if (typeof data.currentSkyboxIndex !== 'undefined') state.currentSkyboxIndex = data.currentSkyboxIndex;
      if (typeof data.raveMode !== 'undefined') state.raveMode = data.raveMode;
      if (state.skyboxEnabled && typeof applySkybox === 'function') applySkybox();

function applySkybox() {
  console.log('🌌 applySkybox() called');

  let skyEntity = document.getElementById('skybox');
  if (!skyEntity) {
    const scene = document.getElementById('mainScene');
    skyEntity = document.createElement('a-sky');
    skyEntity.setAttribute('id', 'skybox');
    skyEntity.setAttribute('radius', '1000');
    scene.appendChild(skyEntity);
    console.log('✅ Skybox entity created');
  }

  // Rave mode: use rave warehouse skybox (no dependency on skyboxUrls)
  if (state.raveMode && typeof RAVE_SKYBOX_URL !== 'undefined') {
    skyEntity.removeAttribute('color');
    skyEntity.setAttribute('visible', 'true');
    let materialData = skyEntity.getAttribute('material');
    if (!materialData || typeof materialData === 'string') materialData = {};
    materialData.src = RAVE_SKYBOX_URL;
    materialData.shader = 'flat';
    skyEntity.setAttribute('material', materialData);
    skyEntity.setAttribute('src', RAVE_SKYBOX_URL);
    showMessage('🌌 RAVE MODE');
    return;
  }

  if (!skyboxUrls || skyboxUrls.length === 0) {
    console.warn('⚠️ No skyboxes loaded yet');
    return;
  }

  const skyIndex = (state.currentSkyboxIndex ?? 0) % skyboxUrls.length;
  const skyboxUrl = skyboxUrls[skyIndex];

  if (state.skyboxEnabled && skyboxUrl) {
    console.log('🌌 Setting skybox to:', skyboxUrl);
    
    skyEntity.removeAttribute('color');
    skyEntity.setAttribute('visible', 'true');
    
    // Random Y-axis rotation (0-360 degrees) for variety
    const randomRotationY = Math.random() * 360;
    skyEntity.setAttribute('rotation', `0 ${randomRotationY} 0`);
    
    // Set material so skybox sticks (shader flat for equirect)
    let materialData = skyEntity.getAttribute('material');
    if (!materialData || typeof materialData === 'string') materialData = {};
    materialData.src = skyboxUrl;
    materialData.shader = 'flat';
    skyEntity.setAttribute('material', materialData);
    skyEntity.setAttribute('src', skyboxUrl);
    
    showMessage(`🌌 SKYBOX ${skyIndex + 1}/${skyboxUrls.length}`);
    
    // Re-apply after a short delay so texture load doesn't leave sky blank
    setTimeout(function () {
      if (!state.skyboxEnabled) return;
      var sky = document.getElementById('skybox');
      if (sky && skyboxUrl) {
        sky.setAttribute('visible', 'true');
        var m = sky.getAttribute('material');
        if (!m || typeof m === 'string') m = {};
        m.src = skyboxUrl;
        m.shader = 'flat';
        sky.setAttribute('material', m);
      }
    }, 250);
  } else {
    console.log('🌌 Default neon sky (no texture)');
    skyEntity.removeAttribute('src');
    skyEntity.setAttribute('color', '#0a0a24');
    skyEntity.setAttribute('visible', 'true');
    showMessage('🌌 SKYBOX OFF');
  }
}

function onRaveBeat(step) {
  if (!state.raveMode) return;
  const stepInBar = step % 16;
  const isDownbeat = stepInBar === 0;
  const isBeat = (stepInBar % 4) === 0;
  // Point lights: punch on every 16th, extra on beat and downbeat
  const numLights = typeof RAVE_NUM_LIGHTS !== 'undefined' ? RAVE_NUM_LIGHTS : 14;
  for (let i = 0; i < numLights; i++) {
    let intensity = 0.7 + 0.4 * Math.sin(step * 0.5 + i);
    if (isDownbeat) intensity = 2.2;
    else if (isBeat) intensity = 1.6;
    else intensity = 1.1;
    _raveLightIntensities[i] = Math.max(_raveLightIntensities[i], intensity);
    const el = document.getElementById('raveLight' + (i + 1));
    if (el) {
      el.setAttribute('intensity', _raveLightIntensities[i]);
      el.setAttribute('color', RAVE_LIGHT_COLORS[(step + i) % RAVE_LIGHT_COLORS.length]);
    }
  }
  // Neon accent rings: punch on beat
  if (typeof _raveAccentLevel !== 'undefined') {
    if (isDownbeat) _raveAccentLevel = Math.max(_raveAccentLevel, 1.5);
    else if (isBeat) _raveAccentLevel = Math.max(_raveAccentLevel, 1.0);
  }
  // Lasers: cycle which ones fire by step; downbeat = all flash
  const numLasers = _raveLaserIntensities.length;
  if (numLasers) {
    for (let i = 0; i < numLasers; i++) {
      let intensity = 0.08;
      if (isDownbeat) intensity = 2.2;
      else if (isBeat) intensity = (i % 2 === (stepInBar / 4) % 2) ? 1.8 : 0.15;
      else intensity = (i % 3 === step % 3) ? 1.2 : 0.1;
      _raveLaserIntensities[i] = Math.max(_raveLaserIntensities[i], intensity);
      const el = document.getElementById('raveLaser' + (i + 1));
      if (el) {
        const color = el.getAttribute('color') || RAVE_LASER_COLORS[i];
        el.setAttribute('material', 'emissive:' + color + ';emissiveIntensity:' + _raveLaserIntensities[i] + ';metalness:0;roughness:0.5;side:double;transparent:true;opacity:0.38');
      }
    }
  }
}

function decayRaveLights(timeDelta) {
  const decay = Math.exp(-(timeDelta / 1000) * 5); // timeDelta in ms (this project); ~0.92 per frame at 60fps
  const numLights = typeof RAVE_NUM_LIGHTS !== 'undefined' ? RAVE_NUM_LIGHTS : 14;
  for (let i = 0; i < numLights; i++) {
    _raveLightIntensities[i] = Math.max(0.45, _raveLightIntensities[i] * decay);
    const el = document.getElementById('raveLight' + (i + 1));
    if (el) el.setAttribute('intensity', _raveLightIntensities[i]);
  }
  if (typeof _raveAccentLevel !== 'undefined') _raveAccentLevel = Math.max(0.15, _raveAccentLevel * decay);
  for (let i = 0; i < _raveLaserIntensities.length; i++) {
    _raveLaserIntensities[i] = Math.max(0.02, _raveLaserIntensities[i] * decay);
    const el = document.getElementById('raveLaser' + (i + 1));
    if (el) {
      const color = el.getAttribute('color') || RAVE_LASER_COLORS[i];
      el.setAttribute('material', 'emissive:' + color + ';emissiveIntensity:' + _raveLaserIntensities[i] + ';metalness:0;roughness:0.5;side:double;transparent:true;opacity:0.38');
    }
  }
}

function updateChordSteps() {
  if (!ui.chordStepButtons || ui.chordStepButtons.length === 0) return;
  const pat = patterns[state.currentPattern];
  const offset = state.currentStepView * 16;
  const purple = '#9b5cff';
  ui.chordStepButtons.forEach(function(btn, i) {
    const step = offset + i;
    const chord = pat.arpChords[step];
    let btnColor = '#334455', emissive = '#000', emissiveIntensity = 0, scale = '1 1 1';
    if (state.isPlaying && step === state.currentStep) {
      btnColor = '#00FF00';
      emissive = '#00FF00';
      emissiveIntensity = 3.5;
    } else if (step === state.highlightedStep) {
      btnColor = purple;
      emissive = purple;
      emissiveIntensity = 2.5;
      scale = '1.1 1.1 1.1';
    } else if (chord && chord.root !== undefined) {
      btnColor = '#2a2a3a';
      emissive = chordColors[chord.root];
      emissiveIntensity = 0.1;
    }
    btn.setAttribute('color', btnColor);
    btn.setAttribute('material', 'metalness:0.1;roughness:0.9;emissive:' + emissive + ';emissiveIntensity:' + emissiveIntensity);
    btn.setAttribute('scale', scale);
    const label = btn.querySelector('a-text');
    if (label) {
      if (chord && chord.root !== undefined) {
        const rootName = chordRoots[chord.root];
        const typeName = chordTypes[chord.type];
        let chordName = rootName;
        if (typeName === 'MAJ') chordName = rootName;
        else if (typeName === 'MIN') chordName = rootName + 'm';
        else if (typeName === '7TH') chordName = rootName + '7';
        else if (typeName === 'M7') chordName = rootName + 'm7';
        else if (typeName === 'DIM') chordName = rootName + '°';
        else if (typeName === 'AUG') chordName = rootName + '+';
        else chordName = rootName + typeName;
        label.setAttribute('value', chordName);
        label.setAttribute('color', '#FFFFFF');
        label.setAttribute('scale', '0.22 0.22 0.22');
      } else {
        label.setAttribute('value', (i + 1).toString());
        label.setAttribute('color', '#AAAAAA');
        label.setAttribute('scale', '0.15 0.15 0.15');
      }
    }
  });
  if (ui.chordViewButtons) {
    ui.chordViewButtons.forEach(function(b, i) {
      const blockStart = i * 16;
      const isActive = blockStart < (pat.length || 64);
      if (!isActive) {
        b.setAttribute('color', '#1a1a2a');
        b.setAttribute('material', 'metalness:.5;roughness:.5;emissive:#000;emissiveIntensity:0;opacity:0.3;transparent:true');
      } else if (i === state.currentStepView) {
        b.setAttribute('color', purple);
        b.setAttribute('material', 'metalness:.3;roughness:.6;emissive:' + purple + ';emissiveIntensity:1.2;opacity:1;transparent:false');
      } else {
        b.setAttribute('color', '#336688');
        b.setAttribute('material', 'metalness:.3;roughness:.6;emissive:#000;emissiveIntensity:0;opacity:1;transparent:false');
      }
    });
  }
  if (ui.chordRootButtons) {
    ui.chordRootButtons.forEach(function(b, i) {
      const lbl = b.querySelector('a-text');
      if (state.chordSelectionRoot === i) {
        b.setAttribute('material', 'metalness:0.3;roughness:0.6;emissive:#FFFFFF;emissiveIntensity:1.5');
        b.setAttribute('scale', '1.1 1.1 1.1');
        if (lbl) lbl.setAttribute('color', '#000000');
      } else {
        b.setAttribute('material', 'metalness:0.3;roughness:0.6;emissive:#000;emissiveIntensity:0');
        b.setAttribute('scale', '1 1 1');
        if (lbl) lbl.setAttribute('color', 'white');
      }
    });
  }
  if (ui.chordTypeButtons) {
    ui.chordTypeButtons.forEach(function(b, i) {
      const lbl = b.querySelector('a-text');
      if (state.chordSelectionType === i) {
        b.setAttribute('color', '#00FFAA');
        b.setAttribute('material', 'metalness:0.3;roughness:0.6;emissive:#FFFFFF;emissiveIntensity:1.5');
        b.setAttribute('scale', '1.1 1.1 1.1');
        if (lbl) lbl.setAttribute('color', '#000000');
      } else {
        b.setAttribute('color', '#5588AA');
        b.setAttribute('material', 'metalness:0.3;roughness:0.6;emissive:#000;emissiveIntensity:0');
        b.setAttribute('scale', '1 1 1');
        if (lbl) lbl.setAttribute('color', 'white');
      }
    });
  }
}

// BUILD SYNTH PAGE – 8 bank buttons only (Bank 1..8), load from GitHub
function buildSynthPage() {
  const workstation = document.getElementById('synthWorkstation');
  if (!workstation) return;

  let synthUI = document.getElementById('synthUI');
  if (synthUI) {
    synthUI.object3D.visible = true;
    synthUI.setAttribute('visible', 'true');
    restorePageContainerClickable(synthUI);
    updateSynthBankButtonVisuals();
    return;
  }

  synthUI = document.createElement('a-entity');
  synthUI.setAttribute('id', 'synthUI');
  synthUI.setAttribute('position', '0 0 0');
  workstation.appendChild(synthUI);

  const z = 0.05, h = 0.14, d = 0.08;
  const bankColors = ['#AA5555', '#55AA77', '#5577AA', '#AA8855', '#9955AA', '#55AAAA', '#AA5566', '#668833'];
  const colXs = [-0.90, -0.45, 0.0, 0.45, 0.90];
  const rowYs = [-0.22, -0.38, -0.54, -0.70, -0.86, -1.02];
  const cellW = 0.28;

  for (let i = 0; i < 8; i++) {
    const col = i % 4;
    const row = Math.floor(i / 4);
    const x = colXs[col];
    const y = rowYs[row];
    const id = 'synth-bank-' + (i + 1);
    const label = 'Bank ' + (i + 1);
    createButton(synthUI, x, y, z, cellW, h, d, bankColors[i], id, label, 'white', true);
  }

  const infoDisplay = document.getElementById('infoDisplay');
  if (infoDisplay) {
    infoDisplay.object3D.visible = true;
    infoDisplay.setAttribute('visible', 'true');
  }

  if (typeof state.currentBank === 'undefined') state.currentBank = 0;
  updateSynthBankButtonVisuals();
}

function updateSynthBankButtonVisuals() {
  const active = (state.currentBank != null ? state.currentBank : 0) % 8;
  for (let i = 1; i <= 8; i++) {
    const btn = document.querySelector('[data-button-id="synth-bank-' + i + '"]');
    if (!btn) continue;
    const isActive = (i - 1) === active;
    const label = btn.querySelector('a-text');
    if (isActive) {
      btn.setAttribute('material', 'metalness:.3;roughness:.6;emissive:#00FF00;emissiveIntensity:1.2');
      btn.setAttribute('scale', '1.08 1.08 1.08');
      if (label) label.setAttribute('color', '#000000');
    } else {
      btn.setAttribute('material', 'metalness:0.4;roughness:0.5;emissive:#000;emissiveIntensity:0');
      btn.setAttribute('scale', '1 1 1');
      if (label) label.setAttribute('color', '#ffffff');
    }
  }
}

// FX types for per-track FX tab (index 0 = none). Saved with song.
const FX_TRACK_KEYS = ['kick', 'snare', 'hihat', 'openhi', 'bass', 'lead', 'pad', 'arp'];

function ensureFxTracks() {
  const def = { slots: [0, 0, 0], send: 0.4 };
  if (!state.fx) state.fx = {};
  FX_TRACK_KEYS.forEach(key => {
    if (!state.fx[key]) state.fx[key] = { slots: [].concat(def.slots), send: def.send };
  });
}

  }

  // Update CHORUS button (magenta when on – dark text)
  const chorusBtn = document.getElementById('misc-chorus-toggle');
  if (chorusBtn) {
    const label = chorusBtn.querySelector('a-text');
    if (state.chorusEnabled && state.chorusTrack > 0) {
      chorusBtn.setAttribute('color', '#FF00AA');
      chorusBtn.setAttribute('material', 'metalness:.3;roughness:.6;emissive:#FF00AA;emissiveIntensity:1.5');
      chorusBtn.setAttribute('scale', '1.1 1.1 1.1');
      if (label) label.setAttribute('color', '#000000');
    } else {
      chorusBtn.setAttribute('color', '#CC88AA');
      chorusBtn.setAttribute('material', 'metalness:.3;roughness:.6;emissive:#000;emissiveIntensity:0');
      chorusBtn.setAttribute('scale', '1 1 1');
      if (label) label.setAttribute('color', 'white');
    }
  }

  // Update 6/8 button (orange when on – dark text)
  const btn68 = document.getElementById('misc-68-toggle');
  if (btn68) {
    const label = btn68.querySelector('a-text');
    if (state.timeSignature68) {
      btn68.setAttribute('color', '#FF8800');
      btn68.setAttribute('material', 'metalness:.3;roughness:.6;emissive:#FF8800;emissiveIntensity:1.5');
      btn68.setAttribute('scale', '1.1 1.1 1.1');
      if (label) label.setAttribute('color', '#000000');
    } else {
      btn68.setAttribute('color', '#88AA66');
      btn68.setAttribute('material', 'metalness:.3;roughness:.6;emissive:#000;emissiveIntensity:0');
      btn68.setAttribute('scale', '1 1 1');
      if (label) label.setAttribute('color', 'white');
    }
  }

  if (typeof updateScaleDisplays === 'function') updateScaleDisplays();
 
  // Update view buttons – lit button gets dark text
  if (ui.miscViewButtons) {
    ui.miscViewButtons.forEach((btn, i) => {
      const lbl = btn.querySelector('a-text');
      if (i === state.currentStepView) {
        btn.setAttribute('color', purple);
        btn.setAttribute('material', `metalness:.3;roughness:.6;emissive:${purple};emissiveIntensity:1.2`);
        if (lbl) lbl.setAttribute('color', '#000000');
      } else {
        btn.setAttribute('color', '#336688');
        btn.setAttribute('material', 'metalness:.3;roughness:.6;emissive:#000;emissiveIntensity:0');
        if (lbl) lbl.setAttribute('color', '#ffffff');
      }
    });
  }
  ensureLitButtonsHaveDarkText(document.getElementById('miscUI'));
}

function updateEchoDisplay() {
  const echoDisplay = document.getElementById('echo-display');
  if (echoDisplay && echoTimings && echoTimings[state.echoTimingIndex]) {
    echoDisplay.setAttribute('value', echoTimings[state.echoTimingIndex][0]);
  }
}

function randomizeLighting() {
  const scene = document.querySelector('a-scene');
  if (!scene) return;
 
  // Get existing lights
  const pointLights = scene.querySelectorAll('a-light[type="point"]');
  const directionalLight = scene.querySelector('a-light[type="directional"]');
  const ambientLight = scene.querySelector('a-light[type="ambient"]');
 
  // Choose a random lighting scheme
  const schemes = [
    // Scheme 1: Neon Club
    () => {
      pointLights.forEach((light, i) => {
        const colors = ['#FF00FF', '#00FFFF', '#FF0088', '#00FF88'];
        light.setAttribute('color', colors[i % colors.length]);
        light.setAttribute('intensity', 0.8 + Math.random() * 0.4);
        light.setAttribute('position', `${(Math.random() - 0.5) * 4} ${2 + Math.random() * 2} ${(Math.random() - 0.5) * 3}`);
      });
      if (ambientLight) ambientLight.setAttribute('intensity', 0.1);
      showMessage('💜 NEON CLUB');
    },
   
    // Scheme 2: Sunset Warm
    () => {
      pointLights.forEach((light, i) => {
        const colors = ['#FF6600', '#FF9900', '#FFCC00', '#FF3300'];
        light.setAttribute('color', colors[i % colors.length]);
        light.setAttribute('intensity', 0.6 + Math.random() * 0.3);
        light.setAttribute('position', `${(Math.random() - 0.5) * 3} ${3 + Math.random()} ${(Math.random() - 0.5) * 2}`);
      });
      if (ambientLight) ambientLight.setAttribute('intensity', 0.3);
      if (directionalLight) directionalLight.setAttribute('color', '#FFAA66');
      showMessage('🌅 SUNSET WARM');
    },
   
    // Scheme 3: Deep Blue
    () => {
      pointLights.forEach((light, i) => {
        const colors = ['#0033FF', '#0066FF', '#0099FF', '#00CCFF'];
        light.setAttribute('color', colors[i % colors.length]);
        light.setAttribute('intensity', 0.5 + Math.random() * 0.4);
        light.setAttribute('position', `${(Math.random() - 0.5) * 4} ${2.5 + Math.random() * 1.5} ${(Math.random() - 0.5) * 2.5}`);
      });
      if (ambientLight) ambientLight.setAttribute('intensity', 0.05);
      showMessage('🌊 DEEP BLUE');
    },
   
    // Scheme 4: Strobe Rainbow
    () => {
      pointLights.forEach((light, i) => {
        const hue = (i * 90) % 360;
        light.setAttribute('color', `hsl(${hue}, 100%, 50%)`);
        light.setAttribute('intensity', 0.9 + Math.random() * 0.3);
        light.setAttribute('position', `${(Math.random() - 0.5) * 5} ${3 + Math.random()} ${(Math.random() - 0.5) * 3}`);
      });
      if (ambientLight) ambientLight.setAttribute('intensity', 0.15);
      showMessage('🌈 STROBE RAINBOW');
    },
   
    // Scheme 5: Cyberpunk
    () => {
      pointLights.forEach((light, i) => {
        const colors = ['#FF00AA', '#00FFFF', '#FFFF00', '#FF0066'];
        light.setAttribute('color', colors[i % colors.length]);
        light.setAttribute('intensity', 0.7 + Math.random() * 0.5);
        light.setAttribute('position', `${(Math.random() - 0.5) * 4} ${2 + Math.random() * 2} ${(Math.random() - 0.5) * 2}`);
      });
      if (ambientLight) ambientLight.setAttribute('intensity', 0.2);
      if (directionalLight) directionalLight.setAttribute('color', '#FF00FF');
      showMessage('⚡ CYBERPUNK');
    },
   
    // Scheme 6: Forest Green
    () => {
      pointLights.forEach((light, i) => {
        const colors = ['#00FF00', '#33FF33', '#66FF66', '#00CC00'];
        light.setAttribute('color', colors[i % colors.length]);
        light.setAttribute('intensity', 0.4 + Math.random() * 0.3);
        light.setAttribute('position', `${(Math.random() - 0.5) * 3} ${2.5 + Math.random()} ${(Math.random() - 0.5) * 2}`);
      });
      if (ambientLight) ambientLight.setAttribute('intensity', 0.25);
      showMessage('🌲 FOREST GREEN');
    },
   
    // Scheme 7: Purple Haze
    () => {
      pointLights.forEach((light, i) => {
        const colors = ['#9900FF', '#CC00FF', '#FF00FF', '#6600CC'];
        light.setAttribute('color', colors[i % colors.length]);
        light.setAttribute('intensity', 0.6 + Math.random() * 0.4);
        light.setAttribute('position', `${(Math.random() - 0.5) * 4} ${2 + Math.random() * 2} ${(Math.random() - 0.5) * 2.5}`);
      });
      if (ambientLight) ambientLight.setAttribute('intensity', 0.15);
      showMessage('💜 PURPLE HAZE');
    },
   
    // Scheme 8: Fire Red
    () => {
      pointLights.forEach((light, i) => {
        const colors = ['#FF0000', '#FF3300', '#FF6600', '#FF9900'];
        light.setAttribute('color', colors[i % colors.length]);
        light.setAttribute('intensity', 0.8 + Math.random() * 0.4);
        light.setAttribute('position', `${(Math.random() - 0.5) * 3} ${2 + Math.random() * 2} ${(Math.random() - 0.5) * 2}`);
      });
      if (ambientLight) ambientLight.setAttribute('intensity', 0.1);
      if (directionalLight) directionalLight.setAttribute('color', '#FF6600');
      showMessage('🔥 FIRE RED');
    }
  ];
 
  // Pick and apply random scheme
  const scheme = schemes[Math.floor(Math.random() * schemes.length)];
  scheme();
}
</script>
