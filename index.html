<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Mobile 5000 VR Sequencer — Neon Edition</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <style>
    :root {
      --purple: #9b5cff;
      --neon-cyan: #00f5ff;
      --neon-magenta: #ff00e5;
      --glass-bg: rgba(10, 10, 30, 0.6);
      --glass-border: rgba(155, 92, 255, 0.5);
    }
    html, body { margin: 0; overflow: hidden; background: #050510; font-family: 'Rajdhani', sans-serif; }
    * { -webkit-tap-highlight-color: transparent; }
    #startScreen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(ellipse at 50% 30%, #0d0d28 0%, #050510 50%, #000005 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; font-family: 'Orbitron', sans-serif;
    }
    #startScreen::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(0, 245, 255, 0.03) 0%, transparent 40%, rgba(255, 0, 229, 0.03) 100%);
      pointer-events: none;
    }
    #startScreen h1 {
      color: #fff; font-size: 52px; font-weight: 900; letter-spacing: 0.08em; margin-bottom: 12px;
      text-shadow: 0 0 30px var(--neon-cyan), 0 0 60px rgba(0, 245, 255, 0.4);
      position: relative; z-index: 1;
    }
    #startScreen p {
      color: var(--neon-cyan); font-size: 20px; font-weight: 300; letter-spacing: 0.2em; margin-bottom: 48px;
      text-shadow: 0 0 15px var(--neon-cyan);
      position: relative; z-index: 1;
    }
    .mode-button {
      padding: 22px 64px; margin: 16px; font-size: 22px; font-family: 'Orbitron', sans-serif; font-weight: 700;
      letter-spacing: 0.15em;
      border: 2px solid var(--glass-border);
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      color: var(--neon-cyan);
      cursor: pointer;
      transition: all 0.35s ease;
      text-shadow: 0 0 12px var(--neon-cyan);
      box-shadow: 0 0 25px rgba(0, 245, 255, 0.2), inset 0 0 30px rgba(0, 245, 255, 0.05);
      position: relative; z-index: 1;
    }
    .mode-button:hover {
      background: rgba(155, 92, 255, 0.25);
      color: #fff;
      border-color: var(--neon-magenta);
      transform: scale(1.08);
      box-shadow: 0 0 40px rgba(255, 0, 229, 0.5), 0 0 60px rgba(0, 245, 255, 0.3);
      text-shadow: 0 0 20px #fff;
    }
    #oscilloscope { position: relative; }
    .scope-frame { position: absolute; width: 100%; height: 100%; pointer-events: none; }
    #gazeCursorOverlay {
      position: fixed; left: 50%; top: 50%; width: 24px; height: 24px; margin: -12px 0 0 -12px;
      border: 2px solid rgba(0, 245, 255, 0.95); border-radius: 50%; box-shadow: 0 0 12px rgba(0, 245, 255, 0.8);
      pointer-events: none; z-index: 8888; display: none;
    }
    #gazeCursorOverlay::before {
      content: ''; position: absolute; left: 50%; top: 50%; width: 8px; height: 8px; margin: -4px 0 0 -4px;
      border: 1px solid rgba(0, 245, 255, 0.6); border-radius: 50%;
    }
    .scope-glass {
      position: absolute; width: calc(100% - 0.02); height: calc(100% - 0.02); left: 0.01; top: 0.01;
      background: linear-gradient(135deg, rgba(0, 245, 255, 0.06) 0%, rgba(255, 0, 229, 0.04) 100%);
      pointer-events: none;
    }
  </style>
</head>

function encodeAudioBufferToWavBase64(buf) {
  if (!buf || !buf.length || !buf.numberOfChannels) return null;
  const numCh = buf.numberOfChannels;
  const len = buf.length;
  const sampleRate = buf.sampleRate;
  const bytesPerSample = 2;
  const dataLen = len * numCh * bytesPerSample;
  const headerLen = 44;
  const total = headerLen + dataLen;
  const arr = new Uint8Array(total);
  const view = new DataView(arr.buffer);
  const writeStr = (offset, s) => { for (let i = 0; i < s.length; i++) arr[offset + i] = s.charCodeAt(i); };
  writeStr(0, 'RIFF');
  view.setUint32(4, total - 8, true);
  writeStr(8, 'WAVE');
  writeStr(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, numCh, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * numCh * bytesPerSample, true);
  view.setUint16(32, numCh * bytesPerSample, true);
  view.setUint16(34, 16, true);
  writeStr(36, 'data');
  view.setUint32(40, dataLen, true);
  const ch0 = buf.getChannelData(0);
  const ch1 = numCh > 1 ? buf.getChannelData(1) : ch0;
  for (let i = 0; i < len; i++) {
    const s0 = Math.max(-1, Math.min(1, ch0[i]));
    const s1 = Math.max(-1, Math.min(1, ch1[i]));
    view.setInt16(headerLen + i * 4, s0 < 0 ? s0 * 0x8000 : s0 * 0x7FFF, true);
    view.setInt16(headerLen + i * 4 + 2, s1 < 0 ? s1 * 0x8000 : s1 * 0x7FFF, true);
  }
  let b64 = '';
  const chunk = 8192;
  for (let i = 0; i < arr.length; i += chunk) {
    b64 += String.fromCharCode.apply(null, arr.subarray(i, i + chunk));
  }
  return btoa(b64);
}

function decodeWavBase64ToArrayBuffer(b64) {
  try {
    const binary = atob(b64);
    const len = binary.length;
    const arr = new Uint8Array(len);
    for (let i = 0; i < len; i++) arr[i] = binary.charCodeAt(i);
    return arr.buffer;
  } catch (_) { return null; }
}

function syncTrackFromDisplay() {
  let d = (state.displayTrack != null && !isNaN(state.displayTrack)) ? state.displayTrack : 0;
  const maxTrack = state.drumReduceOn ? 8 : 7;
  if (d > maxTrack) { state.displayTrack = maxTrack; d = maxTrack; }
  state.displayTrack = d;
  if (d < 4) {
    state.currentTrack = 0;
    state.selectedDrum = ['kick', 'snare', 'hihat', 'open'][d];
  } else if (d === 8) {
    state.currentTrack = 4;  // Strings: no step data, use arp for compat
    state.selectedDrum = 'kick';
  } else {
    state.currentTrack = d - 3;
    state.selectedDrum = 'kick';
  }
}

function startMode(mode) {
  currentMode = mode;
  const startScreen = document.getElementById('startScreen');
  const scene = document.getElementById('mainScene');
  const rig = document.getElementById('rig');
  const camera = document.getElementById('mainCamera');

  startScreen.style.display = 'none';
  startScreen.style.visibility = 'hidden';
  scene.style.display = 'block';
  scene.style.visibility = 'visible';
  // Force reflow so canvas gets real dimensions (was 0x0 when scene was display:none)
  void scene.offsetHeight;
  window.dispatchEvent(new Event('resize'));
  if (typeof scene.resize === 'function') scene.resize();
  // Pick random skybox and turn on skyboxes when starting the synth
  if (typeof setRandomSkyboxOnLoad === 'function') setRandomSkyboxOnLoad();
  state.skyboxEnabled = true;
  if (typeof applySkybox === 'function') applySkybox();

  if (mode === 'vr') {
    rig.setAttribute('position', '0 1 0.1');
    camera.setAttribute('wasd-controls', 'enabled: true');
    camera.setAttribute('look-controls', 'enabled: true; pointerLockEnabled:true; mouseEnabled:true');
    if (state && state.gazeModeOn && typeof ensureGazeAudioStream === 'function') {
      ensureGazeAudioStream();
    }
    var doEnter = function () {
      if (typeof scene.resize === 'function') scene.resize();
      if (typeof scene.enterVR === 'function') scene.enterVR();
    };
    requestAnimationFrame(doEnter);
  } else if (mode === 'ar') {
    rig.setAttribute('position', '0 1 0.1');
    camera.setAttribute('wasd-controls', 'enabled: true');
    camera.setAttribute('look-controls', 'enabled: true; pointerLockEnabled:true; mouseEnabled:true');
    var doEnterAR = function () {
      if (typeof scene.resize === 'function') scene.resize();
      if (typeof scene.enterAR === 'function') scene.enterAR();
    };
    requestAnimationFrame(doEnterAR);
  } else {
    // Desktop mode: mouse look and click, no gaze cursor
    rig.setAttribute('position', '0 1.7 0.1');
    camera.setAttribute('wasd-controls', 'enabled: false');
    camera.setAttribute('look-controls', 'enabled: true; pointerLockEnabled: false; mouseEnabled: true; magicWindowTrackingEnabled: false');
    if (typeof applyDesktopVsVrCursor === 'function') applyDesktopVsVrCursor();
  }

  // Gaze cursor overlay (VR only; desktop uses mouse, no overlay)
  const overlay = document.getElementById('gazeCursorOverlay');
  if (overlay && currentMode === 'desktop') overlay.style.display = 'none';
  if (overlay && currentMode !== 'desktop') overlay.style.display = state.gazeModeOn ? 'block' : 'none';
  if (camera && !document.getElementById('gazeCursorRing')) {
    const ring = document.createElement('a-ring');
    ring.setAttribute('id', 'gazeCursorRing');
    ring.setAttribute('cursor-always-on-top', '');
    ring.setAttribute('position', '0 0 -0.15');
    ring.setAttribute('radius-inner', '0.0018');
    ring.setAttribute('radius-outer', '0.003');
    ring.setAttribute('color', '#00f5ff');
    ring.setAttribute('material', 'shader:flat;emissive:#00f5ff;emissiveIntensity:1.3;transparent:true;opacity:0.95;depthTest:false;depthWrite:false');
    ring.setAttribute('visible', 'false');
    camera.appendChild(ring);
  }

  setTimeout(() => {
    if (!audioInitialized) initAudio();
  }, 500);
  applyGazeModeVisuals();
}

function handleMIDIMessage(message) {
  // **REDUCE CONSOLE LOGGING FOR PERFORMANCE**
  // Only log first few messages, then throttle to avoid console spam
  if (!window._midiMessageCount) window._midiMessageCount = 0;
  window._midiMessageCount++;
  
  const [status, note, velocity] = message.data;
  const command = status & 0xf0;
  const channel = status & 0x0f;
 
  // Log first 3 messages in detail, then only log every 100th message
  if (window._midiMessageCount <= 3 || window._midiMessageCount % 100 === 0) {
    console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
    console.log(`🎹 MIDI MESSAGE #${window._midiMessageCount} RECEIVED`);
    console.log(`   Raw data: [${message.data.join(', ')}]`);
    console.log(`   Status: ${status} (0x${status.toString(16)})`);
    console.log(`   Command: ${command} (0x${command.toString(16)})`);
    console.log(`   Channel: ${channel + 1}`);
    console.log(`   Note: ${note}`);
    console.log(`   Velocity: ${velocity}`);
    console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
  }
 
  // Note On (144-159)
  if (command === 144 && velocity > 0) {
    console.log('✅ Processing as NOTE ON');
    handleMIDINoteOn(note, velocity);
  }
  // Note Off (128-143) or Note On with velocity 0
  else if (command === 128 || (command === 144 && velocity === 0)) {
    console.log('✅ Processing as NOTE OFF');
    handleMIDINoteOff(note);
  } else {
    console.log('⚠️ Ignoring (not a note message)');
  }
}

// Pitch ratio for playing a sample at baseNote to hear target note: 2^(semitones/12), one semitone = 2^(1/12).
function rateFor(note, baseNote = 'C4') {
  const targetMidi = midiOf(note);
  const baseMidi = midiOf(baseNote);
  const semitones = targetMidi - baseMidi;
  return Math.pow(2, semitones / 12);
}

// Half-octave sampling (C, G, C, G...): pick the sample at or below the note so we only pitch UP (rate >= 1), matching the C/G/C/G recording.
function getHalfOctaveSampleForNote(note) {
  const midi = midiOf(note);
  const baseMidis = HALF_OCTAVE_BASES.map(function (b) { return midiOf(b); });
  // Use highest base <= note (so we never pitch down when note is above lowest base)
  let best = 0;
  for (let i = 0; i < baseMidis.length; i++) {
    if (baseMidis[i] <= midi) best = i;
  }
  return { index: best, base: HALF_OCTAVE_BASES[best] };
}

function midiOf(note) {
  if (note == null) return 60;
  if (typeof note === 'number' && !isNaN(note)) return Math.max(0, Math.min(127, Math.round(note)));
  // Normalize: only keep letter, optional #/b, and digits (scientific pitch: C4 = 60)
  const s = String(note).trim().replace(/[\s\u00a0]/g, '');
  const match = s.match(/^([A-Ga-g])([#b])?(-?\d+)$/);
  if (!match) return 60;
  const letter = match[1].toUpperCase();
  const acc = (match[2] || '').toLowerCase();
  const noteName = letter + (acc === 'b' ? 'b' : acc === '#' ? '#' : '');
  const noteMap = { 'C': 0, 'C#': 1, 'Db': 1, 'D': 2, 'D#': 3, 'Eb': 3, 'E': 4, 'F': 5, 'F#': 6, 'Gb': 6, 'G': 7, 'G#': 8, 'Ab': 8, 'A': 9, 'A#': 10, 'Bb': 10, 'B': 11 };
  const octave = parseInt(match[3], 10);
  if (isNaN(octave)) return 60;
  const noteIndex = noteMap[noteName];
  if (noteIndex === undefined) return 60;
  return (octave + 1) * 12 + noteIndex;
}

function midiToNote(midiNum) {
  const noteNames = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
  const octave = Math.floor(midiNum / 12) - 1;
  const noteName = noteNames[midiNum % 12];
  return noteName + octave;
}

function transposeNote(note, semitones) {
  if (!note || note === '-' || note === '^' || note === '/' || note === 'REST' || note === 'TIE') return note;
  const midi = midiOf(note);
  const newMidi = Math.max(0, Math.min(127, midi + semitones));
  return midiToNote(newMidi);
}

// Scale intervals (semitones from root): major, minor, pentatonic major, pentatonic minor, blues
var scaleIntervals = [
  [0, 2, 4, 5, 7, 9, 11],           // major
  [0, 2, 3, 5, 7, 8, 10],           // minor
  [0, 2, 4, 7, 9],                  // pentatonic major
  [0, 3, 5, 7, 10],                 // pentatonic minor
  [0, 3, 5, 6, 7, 10]               // blues
];
var scaleNames = ['Major', 'Minor', 'PentMaj', 'PentMin', 'Blues'];
var rootNames = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];

function getLightHarpNote(beamIndex, fixedNote) {
  if (!state.scaleCycleOn || state.scaleRoot == null || state.scaleType == null) return fixedNote;
  var intervals = scaleIntervals[state.scaleType] || scaleIntervals[0];
  var rootMidi4 = 60 + (state.scaleRoot || 0); // C4 = 60
  var degree = beamIndex % intervals.length;
  var octaveShift = Math.floor(beamIndex / intervals.length);
  var midi = rootMidi4 + intervals[degree] + octaveShift * 12;
  midi = Math.max(0, Math.min(127, midi));
  return midiToNote(midi);
}

// MIDI Export Function
function exportToMIDI() {
  try {
    console.log('🎹 Exporting to MIDI...');
   
    // Simple MIDI file builder
    const ppq = 480; // Pulses per quarter note
    const tempo = state.tempo;
    const microsecondsPerBeat = Math.floor(60000000 / tempo);
   
    // MIDI header
    const header = [
      0x4D, 0x54, 0x68, 0x64, // "MThd"
      0x00, 0x00, 0x00, 0x06, // Header length
      0x00, 0x01, // Format 1 (multiple tracks)
      0x00, 0x05, // 5 tracks (drums + 4 instruments)
      (ppq >> 8) & 0xFF, ppq & 0xFF // Ticks per quarter note
    ];
   
    const tracks = [];
   
    // Helper to create variable length value
    const varLen = (val) => {
      if (val < 128) return [val];
      const bytes = [];
      bytes.unshift(val & 0x7F);
      val >>= 7;
      while (val > 0) {
        bytes.unshift((val & 0x7F) | 0x80);
        val >>= 7;
      }
      return bytes;
    };
   
    // Create track for each instrument
    const trackNames = ['Drums', 'Bass', 'Lead', 'Pad', 'Arp'];
    const channels = [9, 0, 1, 2, 3]; // Channel 9 is drums
   
    for (let trackIdx = 0; trackIdx < 5; trackIdx++) {
      const trackEvents = [];
     
      // Track name
      const name = trackNames[trackIdx];
      trackEvents.push(...[0x00, 0xFF, 0x03, name.length, ...name.split('').map(c => c.charCodeAt(0))]);
     
      // Tempo (only in first track)
      if (trackIdx === 0) {
        trackEvents.push(...[
          0x00, 0xFF, 0x51, 0x03,
          (microsecondsPerBeat >> 16) & 0xFF,
          (microsecondsPerBeat >> 8) & 0xFF,
          microsecondsPerBeat & 0xFF
        ]);
      }
     
      // Add notes from all patterns in song arrangement
      let currentTick = 0;
      const ticksPerStep = ppq / 4; // 16th notes
     
      for (let arrIdx = 0; arrIdx < 64; arrIdx++) {
        const patNum = state.songArrangement[arrIdx];
        if (patNum === 0) break;
       
        const pat = patterns[patNum - 1];
       
        for (let step = 0; step < 64; step++) {
          const deltaTime = varLen(step === 0 && arrIdx === 0 ? 0 : ticksPerStep);
         
          if (trackIdx === 0) {
            // Drums
            const drumMap = { kick: 36, snare: 38, hihat: 42, open: 46 };
            ['kick', 'snare', 'hihat', 'open'].forEach(drum => {
              if (pat.drums[drum][step]) {
                const note = drumMap[drum];
                const vel = Math.floor((pat.drumVelocity[drum][step] || 1.0) * 100);
                trackEvents.push(...deltaTime, 0x99, note, vel); // Note on
                trackEvents.push(...varLen(ticksPerStep - 10), 0x89, note, 0); // Note off
              }
            });
          } else {
            // Melodic instruments
            const trackKey = ['', 'bass', 'lead', 'pad', 'arp'][trackIdx];
            const noteStr = pat[trackKey][step];
            if (noteStr && noteStr !== '-' && noteStr !== '^' && noteStr !== '/') {
              const midiNote = midiOf(noteStr);
              const vel = Math.floor((pat.velocity[trackKey][step] || 0.8) * 100);
              const channel = channels[trackIdx];
              trackEvents.push(...deltaTime, 0x90 | channel, midiNote, vel); // Note on
              trackEvents.push(...varLen(ticksPerStep - 10), 0x80 | channel, midiNote, 0); // Note off
            }
          }
         
          currentTick += ticksPerStep;
        }
      }
     
      // End of track
      trackEvents.push(...[0x00, 0xFF, 0x2F, 0x00]);
     
      // Build track chunk
      const trackHeader = [
        0x4D, 0x54, 0x72, 0x6B, // "MTrk"
        (trackEvents.length >> 24) & 0xFF,
        (trackEvents.length >> 16) & 0xFF,
        (trackEvents.length >> 8) & 0xFF,
        trackEvents.length & 0xFF
      ];
     
      tracks.push([...trackHeader, ...trackEvents]);
    }
   
    // Combine all tracks
    const midiData = new Uint8Array([...header, ...tracks.flat()]);
   
    // Download
    const blob = new Blob([midiData], { type: 'audio/midi' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'mobile5000_song.mid';
    a.click();
    URL.revokeObjectURL(url);
   
    showMessage('💾 MIDI EXPORTED');
    console.log('✅ MIDI export complete');
  } catch (err) {
    console.error('❌ MIDI export failed:', err);
    showMessage('❌ MIDI EXPORT FAILED');
  }
}

async function loadBankFromGitHub(bankIndex) {
  const n = bankIndex + 1;
  try {
    if (n <= 6) {
      const bankFolder = '/bank' + n;
      state.currentBank = bankIndex;
      state.soundIndex = { bass: 0, lead: 0, pad: 0, arp: 0 };
      // On remote (CodePen): try jsDelivr first (sends CORS * so direct fetch often works). Local: try GitHub raw first.
      const tryJsDelivrFirst = isRemoteOrigin();
      let baseUrl = tryJsDelivrFirst ? (GITHUB_BANKS_FALLBACK_BASE + bankFolder) : (GITHUB_BANKS_BASE + bankFolder);
      let data = buildBankFromFolder(baseUrl);
      BANKS[bankIndex] = data;
      if (tryJsDelivrFirst) console.log('Bank ' + n + ': trying jsDelivr first (remote host)...');
      await loadCurrentBankSamples();
      if (!hasMelodicBuffersLoaded()) {
        baseUrl = tryJsDelivrFirst ? (GITHUB_BANKS_BASE + bankFolder) : (GITHUB_BANKS_FALLBACK_BASE + bankFolder);
        data = buildBankFromFolder(baseUrl);
        BANKS[bankIndex] = data;
        if (tryJsDelivrFirst) console.log('Bank ' + n + ': jsDelivr failed, trying GitHub raw...');
        await loadCurrentBankSamples();
      }
      if (!hasMelodicBuffersLoaded()) {
        console.warn('Bank ' + n + ': GitHub/jsDelivr failed, using default samples.');
        BANKS[bankIndex] = SAMPLE_BANKS;
        await loadCurrentBankSamples();
      }
      let source = 'defaults';
      if (hasMelodicBuffersLoaded()) {
        const bank = getActiveBank();
        const u = (bank.lead && bank.lead[0] && (bank.lead[0].url || bank.lead[0].file)) || '';
        source = u.indexOf('jsdelivr') !== -1 ? 'jsDelivr' : u.indexOf('raw.githubusercontent') !== -1 ? 'GitHub' : 'defaults';
      }
      if (typeof updateSynthBankButtonVisuals === 'function') updateSynthBankButtonVisuals();
      if (typeof showMessage === 'function') showMessage('Bank ' + n + ' loaded (' + source + ')');
      return true;
    }
    const baseUrl = GITHUB_BANKS_BASE + '/bank' + n;
    const url = baseUrl + '.json';
    const response = await fetch(url);
    if (!response.ok) throw new Error('HTTP ' + response.status);
    const data = await response.json();
    if (data.drums && data.bass && data.lead && data.pad && data.arp) {
      if (!data.strings || !data.strings.length) data.strings = [{ name: 'Strings', url: baseUrl + '/' + GITHUB_BANK_STRINGS_FILE, base: 'C4' }];
      BANKS[bankIndex] = data;
      state.currentBank = bankIndex;
      await loadCurrentBankSamples();
      if (typeof updateSynthBankButtonVisuals === 'function') updateSynthBankButtonVisuals();
      if (typeof showMessage === 'function') showMessage('Bank ' + n + ' loaded');
      return true;
    }
  } catch (err) {
    console.warn('Bank ' + n + ' load failed:', err);
    if (typeof showMessage === 'function') showMessage('Bank ' + n + ' not found');
  }
  return false;
}

function isRemoteOrigin() {
  try {
    const o = (typeof location !== 'undefined' && location.origin) || '';
    if (!o || o === 'null') return true;
    if (/^file:\/\//i.test(o)) return false;
    if (/localhost|127\.0\.0\.1/i.test(o)) return false;
    return true;
  } catch (_) { return true; }
}
// Only proxy GitHub raw URLs on remote (CodePen). Never proxy jsDelivr - it sends CORS * and works direct.
function fetchSample(url) {
  if (!url) return fetch('');
  const useProxy = isRemoteOrigin() && url.indexOf('raw.githubusercontent.com') !== -1;
  const actualUrl = useProxy ? ('https://corsproxy.io/?url=' + encodeURIComponent(url)) : url;
  return fetch(actualUrl);
}

async function loadCurrentBankSamples() {
  const bank = getActiveBank();
  if (!bank.drums) return;
  if (!buffers.drums) buffers.drums = {};
  // When loading from GitHub/jsDelivr, clear melodic buffers first so we can detect if fetch failed (e.g. CodePen CORS)
  const firstUrl = (bank.lead && bank.lead[0] && (bank.lead[0].url || bank.lead[0].file)) || '';
  if (firstUrl.indexOf('raw.githubusercontent.com') !== -1 || firstUrl.indexOf('cdn.jsdelivr.net') !== -1) {
    buffers.bass = [];
    buffers.lead = [];
    buffers.pad = [];
    buffers.arp = [];
  }
  for (const [drum, url] of Object.entries(bank.drums)) {
    try {
      const response = await fetchSample(url);
      if (!response.ok) continue;
      const arrayBuffer = await response.arrayBuffer();
      buffers.drums[drum] = await audioContext.decodeAudioData(arrayBuffer);
    } catch (_) {}
  }
  for (const type of ['bass', 'lead', 'pad', 'arp']) {
    if (!bank[type] || !Array.isArray(bank[type])) continue;
    if (!buffers[type]) buffers[type] = [];
    for (let i = 0; i < bank[type].length; i++) {
      try {
        const item = bank[type][i];
        const url = item.url || item.file;
        if (!url) continue;
        const response = await fetchSample(url);
        if (!response.ok) continue;
        const arrayBuffer = await response.arrayBuffer();
        buffers[type][i] = await audioContext.decodeAudioData(arrayBuffer);
      } catch (_) {}
    }
  }
  if (bank.strings && Array.isArray(bank.strings) && bank.strings[0]) {
    try {
      const item = bank.strings[0];
      const url = item.url || item.file;
      if (url) {
        const response = await fetchSample(url);
        if (response.ok) {
          const arrayBuffer = await response.arrayBuffer();
          if (!buffers.strings) buffers.strings = [];
          buffers.strings[0] = await audioContext.decodeAudioData(arrayBuffer);
          if (typeof showMessage === 'function') showMessage('Strings loaded');
        } else {
          if (!buffers.strings) buffers.strings = [];
          buffers.strings[0] = null;
        }
      }
    } catch (e) {
      if (!buffers.strings) buffers.strings = [];
      buffers.strings[0] = null;
    }
  } else {
    if (buffers.strings) buffers.strings[0] = null;
  }
}

// Simple subtractive synth engine for LEAD track (dual osc + filter + envelope)
const DEFAULT_LEAD_SYNTH_PARAMS = {
  osc1Type: 'sawtooth',
  osc2Type: 'triangle',  // triangle = less buzzy, more analog than square
  oscMix: 0.5,
  detuneCents: 5,
  filterType: 'lowpass',
  filterCutoff: 1200,
  filterQ: 6,
  filterEnvAmount: 1400,
  preDrive: 1.3,
  subGain: 0.2,
  envAttack: 0.012,
  envDecay: 0.2,
  envSustain: 0.6,
  envRelease: 0.28
};

let leadSynthParams = { ...DEFAULT_LEAD_SYNTH_PARAMS };
let padSynthParams = null;
let arpSynthParams = null;
let bass303Params = null;
let leadSynthVoices = [];

function midiToFreq(midiNote) {
  return 440 * Math.pow(2, (midiNote - 69) / 12);
}

function connectSynthToTrackEffects(outputNode, trackIdx) {
  if (!audioContext || !masterGain) return;

  // Insert per-track pan before FX/master
  let finalNode = outputNode;
  const panner = audioContext.createStereoPanner ? audioContext.createStereoPanner() : null;
  if (panner && typeof trackIdx === 'number' && trackIdx >= 0) {
    const panVal = (state.trackPans[trackIdx + 1] || 0) / 7;
    panner.pan.value = panVal;
    finalNode.connect(panner);
    finalNode = panner;
  }
  const applyReverb = state.reverbEnabled && state.reverbTrack > 0 && trackIdx != null && trackIdx >= 0 && state.reverbTrack === trackIdx + 1;
  const applyChorus = state.chorusEnabled && state.chorusTrack > 0 && trackIdx != null && trackIdx >= 0 && state.chorusTrack === trackIdx + 1;

  if (applyReverb) {
    if (!reverbNode) {
      reverbNode = audioContext.createConvolver();
      const length = audioContext.sampleRate * 2;
      const impulse = audioContext.createBuffer(2, length, audioContext.sampleRate);
      for (let channel = 0; channel < 2; channel++) {
        const channelData = impulse.getChannelData(channel);
        for (let i = 0; i < length; i++) {
          channelData[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 2);
        }
      }
      reverbNode.buffer = impulse;
      reverbGain = audioContext.createGain();
      reverbGain.gain.value = 0.45;
      reverbNode.connect(reverbGain);
      reverbGain.connect(masterGain);
    }
    finalNode.connect(reverbNode);
  }

  if (applyChorus) {
    if (!chorusNode) {
      chorusNode = audioContext.createDelay(0.05);
      chorusNode.delayTime.value = 0.015;
      const chorusLFO = audioContext.createOscillator();
      const chorusLFOGain = audioContext.createGain();
      chorusLFO.type = 'sine';
      chorusLFO.frequency.value = 0.5;
      chorusLFOGain.gain.value = 0.008;
      chorusLFO.connect(chorusLFOGain);
      chorusLFOGain.connect(chorusNode.delayTime);
      chorusLFO.start();
      chorusGain = audioContext.createGain();
      chorusGain.gain.value = 0.7;
      chorusNode.connect(chorusGain);
      chorusGain.connect(masterGain);
    }
    finalNode.connect(chorusNode);
  }

  finalNode.connect(masterGain);
}

// Cached soft saturation curve for warmer, analog-like tone (used by all synth voices)
let _synthSaturateCurve = null;
function getSynthSaturateCurve() {
  if (_synthSaturateCurve) return _synthSaturateCurve;
  const len = 2048;
  const curve = new Float32Array(len);
  for (let i = 0; i < len; i++) {
    const x = (i / (len - 1)) * 2 - 1;
    curve[i] = Math.tanh(x * 1.4);
  }
  _synthSaturateCurve = curve;
  return curve;
}

function playSubtractiveVoice(params, freq, { gain = 0.8, startTime = null, trackIdx = 1, slideFromFreq = null } = {}) {
  if (!audioInitialized || !audioContext || !masterGain) return;

  const t0 = startTime || audioContext.currentTime;
  const p = params || DEFAULT_LEAD_SYNTH_PARAMS;

  // --- Oscillators ---------------------------------------------------------
  const osc1 = audioContext.createOscillator();
  const osc2 = audioContext.createOscillator();
  osc1.type = p.osc1Type;
  osc2.type = p.osc2Type;

  const detuneRatio = Math.pow(2, (p.detuneCents || 0) / 1200);
  const startFreq = slideFromFreq || freq;
  osc1.frequency.setValueAtTime(startFreq, t0);
  osc2.frequency.setValueAtTime(startFreq * detuneRatio, t0);
  if (slideFromFreq && slideFromFreq !== freq) {
    const slideTime = (p.slideTime || 0.08);
    osc1.frequency.linearRampToValueAtTime(freq, t0 + slideTime);
    osc2.frequency.linearRampToValueAtTime(freq * detuneRatio, t0 + slideTime);
  }

  // Crossfade between osc1/osc2 (no FM) for a more classic analog tone
  const mix1 = audioContext.createGain();
  const mix2 = audioContext.createGain();
  mix1.gain.value = 1 - (p.oscMix ?? 0.5);
  mix2.gain.value = p.oscMix ?? 0.5;

  // Sub oscillator (sine at half freq) for analog-style weight
  const subGain = (p.subGain != null ? p.subGain : 0.22);
  let subOsc = null;
  if (subGain > 0.001) {
    subOsc = audioContext.createOscillator();
    subOsc.type = 'sine';
    subOsc.frequency.setValueAtTime(startFreq * 0.5, t0);
    if (slideFromFreq && slideFromFreq !== freq) {
      subOsc.frequency.linearRampToValueAtTime(freq * 0.5, t0 + (p.slideTime || 0.08));
    }
  }

  // New analog-style filter engine:
  // - gentle pre-drive into filter
  // - cascaded lowpass for 24 dB/oct
  // - resonance range extended so cutoff + Q are much more expressive
  const preDrive = audioContext.createGain();
  preDrive.gain.value = p.preDrive != null ? p.preDrive : 1.4;

  const saturate = audioContext.createWaveShaper();
  saturate.curve = getSynthSaturateCurve();
  saturate.oversample = '4x';

  const filter1 = audioContext.createBiquadFilter();
  const filter2 = audioContext.createBiquadFilter();
  const filterType = p.filterType || 'lowpass';
  filter1.type = filterType;
  filter2.type = filterType;

  const rawCutoff = p.filterCutoff || 1200;
  const keyTrack = 1 + 0.18 * Math.log2(Math.max(20, freq) / 261.63);
  const baseCutoff = Math.min(16000, rawCutoff * keyTrack);
  const qBase = Math.max(0.1, p.filterQ || 4);
  const q1 = Math.min(30, qBase * 1.1);
  const q2 = Math.min(30, qBase * 0.9);
  filter1.frequency.setValueAtTime(baseCutoff, t0);
  filter1.Q.setValueAtTime(q1, t0);
  filter2.frequency.setValueAtTime(baseCutoff, t0);
  filter2.Q.setValueAtTime(q2, t0);

  // Optional LFO sweep for ARP when enabled
  let sweepOsc = null, sweepGain = null;
  if (trackIdx === 3 && state.arpSweepOn) {
    const depth = (p.sweepDepth || 900);
    const rate = (p.sweepRate || 0.2);
    sweepOsc = audioContext.createOscillator();
    sweepGain = audioContext.createGain();
    sweepOsc.type = 'sine';
    sweepOsc.frequency.value = rate;
    sweepGain.gain.value = depth;
    sweepOsc.connect(sweepGain);
    sweepGain.connect(filter1.frequency);
    sweepGain.connect(filter2.frequency);
    sweepOsc.start(t0);
  }

  // Amplitude envelope
  const amp = audioContext.createGain();
  const a = Math.max(0.001, p.envAttack || 0.01);
  const d = Math.max(0.01, p.envDecay || 0.15);
  const s = Math.max(0, Math.min(1, p.envSustain != null ? p.envSustain : 0.6));
  const r = Math.max(0.03, p.envRelease || 0.2);

  amp.gain.cancelScheduledValues(t0);
  amp.gain.setValueAtTime(0.0001, t0);
  amp.gain.linearRampToValueAtTime(gain, t0 + a);
  amp.gain.linearRampToValueAtTime(gain * s, t0 + a + d);
  amp.gain.setTargetAtTime(0.0001, t0 + a + d + 0.4, r);

  // Filter envelope – larger range and steeper movement for more obvious sweeps
  const envAmt = p.filterEnvAmount || 0;
  if (envAmt !== 0) {
    const peakCutoff = Math.min(18000, baseCutoff + envAmt * 1.1);
    filter1.frequency.cancelScheduledValues(t0);
    filter2.frequency.cancelScheduledValues(t0);
    filter1.frequency.setValueAtTime(baseCutoff, t0);
    filter2.frequency.setValueAtTime(baseCutoff, t0);
    filter1.frequency.linearRampToValueAtTime(peakCutoff, t0 + a);
    filter2.frequency.linearRampToValueAtTime(peakCutoff, t0 + a);
    filter1.frequency.linearRampToValueAtTime(baseCutoff, t0 + a + d);
    filter2.frequency.linearRampToValueAtTime(baseCutoff, t0 + a + d);
  }

  // Wiring
  osc1.connect(mix1);
  osc2.connect(mix2);
  mix1.connect(preDrive);
  mix2.connect(preDrive);
  if (subOsc) {
    const subG = audioContext.createGain();
    subG.gain.value = subGain;
    subOsc.connect(subG);
    subG.connect(preDrive);
    subOsc.start(t0);
  }

  preDrive.connect(filter1);
  filter1.connect(filter2);
  filter2.connect(saturate);
  saturate.connect(amp);

  connectSynthToTrackEffects(amp, trackIdx);

  osc1.start(t0);
  osc2.start(t0);
  const stopTime = t0 + a + d + r + 0.6;
  osc1.stop(stopTime);
  osc2.stop(stopTime);
  if (subOsc) subOsc.stop(stopTime);

  const voice = { osc1, osc2, amp, filter1, filter2, saturate, sweepOsc, sweepGain, subOsc };
  leadSynthVoices.push(voice);
  osc2.addEventListener('ended', () => {
    const idx = leadSynthVoices.indexOf(voice);
    if (idx >= 0) leadSynthVoices.splice(idx, 1);
    try {
      if (sweepOsc) sweepOsc.stop();
    } catch (_) {}
    try {
      if (sweepOsc) sweepOsc.disconnect();
      if (sweepGain) {
        sweepGain.disconnect();
      }
      osc1.disconnect();
      osc2.disconnect();
      mix1.disconnect();
      mix2.disconnect();
      saturate.disconnect();
      filter1.disconnect();
      filter2.disconnect();
      amp.disconnect();
      if (subOsc) subOsc.disconnect();
    } catch (_) {}
  });
}

function playLeadSynthVoice(freq, opts = {}) {
  playSubtractiveVoice(leadSynthParams || DEFAULT_LEAD_SYNTH_PARAMS, freq, opts);

}

  lastBass303Freq = freq;
}

function playBuffer(buf, { gain = 1, pan = 0, rate = 1, decay = 1, startTime = 0, trackIdx = null, chordLineStringsCapture = false } = {}) {
  if (!audioInitialized || !buf) {
    console.warn('⚠️ Audio not initialized or buffer missing');
    return;
  }
  const src = audioContext.createBufferSource();
  src.buffer = buf;
  
  // Apply loop settings if enabled for this track
  if (state.loopEnabled && state.loopTrack > 0 && trackIdx !== null && trackIdx >= 0 && state.loopTrack === trackIdx + 1) {
    src.loop = true;
    const loopStart = state.loopStartTime[state.loopTrack] || 0;
    const loopEnd = state.loopEndTime[state.loopTrack] || buf.duration;
    src.loopStart = loopStart;
    src.loopEnd = loopEnd;
  }
  
  const g = audioContext.createGain();
  let when = startTime || audioContext.currentTime;
  if (when < audioContext.currentTime) when = audioContext.currentTime + 0.002;
  const duration = buf.duration * decay;
  g.gain.setValueAtTime(gain, when);
  g.gain.linearRampToValueAtTime(0.001, when + duration);
  const p = audioContext.createStereoPanner ? audioContext.createStereoPanner() : null;
  let outputNode = g;
  
  if (p) {
    p.pan.value = Math.max(-1, Math.min(1, pan));
    src.connect(g);
    g.connect(p);
    outputNode = p;
  } else {
    src.connect(g);
    outputNode = g;
  }
  
  // Apply reverb if enabled for this track
  const applyReverb = state.reverbEnabled && state.reverbTrack > 0 && trackIdx !== null && trackIdx >= 0 && state.reverbTrack === trackIdx + 1;
  const applyChorus = state.chorusEnabled && state.chorusTrack > 0 && trackIdx !== null && trackIdx >= 0 && state.chorusTrack === trackIdx + 1;
  
  if (applyReverb) {
    if (!reverbNode) {
      reverbNode = audioContext.createConvolver();
      // Create a simple impulse response for reverb
      const length = audioContext.sampleRate * 2; // 2 seconds
      const impulse = audioContext.createBuffer(2, length, audioContext.sampleRate);
      for (let channel = 0; channel < 2; channel++) {
        const channelData = impulse.getChannelData(channel);
        for (let i = 0; i < length; i++) {
          channelData[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 2);
        }
      }
      reverbNode.buffer = impulse;
      reverbGain = audioContext.createGain();
      reverbGain.gain.value = 0.45;
      reverbNode.connect(reverbGain);
      reverbGain.connect(masterGain);
    }
    outputNode.connect(reverbNode);
  }
  
  if (applyChorus) {
    if (!chorusNode) {
      chorusNode = audioContext.createDelay(0.05);
      chorusNode.delayTime.value = 0.015; // Slower, richer delay
      const chorusLFO = audioContext.createOscillator();
      const chorusLFOGain = audioContext.createGain();
      chorusLFO.type = 'sine';
      chorusLFO.frequency.value = 0.5; // Slower LFO for richer sound
      chorusLFOGain.gain.value = 0.008; // More modulation depth
      chorusLFO.connect(chorusLFOGain);
      chorusLFOGain.connect(chorusNode.delayTime);
      chorusLFO.start();
      chorusGain = audioContext.createGain();
      chorusGain.gain.value = 0.7; // Higher mix for richer sound
      chorusNode.connect(chorusGain);
      chorusGain.connect(masterGain);
    }
    outputNode.connect(chorusNode);
  }
  
  // Always connect dry signal to master
  outputNode.connect(masterGain);
  src.playbackRate.value = rate;
  src.start(when);
  if (!src.loop) {
    src.stop(when + duration);
  }
  activeSources.push(src);
  if (chordLineStringsCapture) {
    chordLineStringsActiveSources.push(src);
    src.addEventListener('ended', () => {
      const i = chordLineStringsActiveSources.indexOf(src);
      if (i >= 0) chordLineStringsActiveSources.splice(i, 1);
    }, { once: true });
  }
  src.addEventListener('ended', () => {
    const i = activeSources.indexOf(src);
    if (i >= 0) activeSources.splice(i, 1);
    try { src.disconnect(); } catch (_) {}
  });
  if (activeSources.length > 50) {
    const old = activeSources.shift();
    try { old.stop(); old.disconnect(); } catch (_) {}
  }
}

function playInstrument(trackIdx, note, customVelocity = null) {
  if (!note || note === '-' || note === '^' || note === 'REST' || note === 'TIE') return;
  // Bass: play one octave down
  if (trackIdx === 0) note = transposeNote(note, -12);
  // MIDI OUTPUT
  if (state.midiOutEnabled) {
    const namesForMap = ['bass', 'lead', 'pad', 'arp'];
    const trackName = namesForMap[trackIdx] || 'bass';
    const map = state.midiChannelMap || {};
    const defaultMap = { bass: 2, lead: 3, pad: 4, arp: 5 };
    const chNum = Math.max(1, Math.min(16, (map[trackName] || defaultMap[trackName] || 1)));
    const midiChannel = chNum - 1; // sendMIDINote expects 0–15
    const midiNote = midiOf(note);
    sendMIDINote(midiChannel, midiNote, 100);
  }
  if (!note || note === '-' || note === '^' || note === 'REST' || note === 'TIE') return;
  console.log(`🎵 Playing: ${note} on track ${trackIdx}`);
  const names = ['bass', 'lead', 'pad', 'arp'];
  let type = names[trackIdx] || 'bass';
  const bank = getActiveBank();
  const ho = getHalfOctaveSampleForNote(note);
  const sel = Math.min(ho.index, (bank[type] && bank[type].length) ? bank[type].length - 1 : 0);
  const entry = (bank[type] && bank[type][sel]) ? bank[type][sel] : { base: ho.base };
  console.log(`  Type: ${type}, Half-octave index: ${sel}, Entry:`, entry);
  console.log(`  Buffer exists:`, buffers[type] && buffers[type][sel] ? 'YES' : 'NO');
  const volume = state.trackVolumes[trackIdx + 1] || 0.9;
  const pan = (state.trackPans[trackIdx + 1] || 0) / 7;
  const trackKey = names[trackIdx];
 
  // When mixOverride: use only track volume (ignore pattern velocity)
  let velocity = 0.8;
  if (state.mixOverride) {
    velocity = 1;
  } else if (customVelocity !== null) {
    velocity = customVelocity;
  } else {
    try {
      if (patterns[state.currentPattern] &&
          patterns[state.currentPattern].velocity &&
          patterns[state.currentPattern].velocity[trackKey]) {
        velocity = patterns[state.currentPattern].velocity[trackKey][state.currentStep] || 0.8;
      }
    } catch (e) {
      console.warn('Could not access velocity, using default');
    }
  }
 
  const finalVol = volume * velocity;
  const decay = state.trackDecay[trackIdx + 1] || 1.0;

  // Bass track: optionally TB-303 style synth
  if (type === 'bass' && state.bassMode === '303') {
    const midiNote = midiOf(note);
    const freq = midiToFreq(midiNote);
    const accented = Math.random() > 0.6;
    const gain303 = finalVol * (accented ? 1.3 : 0.9);
    playBass303Voice(freq, { gain: gain303, startTime: null, trackIdx });
    return;
  }

  // PAD track: optionally strings-y synth
  if (type === 'pad' && state.padMode === 'strings') {
    const midiNote = midiOf(note);
    const freq = midiToFreq(midiNote);
    playPadSynthVoice(freq, { gain: finalVol, startTime: null, trackIdx });
    return;
  }

  // ARP track: optionally synthy plucks
  if (type === 'arp' && state.arpMode === 'arpSynth') {
    const midiNote = midiOf(note);
    const freq = midiToFreq(midiNote);
    playArpSynthVoice(freq, { gain: finalVol, startTime: null, trackIdx });
    return;
  }

  // When synth mode is enabled, use subtractive synth for LEAD track instead of samples
  if (type === 'lead' && state.synthEnabled) {
    const midiNote = midiOf(note);
    const freq = midiToFreq(midiNote);
    playLeadSynthVoice(freq, { gain: finalVol, startTime: null, trackIdx });

    if (state.echoEnabled && state.echoTrack > 0 && state.echoTrack === trackIdx + 1 && echoTimings && echoTimings[state.echoTimingIndex]) {
      const echoSteps = echoTimings[state.echoTimingIndex][1];
      const stepInterval = 60.0 / state.tempo / 4.0;
      const echoDelay = echoSteps * stepInterval;
      const echoTime = audioContext.currentTime + echoDelay;
      playLeadSynthVoice(freq, { gain: finalVol * 0.6, startTime: echoTime, trackIdx });
    }
  } else if (buffers[type] && buffers[type][sel]) {
    console.log(`  ✅ Playing buffer for ${type}`);
    playBuffer(buffers[type][sel], { gain: finalVol, pan, rate: rateFor(note, entry.base || 'C4'), decay: decay, trackIdx: trackIdx });
    if (state.echoEnabled && state.echoTrack > 0 && state.echoTrack === trackIdx + 1 && echoTimings && echoTimings[state.echoTimingIndex]) {
      var echoSteps = echoTimings[state.echoTimingIndex][1];
      var stepInterval = 60.0 / state.tempo / 4.0;
      var echoDelay = echoSteps * stepInterval;
      var echoTime = audioContext.currentTime + echoDelay;
      playBuffer(buffers[type][sel], { gain: finalVol * 0.6, pan, rate: rateFor(note, entry.base || 'C4'), decay: decay, startTime: echoTime, trackIdx: trackIdx });
    }
  } else {
    console.error(`  ❌ Buffer missing for ${type}[${sel}]`);
  }
  // Only flash if this is the currently selected track
  if (state.currentTrack === trackIdx + 1) {
    flashPianoKeyByNote(note, trackIdx + 1);
  }
}

function playDrum(drumName) {
  if (!audioInitialized || !buffers.drums || !buffers.drums[drumName]) {
    console.warn(`⚠️ Drum ${drumName} not loaded`);
    return;
  }
 if (state.midiOutEnabled) {
   const drumMidiMap = { kick: 36, snare: 38, hihat: 42, open: 46 };
   const map = state.midiChannelMap || {};
   const key = drumName === 'open' ? 'openhi' : drumName;
   const chNum = Math.max(1, Math.min(16, (map[key] || 10)));
   const midiChannel = chNum - 1; // 0–15
   sendMIDINote(midiChannel, drumMidiMap[drumName], 100);
  }
 
  const drumIndex = ['kick', 'snare', 'hihat', 'open'].indexOf(drumName);
  if (drumIndex === -1) return;
  const volume = state.drumVolumes[drumIndex] || 0.9;
  const pan = (state.drumPans[drumIndex] || 0) / 7;
 
  // Safe velocity access - use default if pattern data not available
  let velocity = 1.0;
  try {
    if (patterns[state.currentPattern] &&
        patterns[state.currentPattern].drumVelocity &&
        patterns[state.currentPattern].drumVelocity[drumName]) {
      velocity = patterns[state.currentPattern].drumVelocity[drumName][state.currentStep] || 1.0;
    }
  } catch (e) {
    console.warn('Could not access drum velocity, using default');
  }
 
  // Per-kit flavour using playbackRate to make 909/808/CR78/707 clearly different
  let rate = 1.0;
  const kit = state.drumKit || 'default';
  if (kit === '808') {
    if (drumName === 'kick') rate = 0.6;
    else if (drumName === 'snare') rate = 0.9;
  } else if (kit === '909') {
    if (drumName === 'kick') rate = 0.8;
    else if (drumName === 'hihat') rate = 1.4;
  } else if (kit === 'cr78') {
    if (drumName === 'kick') rate = 1.2;
    else if (drumName === 'snare') rate = 1.1;
  } else if (kit === '707') {
    if (drumName === 'kick') rate = 0.9;
    else if (drumName === 'hihat') rate = 1.6;
  }

  const decay = (state.trackDecay[0] || 1) * (state.drumDecay && state.drumDecay[drumIndex] != null ? state.drumDecay[drumIndex] : (drumName === 'hihat' ? 0.25 : 1));
  playBuffer(buffers.drums[drumName], { gain: volume * velocity, pan, rate, decay });
 
  // Only flash piano key for drums if drums are selected (track 0)
  if (state.currentTrack === 0) {
    const drumNoteMap = { 'kick': 'C3', 'snare': 'D3', 'hihat': 'E3', 'open': 'F3' };
    flashPianoKeyByNote(drumNoteMap[drumName], 0);
  }
}

function playInstrumentScheduled(trackIdx, note, startTime, stepVelocity = 0.8, gainScale = 1) {
  if (!note || note === '-' || note === '^' || note === 'REST' || note === 'TIE') return;
  // Bass: play one octave down
  if (trackIdx === 0) note = transposeNote(note, -12);
  const names = ['bass', 'lead', 'pad', 'arp'];
  const type = names[trackIdx] || 'bass';
  const bank = getActiveBank();
  const ho = getHalfOctaveSampleForNote(note);
  const sel = Math.min(ho.index, (bank[type] && bank[type].length) ? bank[type].length - 1 : 0);
  const entry = (bank[type] && bank[type][sel]) ? bank[type][sel] : { base: ho.base };
  const velMult = state.mixOverride ? 1 : stepVelocity;
  let volume = (state.trackVolumes[trackIdx + 1] || 0.9) * gainScale * velMult;
  const pan = (state.trackPans[trackIdx + 1] || 0) / 7;
  const decay = state.trackDecay[trackIdx + 1] || 1.0;

  // Bass: TB-303 mode (scheduled)
  if (type === 'bass' && state.bassMode === '303') {
    const midiNote = midiOf(note);
    const freq = midiToFreq(midiNote);
    const accented = Math.random() > 0.6;
    const gain303 = volume * (accented ? 1.3 : 0.9);
    playBass303Voice(freq, {
      gain: gain303,
      startTime: startTime,
      trackIdx: trackIdx
    });
    return;
  }

  // PAD: strings mode (scheduled)
  if (type === 'pad' && state.padMode === 'strings') {
    const midiNote = midiOf(note);
    const freq = midiToFreq(midiNote);
    playPadSynthVoice(freq, {
      gain: volume,
      startTime: startTime,
      trackIdx: trackIdx
    });
    return;
  }

  // ARP: arp synth mode (scheduled)
  if (type === 'arp' && state.arpMode === 'arpSynth') {
    const midiNote = midiOf(note);
    const freq = midiToFreq(midiNote);
    playArpSynthVoice(freq, {
      gain: volume,
      startTime: startTime,
      trackIdx: trackIdx
    });
    return;
  }

  if (type === 'lead' && state.synthEnabled) {
    const midiNote = midiOf(note);
    const freq = midiToFreq(midiNote);
    playLeadSynthVoice(freq, {
      gain: volume,
      startTime: startTime,
      trackIdx: trackIdx
    });

    if (state.echoEnabled && state.echoTrack > 0 && state.echoTrack === trackIdx + 1 && echoTimings && echoTimings[state.echoTimingIndex]) {
      const echoSteps = echoTimings[state.echoTimingIndex][1];
      const stepInterval = 60.0 / state.tempo / 4.0;
      const echoDelay = echoSteps * stepInterval;
      const echoTime = startTime + echoDelay;
      playLeadSynthVoice(freq, {
        gain: volume * 0.6,
        startTime: echoTime,
        trackIdx: trackIdx
      });
    }
  } else {
    if (!buffers[type] || !buffers[type][sel]) return;
    playBuffer(buffers[type][sel], {
      gain: volume,
      pan: pan,
      rate: rateFor(note, entry.base || 'C4'),
      decay: decay,
      startTime: startTime,
      trackIdx: trackIdx
    });
  }
  
  // Echo: schedule echo note if enabled for this track
  if (state.echoEnabled && state.echoTrack > 0 && state.echoTrack === trackIdx + 1 && echoTimings && echoTimings[state.echoTimingIndex]) {
    const echoSteps = echoTimings[state.echoTimingIndex][1];
    const stepInterval = 60.0 / state.tempo / 4.0; // Time per 16th note step
    const echoDelay = echoSteps * stepInterval;
    const echoTime = startTime + echoDelay;
    
    // Schedule echo note (with reduced velocity)
    playBuffer(buffers[type][sel], {
      gain: volume * 0.6, // Echo at 60% volume
      pan: pan,
      rate: rateFor(note, entry.base || 'C4'),
      decay: decay,
      startTime: echoTime,
      trackIdx: trackIdx
    });
  }
  
  // Only flash if this is the currently selected track
  if (state.currentTrack === trackIdx + 1) {
    flashPianoKeyByNote(note, trackIdx + 1);
  }
}

function playDrumScheduled(drumName, startTime, drumVel = 1.0) {
  if (!audioInitialized || !buffers.drums || !buffers.drums[drumName]) return;
  const drumIndex = ['kick', 'snare', 'hihat', 'open'].indexOf(drumName);
  if (drumIndex === -1) return;
  const volume = state.drumVolumes[drumIndex] || 0.9;
  const pan = (state.drumPans[drumIndex] || 0) / 7;
  let rate = 1.0;
  const kit = state.drumKit || 'default';
  if (kit === '808') {
    if (drumName === 'kick') rate = 0.6;
    else if (drumName === 'snare') rate = 0.9;
  } else if (kit === '909') {
    if (drumName === 'kick') rate = 0.8;
    else if (drumName === 'hihat') rate = 1.4;
  } else if (kit === 'cr78') {
    if (drumName === 'kick') rate = 1.2;
    else if (drumName === 'snare') rate = 1.1;
  } else if (kit === '707') {
    if (drumName === 'kick') rate = 0.9;
    else if (drumName === 'hihat') rate = 1.6;
  }
  const decay = (state.trackDecay[0] || 1) * (state.drumDecay && state.drumDecay[drumIndex] != null ? state.drumDecay[drumIndex] : (drumName === 'hihat' ? 0.25 : 1));
  playBuffer(buffers.drums[drumName], {
    gain: volume * drumVel,
    pan: pan,
    rate: rate,
    decay: decay,
    startTime: startTime
  });
}

function stopAllSources() {
  activeSources.forEach(src => {
    try {
      src.stop();
      src.disconnect();
    } catch (e) {}
  });
  activeSources = [];
  sendMIDIAllNotesOff();
}

function flashPianoKeyByNote(note, trackIndex) {
  if (!ui.pianoKeys || ui.pianoKeys.length === 0) return;
 
  // 1. Find the key button
  const keyBtn = ui.pianoKeys.find(btn => btn.dataset.note === note);
  if (!keyBtn) return;

  // 2. Determine Color - USE MIXER COLORS DIRECTLY
  let flashColor = '#FFFFFF';
 
  const trackFlashColors = ['#DD3333', '#DD8833', '#33AADD', '#AA55DD', '#CC3333', '#CC8822', '#33CC55', '#3399DD', '#9b5cff'];
  flashColor = (trackIndex === 8) ? '#9b5cff' : (state.displayTrack < 4 ? drumColors[state.displayTrack] : (trackFlashColors[state.displayTrack] || trackColors[trackIndex] || '#FFFFFF'));
  if (trackIndex === 0 && state.displayTrack < 4) {
    const drumIdx = ['kick', 'snare', 'hihat', 'open'].indexOf(state.selectedDrum);
    if (drumIdx >= 0) flashColor = drumColors[drumIdx] || '#FF0000';
  }

  const isWhite = keyBtn.dataset.isWhite === 'true';
  const originalColor = isWhite ? '#F8F8F8' : '#050508';
 
  if (keyBtn.flashTimeout) {
    clearTimeout(keyBtn.flashTimeout);
    keyBtn.flashTimeout = null;
  }

  keyBtn.setAttribute('color', flashColor);
  keyBtn.setAttribute('material', `metalness:.1;roughness:.3;emissive:${flashColor};emissiveIntensity:3.0`);
 
  // Flash the Ambilight LED
  const glowEl = document.getElementById(`glow-${note}`);
  if (glowEl) {
    glowEl.setAttribute('color', flashColor);
    glowEl.setAttribute('material', `shader:flat; transparent:true; opacity:0.6; color:${flashColor}`);
   
    if (glowEl.fadeTimeout) clearTimeout(glowEl.fadeTimeout);
   
    glowEl.fadeTimeout = setTimeout(() => {
       glowEl.setAttribute('material', 'opacity: 0');
    }, 200);
  }

  // Reset Key Logic
  keyBtn.flashTimeout = setTimeout(() => {
    keyBtn.setAttribute('color', originalColor);
    keyBtn.setAttribute('material', 'metalness:.3;roughness:.6;emissive:#000;emissiveIntensity:0');
    keyBtn.setAttribute('scale', '1 1 1');
    keyBtn.flashTimeout = null;
  }, 150);
}

function playStrummedChord(rootMidi, chordNotes, startTime, strumPattern) {
  if (!state.arp.enabled || state.arp.mode !== 2) return;
  const actualTime = startTime || audioContext.currentTime;
  const baseDelay = 0.030 + (Math.random() * 0.020);
  const shouldPlayNote = () => Math.random() > 0.1;
  switch(strumPattern) {
    case 0: // DOWN
      chordNotes.forEach((interval, idx) => {
        if (shouldPlayNote()) {
          const noteTime = actualTime + (idx * (baseDelay + (Math.random() * 0.015)));
          playInstrumentScheduled(3, midiToNote(rootMidi + interval), noteTime);
        }
      });
      break;
    case 1: // UP
      [...chordNotes].reverse().forEach((interval, idx) => {
        if (shouldPlayNote()) {
          const noteTime = actualTime + (idx * (baseDelay + (Math.random() * 0.015)));
          playInstrumentScheduled(3, midiToNote(rootMidi + interval), noteTime);
        }
      });
      break;
    default:
      chordNotes.forEach((interval, idx) => {
        playInstrumentScheduled(3, midiToNote(rootMidi + interval), actualTime + (idx * baseDelay));
      });
      break;
  }
}

// When chordOn: play 3-note major chord (root, 3rd, 5th) with arp at 50%
function playChordFollowBass(bassNote, startTime) {
  if (!state.chordOn || !bassNote || bassNote === 'REST' || bassNote === '^' || bassNote === 'TIE' || bassNote === '-' || bassNote === '') return;
  const rootMidi = midiOf(bassNote);
  const intervals = [0, 4, 7]; // major chord
  intervals.forEach((interval, i) => {
    const note = midiToNote(rootMidi + interval);
    playInstrumentScheduled(3, note, startTime, 0.8, 0.5);
  });
}

function stopChordLineStrings() {
  const now = audioContext && audioContext.currentTime;
  if (now == null) return;
  chordLineStringsActiveSources.forEach(s => {
    try { s.stop(now); s.disconnect(); } catch (_) {}
  });
  chordLineStringsActiveSources.length = 0;
}

function playChordLineStringsNote(midi, startTime, decay = 4) {
  if (!audioInitialized || !buffers.strings || !buffers.strings[0]) return;
  const noteName = midiToNote(midi);
  const stringsVol = state.trackVolumes[5] ?? 0.7;
  const volume = stringsVol * 0.22;
  const pan = (state.trackPans[5] ?? 0) / 7;
  const rate = rateFor(noteName, 'C4');
  playBuffer(buffers.strings[0], { gain: volume, pan, rate, decay, startTime, trackIdx: 2, chordLineStringsCapture: true });
  flashPianoKeyByNote(noteName, 8);
}

function playStep(scheduledTime) {
  if (DEBUG_VERBOSE && state.currentStep === 0) {
    console.log('🎬 NEW PATTERN STARTING', state.arrangementMode, state.currentArrangementIndex);
  }
  if (DEBUG_VERBOSE) {
    console.log('🎵 step', state.currentStep, 'tempo', state.tempo);
  }
  if (state.currentStep >= patterns[state.currentPattern].length) {
    if (DEBUG_VERBOSE) console.error('currentStep >= pattern length');
    return;
  }
 
  // Handle block mode wrapping
  if (state.playBlockMode) {
    const blockStart = state.currentStepView * 16;
    const blockEnd = blockStart + 15;
    if (state.currentStep > blockEnd) state.currentStep = blockStart;
  }
 
  const pat = patterns[state.currentPattern];
  const step = state.currentStep;
  // Use scheduled time for tight timing; clamp if in the past so Web Audio never gets invalid time
  let noteTime = (scheduledTime != null && audioContext) ? scheduledTime : (audioContext ? audioContext.currentTime : 0);
  if (audioContext && scheduledTime != null && scheduledTime < audioContext.currentTime) {
    noteTime = audioContext.currentTime + 0.002;
  }

  // Rave mode: beat-synced lasers and light show
  if (state.raveMode && typeof onRaveBeat === 'function') onRaveBeat(step);
 
  // Apply quantization settings
  const gridSizes = [0, 0.5, 1, 2, 4, 8];
  const grid = gridSizes[state.quantize];
  const quantizeActive = state.quantize > 0 && grid > 0;
 
  // Mix automation
  // Mix automation
// Mix automation - when !mixOverride, apply pattern/song mix; when mixOverride, never change vol/pan/decay
if (!state.mixOverride) {
  if (pat.mix && pat.mix[step]) {
    const mix = pat.mix[step];
    state.drumVolumes = [...mix.drumVolumes];
    state.drumPans = [...mix.drumPans];
    state.trackVolumes = [...mix.trackVolumes];
    state.trackPans = [...mix.trackPans];
    state.masterVolume = mix.masterVolume;
    if (masterGain) masterGain.gain.value = state.masterVolume;
    state.lastAppliedMix = {
      drumVolumes: [...mix.drumVolumes],
      drumPans: [...mix.drumPans],
      trackVolumes: [...mix.trackVolumes],
      trackPans: [...mix.trackPans],
      masterVolume: mix.masterVolume
    };
  } else if (step === 0 && state.lastAppliedMix) {
    state.drumVolumes = [...state.lastAppliedMix.drumVolumes];
    state.drumPans = [...state.lastAppliedMix.drumPans];
    state.trackVolumes = [...state.lastAppliedMix.trackVolumes];
    state.trackPans = [...state.lastAppliedMix.trackPans];
    state.masterVolume = state.lastAppliedMix.masterVolume;
    if (masterGain) masterGain.gain.value = state.masterVolume;
  }
}
 
  const anySolo = state.solo.some(s => s);
 
  // PLAY DRUMS - NO QUANTIZE (or single-voice reduce mode: snare > kick > hihat > open)
  if (state.drumReduceOn) {
    const order = ['snare', 'kick', 'hihat', 'open'];
    let played = false;
    for (let i = 0; i < order.length && !played; i++) {
      const drum = order[i];
      if (pat.drums[drum] && pat.drums[drum][step]) {
        const drumVel = (pat.drumVelocity[drum] && pat.drumVelocity[drum][step]) ? pat.drumVelocity[drum][step] : 1.0;
        playDrumScheduled(drum, noteTime, drumVel);
        played = true;
      }
    }
  } else {
    ['kick', 'snare', 'hihat', 'open'].forEach((drum, idx) => {
      if (pat.drums[drum][step]) {
        const drumVel = pat.drumVelocity[drum][step] || 1.0;
        playDrumScheduled(drum, noteTime, drumVel);
      }
    });
  }
 
  // PLAY MELODIC TRACKS
  ['bass', 'lead', 'pad', 'arp'].forEach((trackKey, idx) => {
    const trackIdx = idx + 1;
    const channelIdx = idx + 4;
    const isMuted = state.mute[channelIdx] || (anySolo && !state.solo[channelIdx]);
    if (isMuted) return;
   
    // When chord line chord on: pad track plays chord line (3 notes), skip pad step data
    if (trackKey === 'pad' && state.drumReduceOn && state.chordLineChordOn) return;
    // When chord line arp on: arp track plays chord-line arp (2 notes), skip arp step data
    if (trackKey === 'arp' && state.drumReduceOn && state.chordLineArpOn) return;
   
    const shouldQuantizeThisTrack = quantizeActive && (state.currentTrack === trackIdx);
   
    if (shouldQuantizeThisTrack) {
      // QUANTIZE MODE - Only for currently selected track
      const blockStart = Math.floor(step / 16) * 16;
     
      for (let checkStep = blockStart; checkStep < blockStart + 16 && checkStep < patterns[state.currentPattern].length; checkStep++) {
        let note = pat[trackKey][checkStep];
        const isTie = (note === 'TIE' || note === '-');
        const isRest = (note === 'REST' || note === '^');
       
        if (trackKey === 'arp' && state.arp.enabled && pat.arpChords[checkStep]) {
          // ARP PLAYBACK with quantization
          let activeChord = pat.arpChords[checkStep];
          let activeNote = note;
         
          if (!activeChord || isTie) {
            for (let i = checkStep - 1; i >= blockStart; i--) {
              if (pat.arpChords[i] && pat.arpChords[i] !== null) {
                activeChord = pat.arpChords[i];
                activeNote = pat.arp[i];
                break;
              }
            }
          }
         
          const quantizedPos = getQuantizedStep(checkStep, blockStart, grid);
         
          if (quantizedPos === step && activeChord && !isRest) {
            const chordType = chordTypes[activeChord.type];
            let intervals = chordIntervals[chordType] || [0, 4, 7];
            let rootMidi;
            const rootNoteName = chordRoots[activeChord.root];
            rootMidi = midiOf(rootNoteName + '4');
           
            const stepVel = pat.velocity.arp[checkStep] || 0.8;
           
            if (state.arp.mode === 0) {
              const pattern = state.arp.pattern;
              let arpIndex = 0;
             
              if (pattern === 0) {
                arpIndex = state.arp.currentArpIndex % intervals.length;
              } else if (pattern === 1) {
                arpIndex = (intervals.length - 1) - (state.arp.currentArpIndex % intervals.length);
              } else if (pattern === 2) {
                const cycle = (intervals.length - 1) * 2;
                const pos = state.arp.currentArpIndex % cycle;
                arpIndex = pos < intervals.length ? pos : cycle - pos;
              } else if (pattern === 3) {
                arpIndex = Math.floor(Math.random() * intervals.length);
              }
             
              const chordNote = midiToNote(rootMidi + intervals[arpIndex]);
              playInstrumentScheduled(3, chordNote, noteTime, stepVel);
              state.arp.currentArpIndex++;
             
            } else if (state.arp.mode === 1) {
              intervals.forEach((interval, idx) => {
                const chordNote = midiToNote(rootMidi + interval);
                playInstrumentScheduled(3, chordNote, noteTime, stepVel);
              });
             
            } else if (state.arp.mode === 2) {
              playStrummedChord(rootMidi, intervals, noteTime, state.arp.strumPattern);
            }
            break;
          }
        } else if (note && note !== '' && !isRest && !isTie) {
          const quantizedPos = getQuantizedStep(checkStep, blockStart, grid);
          if (quantizedPos === step) {
            const stepVel = pat.velocity[trackKey][checkStep] || 0.8;
            playInstrumentScheduled(idx, note, noteTime, stepVel);
            if (trackKey === 'bass') playChordFollowBass(note, noteTime);
            break;
          }
        }
      }
    } else {
      // NO QUANTIZE - Play original positions
      let note = pat[trackKey][step];
      const isTie = (note === 'TIE' || note === '-');
      const isRest = (note === 'REST' || note === '^');
     
      if (trackKey === 'arp' && state.arp.enabled && pat.arpChords[step]) {
        let activeChord = pat.arpChords[step];
        let activeNote = note;
       
        if (!activeChord || isTie) {
          for (let i = step - 1; i >= 0; i--) {
            if (pat.arpChords[i] && pat.arpChords[i] !== null) {
              activeChord = pat.arpChords[i];
              activeNote = pat.arp[i];
              break;
            }
          }
        }
       
        if (activeChord && !isRest) {
          const chordType = chordTypes[activeChord.type];
          let intervals = chordIntervals[chordType] || [0, 4, 7];
          let rootMidi;
          const rootNoteName = chordRoots[activeChord.root];
          rootMidi = midiOf(rootNoteName + '4');
         
          const stepVel = pat.velocity.arp[step] || 0.8;
         
          if (state.arp.mode === 0) {
            const pattern = state.arp.pattern;
            let arpIndex = 0;
           
            if (pattern === 0) {
              arpIndex = state.arp.currentArpIndex % intervals.length;
            } else if (pattern === 1) {
              arpIndex = (intervals.length - 1) - (state.arp.currentArpIndex % intervals.length);
            } else if (pattern === 2) {
              const cycle = (intervals.length - 1) * 2;
              const pos = state.arp.currentArpIndex % cycle;
              arpIndex = pos < intervals.length ? pos : cycle - pos;
            } else if (pattern === 3) {
              arpIndex = Math.floor(Math.random() * intervals.length);
            }
           
            const chordNote = midiToNote(rootMidi + intervals[arpIndex]);
            playInstrumentScheduled(3, chordNote, noteTime, stepVel);
            state.arp.currentArpIndex++;
           
          } else if (state.arp.mode === 1) {
            intervals.forEach((interval, idx) => {
              const chordNote = midiToNote(rootMidi + interval);
              playInstrumentScheduled(3, chordNote, noteTime, stepVel);
            });
           
          } else if (state.arp.mode === 2) {
            playStrummedChord(rootMidi, intervals, noteTime, state.arp.strumPattern);
          }
        }
      } else if (note && note !== '' && !isRest && !isTie) {
        const stepVel = pat.velocity[trackKey][step] || 0.8;
        playInstrumentScheduled(idx, note, noteTime, stepVel);
        if (trackKey === 'bass') playChordFollowBass(note, noteTime);
      }
    }
  });
 
  if (state.autoBassFollow && pat.arpChords[step]) {
    const rootNote = chordRoots[pat.arpChords[step].root] + '2';
    if (!state.mute[4] && (!anySolo || state.solo[4])) {
      playInstrumentScheduled(0, rootNote, noteTime);
    }
  }
 
  // CHORD LINE (Reduce): Chord on PAD (3 notes), Arp on ARP (2 notes); both can be on
  function resolveChordAt(s) {
    let c = pat.arpChords[s];
    if (c && c.root !== undefined) return c;
    for (let i = s - 1; i >= 0; i--) {
      if (pat.arpChords[i] && pat.arpChords[i].root !== undefined) return pat.arpChords[i];
    }
    return null;
  }
  function chordStartStep(s) {
    const cur = resolveChordAt(s);
    if (!cur || cur.root === undefined) return s;
    for (let i = s - 1; i >= 0; i--) {
      const prev = pat.arpChords[i];
      if (!prev || prev.root !== cur.root || prev.type !== cur.type) return i + 1;
    }
    return 0;
  }

  if (state.drumReduceOn && state.chordLineChordOn && !state.mute[6] && (!anySolo || state.solo[6])) {
    const activeChord = resolveChordAt(step);
    const prevChord = step > 0 ? resolveChordAt(step - 1) : null;
    const chordChanged = activeChord && (!prevChord || prevChord.root !== activeChord.root || prevChord.type !== activeChord.type);
    if (chordChanged && activeChord && activeChord.root !== undefined) {
      const chordType = chordTypes[activeChord.type];
      const intervals = chordIntervals[chordType] || [0, 4, 7];
      const rootMidi = midiOf(chordRoots[activeChord.root] + '4');
      const stepVel = (pat.velocity.arp && pat.velocity.arp[step]) ? pat.velocity.arp[step] : 0.8;
      let t = noteTime;
      if (state.chordLineRhythmOffsets && state.chordLineRhythmOffsets[step] != null) t += state.chordLineRhythmOffsets[step];
      const chordStyleIdx = Math.max(0, (state.chordLineChordStyle | 0) % 16);
      const delays = CHORD_LINE_CHORD_STYLES[chordStyleIdx];
      const inv = state.chordLineInversionIndex || 0;
      let invIntervals = [...intervals];
      if (inv === 1 && intervals.length >= 3) invIntervals = [intervals[1] - 12, intervals[2] - 12, intervals[0]];
      else if (inv === 2 && intervals.length >= 3) invIntervals = [intervals[2] - 12, intervals[0], intervals[1]];
      invIntervals.slice(0, 3).forEach((interval, i) => {
        const d = delays[i % delays.length] || 0;
        playInstrumentScheduled(2, midiToNote(rootMidi + interval), t + d, stepVel);
      });
    }
  }

  if (state.drumReduceOn && state.chordLineStringsOn && buffers.strings && buffers.strings[0] && !state.mute[8] && (!anySolo || state.solo[8])) {
    const activeChord = resolveChordAt(step);
    const chordStart = chordStartStep(step);
    const stringsOnAtChordStart = pat.strings && pat.strings[chordStart];
    const isChordStartStep = (step === chordStart);
    if (isChordStartStep && activeChord && activeChord.root !== undefined && stringsOnAtChordStart) {
      stopChordLineStrings();
      const chordType = chordTypes[activeChord.type];
      const intervals = chordIntervals[chordType] || [0, 4, 7];
      const rootMidi = midiOf(chordRoots[activeChord.root] + '4');
      const firstMidi = rootMidi + (intervals[0] ?? 0);
      const thirdMidi = rootMidi + (intervals[1] ?? 4);
      const fifthMidi = rootMidi + (intervals[2] ?? 7);
      playChordLineStringsNote(firstMidi, noteTime);
      playChordLineStringsNote(thirdMidi, noteTime);
      playChordLineStringsNote(fifthMidi, noteTime);
    }
  }

  if (state.drumReduceOn && state.chordLineArpOn && !state.mute[7] && (!anySolo || state.solo[7])) {
    const activeChord = resolveChordAt(step);
    if (activeChord && activeChord.root !== undefined) {
      const chordType = chordTypes[activeChord.type];
      const intervals = chordIntervals[chordType] || [0, 4, 7];
      const rootMidi = midiOf(chordRoots[activeChord.root] + '4');
      const stepVel = (pat.velocity.arp && pat.velocity.arp[step]) ? pat.velocity.arp[step] : 0.8;
      let t = noteTime;
      if (state.chordLineRhythmOffsets && state.chordLineRhythmOffsets[step] != null) t += state.chordLineRhythmOffsets[step];
      const startStep = chordStartStep(step);
      const stepsSinceChord = step - startStep;
      const subdiv = [1, 2, 4][state.chordLineArpSubdivision || 0];
      const arpStyleIdx = Math.max(0, (state.chordLineArpStyle | 0) % 16);
      const style = CHORD_LINE_ARP_STYLES[arpStyleIdx];
      let order = [...intervals];
      if (style.order === 1) order = [...intervals].reverse();
      else if (style.order === 2) {
        const up = [...intervals];
        const down = [...intervals].reverse().slice(1);
        order = [...up, ...down];
      } else if (style.order === 3) order = [...intervals].sort(() => Math.random() - 0.5);
      if (stepsSinceChord === 0) {
        const twoNote = intervals.length >= 2 ? [intervals[0], intervals[intervals.length - 1]] : [intervals[0]];
        twoNote.forEach((interval) => { playInstrumentScheduled(3, midiToNote(rootMidi + interval), t, stepVel); });
      }
      if (stepsSinceChord % subdiv === 0) {
        const arpIndex = Math.floor(stepsSinceChord / subdiv) % order.length;
        playInstrumentScheduled(3, midiToNote(rootMidi + order[arpIndex]), t, stepVel);
      }
    }
  }
 
  // ═══════════════════════════════════════════════════════════════════════
  // ═══════════════════════════════════════════════════════════════════════
// STEP ADVANCEMENT - HAPPENS AFTER PLAYING
  state.currentStep++;

  if (state.currentStep > patterns[state.currentPattern].length - 1) {
    state.currentStep = 0;
    if (state.arrangementMode) {
      state.currentArrangementIndex++;
      const nextPatNum = state.songArrangement[state.currentArrangementIndex];
      if (!nextPatNum || state.currentArrangementIndex >= 64) {
        state.isPlaying = false;
        state.arrangementMode = false;
        showMessage('🎵 SONG ENDED');
        return;
      }
      state.currentPattern = nextPatNum - 1;
    }
  }

  updateSongProgress();
  if (state.currentStep % 2 === 0) animateSpeakers();  // Throttle: every 2nd step to reduce DOM work
}


// Speaker animation function
function animateSpeakers() {
  // Get all speaker elements
  const leftElements = ['leftSpeakerRim', 'leftSpeakerRing1', 'leftSpeakerRing2', 'leftSpeakerRing3', 'leftSpeakerRing4', 'leftSpeakerRing5', 'leftSpeakerDome'];
  const rightElements = ['rightSpeakerRim', 'rightSpeakerRing1', 'rightSpeakerRing2', 'rightSpeakerRing3', 'rightSpeakerRing4', 'rightSpeakerRing5', 'rightSpeakerDome'];
 
  // Original Z positions
  const leftOriginal = [0.126, 0.127, 0.128, 0.129, 0.130, 0.131, 0.132];
  const rightOriginal = [0.126, 0.127, 0.128, 0.129, 0.130, 0.131, 0.132];
 
  // Pump all rings forward (cone interior stays darker grey)
  leftElements.forEach((id, i) => {
    const el = document.getElementById(id);
    if (el) {
      const newZ = leftOriginal[i] + 0.015;
      el.setAttribute('position', `0 0 ${newZ}`);
    }
  });
  rightElements.forEach((id, i) => {
    const el = document.getElementById(id);
    if (el) {
      const newZ = rightOriginal[i] + 0.015;
      el.setAttribute('position', `0 0 ${newZ}`);
    }
  });
  setTimeout(() => {
    leftElements.forEach((id, i) => {
      const el = document.getElementById(id);
      if (el) el.setAttribute('position', `0 0 ${leftOriginal[i]}`);
    });
    rightElements.forEach((id, i) => {
      const el = document.getElementById(id);
      if (el) el.setAttribute('position', `0 0 ${rightOriginal[i]}`);
    });
  }, 100);
}
