// --- CORE BUTTON CREATION FUNCTION ---
function createButton(parent, x, y, z, w, h, d, color, id, text = '', textColor = 'white', attachHandler = false) {
  const btn = document.createElement('a-box');
  btn.setAttribute('class', 'clickable');
  btn.setAttribute('position', `${x} ${y} ${z}`);
  btn.setAttribute('width', w);
  btn.setAttribute('height', h * 1.15);
  btn.setAttribute('depth', d);
  btn.setAttribute('color', color);
  btn.setAttribute('material', 'metalness:0.4;roughness:0.5');
  btn.setAttribute('shadow', 'cast:true;receive:true');
  btn.setAttribute('id', id);
  btn.dataset.originalColor = color;
  btn.dataset.buttonId = id;

  if (text) {
    const label = document.createElement('a-text');
    label.setAttribute('value', text);
    label.setAttribute('align', 'center');
    label.setAttribute('position', `0 0 ${d / 2 + 0.01}`);
    const scale = Math.min(0.16 * (w / 0.12), 0.20);
    label.setAttribute('scale', `${scale} ${scale} ${scale}`);
    const safeColor = (textColor === 'white' || !textColor) ? '#ffffff' : textColor;
    label.setAttribute('color', safeColor);
    btn.appendChild(label);
  }

  parent.appendChild(btn);
  if (typeof ui !== 'undefined' && ui.allButtons) ui.allButtons.push(btn);
  if (attachHandler) attachClickHandler(btn);
  return btn;
}

// Default: bright text. When highlighted, text = opposite of highlight (bright highlight -> dark text, dark highlight -> bright text).
function isButtonLit(btn) {
  if (!btn || !btn.getAttribute) return false;
  var mat = btn.getAttribute('material');
  if (mat != null) {
    if (typeof mat === 'object' && typeof mat.emissiveIntensity === 'number' && mat.emissiveIntensity > 0) return true;
    var str = typeof mat === 'string' ? mat : JSON.stringify(mat);
    var em = str.match(/emissiveIntensity\s*:\s*([\d.]+)/i);
    if (em && parseFloat(em[1]) > 0) return true;
  }
  var scale = btn.getAttribute('scale');
  if (scale != null) {
    var sx = typeof scale === 'string' ? parseFloat(String(scale).trim().split(/\s/)[0]) : (scale.x != null ? scale.x : 1);
    if (!isNaN(sx) && sx > 1.0) return true;
  }
  return false;
}

function luminanceFromHex(hex) {
  if (!hex || hex.length < 6) return 0;
  hex = String(hex).replace(/^#/, '');
  if (hex.length < 6) return 0;
  var r = parseInt(hex.substr(0, 2), 16);
  var g = parseInt(hex.substr(2, 2), 16);
  var b = parseInt(hex.substr(4, 2), 16);
  if (isNaN(r) || isNaN(g) || isNaN(b)) return 0;
  return (r * 299 + g * 587 + b * 114) / 1000;
}

// Get the effective highlight colour when button is lit (emissive or fallback to color).
function getButtonHighlightLuminance(btn) {
  var mat = btn.getAttribute && btn.getAttribute('material');
  var hex = '';
  if (mat != null) {
    if (typeof mat === 'object' && mat.emissive) hex = String(mat.emissive).replace(/^#/, '');
    if (!hex && mat != null) {
      var str = typeof mat === 'string' ? mat : JSON.stringify(mat);
      var m = str.match(/emissive\s*:\s*#?([0-9a-fA-F]{6})/i);
      if (m) hex = m[1];
    }
  }
  if (!hex || hex.length < 6) hex = String(btn.getAttribute && btn.getAttribute('color') || '').replace(/^#/, '');
  return luminanceFromHex(hex);
}

// Bright text by default; when lit, text = opposite of highlight (so dark highlight -> bright text, bright highlight -> dark text).
var BUTTON_TEXT_LUMINANCE_THRESHOLD = 140;

function getButtonLabelColor(btn) {
  if (!isButtonLit(btn)) return '#ffffff';
  var lum = getButtonHighlightLuminance(btn);
  return lum > BUTTON_TEXT_LUMINANCE_THRESHOLD ? '#000000' : '#ffffff';
}

function setButtonLabelColorForLit(btn) {
  var label = btn && btn.querySelector && btn.querySelector('a-text');
  if (!label) return;
  label.setAttribute('color', getButtonLabelColor(btn));
}

function ensureLitButtonsHaveDarkText(scope) {
  var root = scope && scope.querySelector ? scope : document;
  var list = root.querySelectorAll ? root.querySelectorAll('.clickable') : [];
  for (var i = 0; i < list.length; i++) {
    var btn = list[i];
    if (!btn.querySelector || !btn.querySelector('a-text')) continue;
    setButtonLabelColorForLit(btn);
  }
}

function setButtonLabelDarkIfLit(btn) {
  if (!btn || !btn.querySelector) return false;
  var label = btn.querySelector('a-text');
  if (!label) return false;
  setButtonLabelColorForLit(btn);
  return isButtonLit(btn);
}

var _litButtonObserverStarted = false;
function observeLitButtonsForDarkLabels() {
  if (_litButtonObserverStarted) return;
  var scene = document.querySelector('a-scene');
  if (!scene) return;
  _litButtonObserverStarted = true;
  var observer = new MutationObserver(function (mutations) {
    for (var i = 0; i < mutations.length; i++) {
      var target = mutations[i].target;
      if (target.classList && target.classList.contains('clickable') && target.querySelector && target.querySelector('a-text'))
        setButtonLabelDarkIfLit(target);
    }
  });
  observer.observe(scene, { subtree: true, attributes: true, attributeFilter: ['material', 'scale'] });
}

// Calculate velocity from mouse position on piano key
function calculateKeyVelocity(btn, event) {
  try {
    // Get button's bounding box in screen space
    const camera = document.querySelector('[camera]');
    if (!camera) return 0.8;
   
    const btnObj = btn.object3D;
    const btnBox = new THREE.Box3().setFromObject(btnObj);
   
    // Get the center and height of the button
    const btnCenter = new THREE.Vector3();
    btnBox.getCenter(btnCenter);
    const btnSize = new THREE.Vector3();
    btnBox.getSize(btnSize);
   
    // Project to screen coordinates
    const vector = btnCenter.clone();
    vector.project(camera.object3DMap.camera);
   
    // Convert to screen space (0-1)
    const screenX = (vector.x + 1) / 2;
    const screenY = (-vector.y + 1) / 2;
   
    // Get mouse position (0-1)
    const mouseX = event.detail.cursorEl ?
      (event.detail.intersection.point.x - btnCenter.x) / btnSize.x :
      0;
    const mouseY = event.detail.cursorEl ?
      (event.detail.intersection.point.y - btnCenter.y) / btnSize.y :
      0;
   
    console.log('📍 Mouse Y relative to button:', mouseY);
   
    // Convert to velocity (0-1)
    // mouseY ranges from -0.5 (bottom) to +0.5 (top)
    const normalizedY = mouseY + 0.5; // 0 (bottom) to 1 (top)
    const velocity = Math.max(0.01, Math.min(1.0, 1.0 - normalizedY));
   
    return velocity;
  } catch (err) {
    console.error('Velocity calculation error:', err);
    return 0.8;
  }
}
function attachClickHandler(btn) {
  if (!btn) return;
 btn.addEventListener('click', (e) => {
  e.stopPropagation();
 
  // **DISABLE PIANO KEY CLICKS IN DESKTOP MODE**
  // In desktop mode, piano is hidden and MIDI keyboard is used instead
  const isPianoKey = btn.id && btn.id.startsWith('key-');
  if (isPianoKey && state.desktopMode) {
    console.log('🚫 Piano key click ignored - Desktop mode active (use MIDI keyboard)');
    return;
  }
 
  // **CRITICAL: Capture intersection data IMMEDIATELY**
  if (e.detail && e.detail.intersection) {
    const intersection = e.detail.intersection;
    
    // Check if this is a piano key
    if (isPianoKey) {
      // For piano keys, only register clicks on the top surface
      const worldPoint = intersection.point.clone();
      const localPoint = btn.object3D.worldToLocal(worldPoint);
      
      const isWhite = btn.dataset.isWhite === 'true';
      const keyHeight = isWhite ? 0.15 : 0.13;
      const keyDepth = isWhite ? 0.40 : 0.27;
      const halfHeight = keyHeight / 2;
      const halfDepth = keyDepth / 2;
      
      // Check if clicking on top surface (not underneath)
      // Top surface: localPoint.y should be positive (top of key)
      // Bottom/underneath: localPoint.y would be negative (below center)
      const isTopSurface = localPoint.y > (-halfHeight * 0.5); // Allow tolerance for edge clicks
      
      if (!isTopSurface) {
        console.log(`🚫 Ignoring click underneath piano key - Local Y: ${localPoint.y.toFixed(3)} (must be > ${(-halfHeight * 0.5).toFixed(3)})`);
        return; // Don't process clicks on bottom or underneath
      }
      
      // For velocity: use Y coordinate (height on key surface) 
      // The user wants "how high up we press" - Y represents vertical position on the key
      // Higher Y = closer to synth body (top of key) = quieter
      // Lower Y = closer to user (bottom edge) = louder
      // Y ranges from -halfHeight (bottom edge) to +halfHeight (top edge)
      const normalizedY = (localPoint.y + halfHeight) / keyHeight; // 0 = bottom, 1 = top
      
      // Store Y position and normalized value for velocity calculation
      btn._lastClickY = localPoint.y;
      btn._lastClickZ = localPoint.z;
      btn._lastClickNormalizedY = normalizedY; // Pre-calculated for velocity (0=bottom/loud, 1=top/quiet)
      btn._lastClickTime = Date.now();
      
      console.log(`📍 Piano Key Click - LocalY: ${localPoint.y.toFixed(3)} (bottom=${-halfHeight.toFixed(3)}, top=${halfHeight.toFixed(3)}), NormalizedY: ${normalizedY.toFixed(3)}, LocalZ: ${localPoint.z.toFixed(3)}`);
    } else {
      // For non-piano keys, store intersection point normally
      const worldPoint = intersection.point.clone();
      const localPoint = btn.object3D.worldToLocal(worldPoint);
      btn._lastClickY = localPoint.y;
      btn._lastClickTime = Date.now();
    }
  }
 
  // Resolve id from clicked element or parent (click may land on child a-text)
  let el = btn;
  let id = el.dataset.buttonId || el.id;
  while (!id && el && el.parentElement) {
    el = el.parentElement;
    id = el.dataset.buttonId || el.id;
  }
  if (!id) return;
  handleButtonClick(id, btn);
});
}

// Hide the given page's UI container (keeps DOM for instant show on return).
// Also remove 'clickable' from descendants so the raycaster won't hit them (stops cross-page clicks).
function hidePageContainer(page) {
  const id = getPageContainerId(page);
  if (!id) return;
  const el = document.getElementById(id);
  if (!el) return;
  el.object3D.visible = false;
  el.setAttribute('visible', 'false');
  removeClickableFromDescendants(el);
}

// Restore 'clickable' on a container's descendants when showing (so raycaster can hit them again).
// Restore by both data-was-clickable (set when we hid) and by data-button-id / known box ids (in case attribute didn't persist in A-Frame).
function restorePageContainerClickable(containerEl) {
  if (!containerEl) return;
  function addClickable(el) {
    if (el && !el.classList.contains('clickable')) {
      el.classList.add('clickable');
      el.removeAttribute('data-was-clickable');
    }
  }
  containerEl.querySelectorAll('[data-was-clickable="1"]').forEach(addClickable);
  containerEl.querySelectorAll('[data-button-id]').forEach(addClickable);
  ['misc-loop-track', 'misc-reverb-track', 'misc-chorus-track', 'misc-echo-track'].forEach(function (id) {
    const el = containerEl.querySelector('#' + id);
    if (el) addClickable(el);
  });
}

// Remove 'clickable' from a container's descendants when hiding (so raycaster won't hit them from other pages).
function removeClickableFromDescendants(containerEl) {
  if (!containerEl) return;
  containerEl.querySelectorAll('.clickable').forEach(function (desc) {
    desc.classList.remove('clickable');
    desc.setAttribute('data-was-clickable', '1');
  });
}

// Raise synth in desktop mode so it's not at the bottom of the screen; VR uses saved position as-is
const DESKTOP_WORKSTATION_Y_OFFSET = 0.45;
function applyWorkstationPosition() {
  // Skip applying for a short time after file load so the synth/camera don't jump
  if (state && state._workstationPositionApplyCooldownUntil && Date.now() < state._workstationPositionApplyCooldownUntil) return;
  const wg = document.getElementById('workstationGroup');
  const scene = document.getElementById('mainScene');
  if (!wg || !state || !state.workstationPosition || !state.workstationRotation) return;
  const inVR = scene && scene.is && scene.is('vr-mode');
  const y = inVR ? state.workstationPosition.y : state.workstationPosition.y + DESKTOP_WORKSTATION_Y_OFFSET;
  wg.setAttribute('position', `${state.workstationPosition.x} ${y} ${state.workstationPosition.z}`);
  wg.object3D.position.set(state.workstationPosition.x, y, state.workstationPosition.z);
  wg.setAttribute('rotation', `${state.workstationRotation.x} ${state.workstationRotation.y} ${state.workstationRotation.z}`);
  wg.object3D.rotation.set(
    state.workstationRotation.x * Math.PI / 180,
    state.workstationRotation.y * Math.PI / 180,
    state.workstationRotation.z * Math.PI / 180
  );
}

// Sync state from current DOM so no later applyWorkstationPosition() uses stale file data and moves the synth
function syncWorkstationStateFromDOM() {
  const wg = document.getElementById('workstationGroup');
  const scene = document.getElementById('mainScene');
  if (!wg || !wg.object3D || !state) return;
  const inVR = scene && scene.is && scene.is('vr-mode');
  const obj = wg.object3D;
  const saveY = inVR ? obj.position.y : (obj.position.y - DESKTOP_WORKSTATION_Y_OFFSET);
  state.workstationPosition = { x: obj.position.x, y: saveY, z: obj.position.z };
  state.workstationRotation = {
    x: obj.rotation.x * 180 / Math.PI,
    y: obj.rotation.y * 180 / Math.PI,
    z: obj.rotation.z * 180 / Math.PI
  };
}

function buildLightHarp() {
  var container = document.getElementById('lightHarpContainer');
  if (!container) return;
  var existing = container.querySelectorAll('[data-light-harp-beam]');
  for (var e = 0; e < existing.length; e++) existing[e].parentNode.removeChild(existing[e]);
  var notes = ['C4','C#4','D4','D#4','E4','F4','F#4','G4','G#4','A4','A#4','B4','C5','C#5','D5','D#5','E5','F5','F#5','G5'];
  var numBeams = 19;
  var beamLength = 5.5;
  var beamRadius = 0.014;
  var sourceY = 0.14;
  var sourceZ = -0.05;
  var spreadDeg = 160;
  var spreadRad = (spreadDeg * Math.PI / 180);
  // Rainbow with explicit orange and dark blue: red -> orange -> yellow -> green -> cyan -> blue -> dark blue -> purple
  var hueStops = [0, 28, 45, 90, 150, 195, 240, 255, 270]; // orange ~28, dark blue 240-255
  var lightnessStops = [0.5, 0.55, 0.5, 0.5, 0.5, 0.5, 0.5, 0.42, 0.5]; // dark blue slightly darker
  var colors = [];
  for (var c = 0; c < numBeams; c++) {
    var t = c / Math.max(1, numBeams - 1);
    var seg = t * (hueStops.length - 1);
    var i0 = Math.floor(seg);
    var i1 = Math.min(i0 + 1, hueStops.length - 1);
    var f = seg - i0;
    var hue = (hueStops[i0] * (1 - f) + hueStops[i1] * f) / 360;
    var L = (lightnessStops[i0] * (1 - f) + lightnessStops[i1] * f);
    var col = new THREE.Color();
    col.setHSL(hue, 1, L);
    colors.push('#' + col.getHexString());
  }
  for (var i = 0; i < numBeams; i++) {
    var t = i / (numBeams - 1);
    var theta = (t - 0.5) * spreadRad;
    var dx = Math.sin(theta);
    var dy = Math.cos(theta);
    var dz = 0;
    var rotZ = -theta * (180 / Math.PI);
    var beam = document.createElement('a-entity');
    beam.setAttribute('data-light-harp-beam', 'true');
    beam.setAttribute('data-beam-color', colors[i]);
    beam.setAttribute('data-note', notes[i]);
    beam.setAttribute('data-beam-index', i);
    beam.setAttribute('position', '0 ' + sourceY + ' ' + sourceZ);
    beam.setAttribute('rotation', '0 0 ' + rotZ);
    beam.setAttribute('class', 'clickable');
    beam.setAttribute('data-button-id', 'lightHarp-beam-' + i);
    var cyl = document.createElement('a-entity');
    cyl.setAttribute('class', 'clickable');
    cyl.setAttribute('data-light-harp-cyl', 'true');
    cyl.setAttribute('data-note', notes[i]);
    cyl.setAttribute('position', '0 ' + (beamLength / 2) + ' 0');
    (function (idx) {
      var col = new THREE.Color(colors[idx]);
      var geom = new THREE.CylinderGeometry(beamRadius, beamRadius, beamLength, 12);
      var mat = new THREE.MeshStandardMaterial({
        color: col.clone(),
        emissive: col.clone(),
        emissiveIntensity: 2.8,
        metalness: 0.08,
        roughness: 0.15,
        transparent: true,
        opacity: 0.48,
        side: THREE.DoubleSide
      });
      cyl.setObject3D('mesh', new THREE.Mesh(geom, mat));
    })(i);
    cyl.setAttribute('light-harp-flow', 'color:' + colors[i]);
    beam.setAttribute('light-harp-block', 'fullLength:' + beamLength);
    beam.appendChild(cyl);
    var bullet = document.createElement('a-entity');
    bullet.setAttribute('light-harp-bullet', 'fullLength:' + beamLength + ';speed:3.5');
    bullet.setAttribute('position', '0 0 0');
    bullet.setAttribute('geometry', 'primitive:cylinder;radius:0.018;height:0.2');
    bullet.setAttribute('material', 'metalness:0;roughness:0;emissive:' + colors[i] + ';emissiveIntensity:4;transparent:true;opacity:0.95');
    beam.appendChild(bullet);
    (function(beamColor) {
      function playBeamNote(ev) {
        if (!state.lightHarpOn) return;
        var el = ev.currentTarget || ev.target;
        if (!el.getAttribute || !el.getAttribute('data-note')) el = (el.closest && el.closest('[data-note]'));
        var beamEl = el.hasAttribute && el.hasAttribute('data-light-harp-beam') ? el : (el.closest && el.closest('[data-light-harp-beam]'));
        if (!beamEl) return;
        var fixedNote = beamEl.getAttribute && beamEl.getAttribute('data-note');
        var beamIdx = parseInt(beamEl.getAttribute('data-beam-index'), 10);
        if (isNaN(beamIdx)) beamIdx = 0;
        var note = typeof getLightHarpNote === 'function' ? getLightHarpNote(beamIdx, fixedNote) : fixedNote;
        var trackIdx = (state.currentTrack >= 1 && state.currentTrack <= 4) ? state.currentTrack - 1 : 0;
        if (note && typeof playInstrument === 'function') playInstrument(trackIdx, note);
        beamEl.setAttribute('data-beam-hit-at', Date.now());
        beamEl.setAttribute('data-beam-pulse-at', Date.now());
      }
      beam.addEventListener('mouseenter', playBeamNote);
      beam.addEventListener('click', playBeamNote);
      cyl.addEventListener('mouseenter', playBeamNote);
      cyl.addEventListener('click', playBeamNote);
    })(colors[i]);
    container.appendChild(beam);
  }
}

function startTapeRecording(slotId) {
  window._tapeRecordBuffer = { L: [], R: [], sampleRate: audioContext ? audioContext.sampleRate : 44100 };
  window._tapeRecordingSlotId = slotId != null ? slotId : null;
}

function stopTapeRecording() {
  var b = window._tapeRecordBuffer;
  var slotId = window._tapeRecordingSlotId;
  if (!b || !b.L.length || !audioContext) return;
  var len = Math.min(b.L.length, b.R.length);
  var buf = audioContext.createBuffer(2, len, b.sampleRate);
  buf.copyToChannel(new Float32Array(b.L.slice(0, len)), 0);
  buf.copyToChannel(new Float32Array(b.R.slice(0, len)), 1);
  if (slotId != null && slotId >= 0 && slotId <= 9) {
    tapeRecordings[slotId] = buf;
    var dur = len / b.sampleRate;
    tapeMetadata[slotId] = { durationSeconds: dur, label: 'Tape ' + (slotId + 1) + ' · ' + dur.toFixed(1) + 's' };
    [1, 2].forEach(function(i) { if (tapeState['deck' + i] && tapeState['deck' + i].shelfSlotId === slotId && typeof updateDeckCassetteLabel === 'function') updateDeckCassetteLabel(i); });
    showMessage('📼 Tape ' + (slotId + 1) + ' recorded ' + dur.toFixed(1) + 's', 2500);
  } else {
    tapeRecordedBuffer = buf;
    showMessage('📼 RECORDED ' + (len / b.sampleRate).toFixed(1) + 's', 2500);
  }
  window._tapeRecordingSlotId = null;
}

function startTapePlayback(slotId) {
  var playSlotId = slotId != null ? slotId : (tapeState.deck2 && tapeState.deck2.shelfSlotId != null ? tapeState.deck2.shelfSlotId : null);
  var buf = (playSlotId != null && tapeRecordings[playSlotId]) ? tapeRecordings[playSlotId] : (playSlotId == null ? tapeRecordedBuffer : null);
  if (!buf || !audioContext) {
    showMessage(playSlotId != null ? '📼 Tape ' + (playSlotId + 1) + ' is blank - record first' : '📼 NO TAPE - Record first or load a tape', 2000);
    return;
  }
  stopTapePlayback();
  var src = audioContext.createBufferSource();
  src.buffer = buf;
  src.loop = false;
  var wowGain = audioContext.createGain();
  wowGain.gain.value = 1;
  src.connect(wowGain);
  wowGain.connect(masterGain);
  tapePlaybackSource = { source: src, startTime: audioContext.currentTime };
  tapeWowPhase = 0;
  src.start(0);
  src.onended = function() { tapeState.deck2.playing = false; tapePlaybackSource = null; if (typeof updateTapeDeckDisplays === 'function') updateTapeDeckDisplays(); };
}

function stopTapePlayback() {
  if (tapePlaybackSource) {
    try { tapePlaybackSource.source.stop(); } catch (e) {}
    tapePlaybackSource = null;
  }
}

function startTapeRadio() {
  if (!audioContext || tapeRadioSource) return;
  try {
    var audio = document.createElement('audio');
    audio.crossOrigin = 'anonymous';
    audio.autoplay = true;
    audio.src = 'https://stream.radioparadise.com/aac-320';
    tapeRadioAudio = audio;
    var src = audioContext.createMediaElementSource(audio);
    tapeRadioSource = src;
    src.connect(masterGain);
    if (tapeMixGain) src.connect(tapeMixGain);
    audio.play().catch(function(e) { showMessage('RADIO: stream failed – try another source'); });
  } catch (e) {
    showMessage('RADIO: ' + (e.message || 'failed'));
  }
}

function stopTapeRadio() {
  if (tapeRadioAudio) {
    tapeRadioAudio.pause();
    tapeRadioAudio.src = '';
    tapeRadioAudio = null;
  }
  if (tapeRadioSource && tapeMixGain) {
    try { tapeRadioSource.disconnect(); } catch (_) {}
    tapeRadioSource = null;
  }
}

let tapeMicStream = null;
let tapeMicSource = null;

function startTapeMicCapture() {
  if (!audioContext || tapeMicSource) return;
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showMessage('MIC: getUserMedia not supported');
    return;
  }
  navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
    tapeMicStream = stream;
    var src = audioContext.createMediaStreamSource(stream);
    tapeMicSource = src;
    src.connect(masterGain);
    if (tapeMixGain) src.connect(tapeMixGain);
    stream.getAudioTracks().forEach(function(t) { t.onended = stopTapeMicCapture; });
    showMessage('MIC – recording from onboard mic', 2000);
  }).catch(function(e) {
    showMessage('MIC: ' + (e.name || 'cancelled'));
  });
}

function stopTapeMicCapture() {
  if (tapeMicStream) {
    tapeMicStream.getTracks().forEach(function(t) { t.stop(); });
    tapeMicStream = null;
  }
  if (tapeMicSource) {
    try { tapeMicSource.disconnect(); } catch (_) {}
    tapeMicSource = null;
  }
}

function createReversedBuffer(buf) {
  if (!buf || !audioContext) return null;
  var ch = buf.numberOfChannels;
  var len = buf.length;
  var rev = audioContext.createBuffer(ch, len, buf.sampleRate);
  for (var c = 0; c < ch; c++) {
    var srcData = buf.getChannelData(c);
    var dstData = rev.getChannelData(c);
    for (var i = 0; i < len; i++) dstData[i] = srcData[len - 1 - i];
  }
  return rev;
}

function startTapeScrub(deckIdx, isFF) {
  var d = tapeState['deck' + deckIdx];
  if (!d) return;
  var slotId = d.shelfSlotId != null ? d.shelfSlotId : (deckIdx === 1 ? 8 : 9);
  var buf = tapeRecordings[slotId];
  if (!buf || !audioContext) return;
  stopTapeScrub();
  if (deckIdx === 2) stopTapePlayback();
  if (!isFF) {
    buf = createReversedBuffer(buf);
    if (!buf) return;
  }
  var src = audioContext.createBufferSource();
  src.buffer = buf;
  src.loop = false;
  src.playbackRate.value = 4;
  var gain = audioContext.createGain();
  gain.gain.value = 0.8;
  src.connect(gain);
  gain.connect(masterGain);
  src.start(0);
  tapeScrubSource = { source: src, gain: gain };
  src.onended = function() { stopTapeScrub(); };
}

function stopTapeScrub() {
  if (tapeScrubSource) {
    try { tapeScrubSource.source.stop(); } catch (e) {}
    tapeScrubSource = null;
  }
}

function applyTapeWowFlutter() {
  if (!tapePlaybackSource || !tapePlaybackSource.source) return;
  tapeWowPhase += 0.15;
  var wow = 0.0025 * Math.sin(tapeWowPhase * 0.5);
  var flutter = 0.0008 * Math.sin(tapeWowPhase * 12);
  tapePlaybackSource.source.playbackRate.value = 1 + wow + flutter;
}

function handleTapeFFRWDown(deckIdx, isFF) {
  var d = tapeState['deck' + deckIdx];
  if (!d) return;
  if (d.doorOpen) return;
  if (isFF) { d.ff = true; d.rw = false; } else { d.rw = true; d.ff = false; }
  d.playing = false;
  if (deckIdx === 2) stopTapePlayback();
  playTapeSound('ffrw', { loop: true });
  startTapeScrub(deckIdx, isFF);
  window._tapeFFRWDeck = deckIdx;
  window._tapeFFRWIsFF = isFF;
}

function handleTapeFFRWUp() {
  if (window._tapeFFRWDeck == null) return;
  var d = tapeState['deck' + window._tapeFFRWDeck];
  if (d) { d.ff = false; d.rw = false; d.ffRwJustEnded = Date.now(); }
  stopTapeScrub();
  stopTapeSound('ffrw');
  window._tapeFFRWReleaseTime = Date.now();
  window._tapeFFRWDeck = null;
}

// --- UNDO SYSTEM ---
function saveUndoState() {
  const snapshot = {
    pattern: state.currentPattern,
    track: state.currentTrack,
    step: state.highlightedStep,
    data: JSON.parse(JSON.stringify(patterns[state.currentPattern])),
    trackVolumes: [...state.trackVolumes],
    drumVolumes: [...state.drumVolumes],
    trackPans: [...state.trackPans],
    drumPans: [...state.drumPans]
  };
  undoStack.push(snapshot);
  if (undoStack.length > MAX_UNDO) undoStack.shift();
}

      osc2Btn.setAttribute('scale', '1 1 1');

    }
  }

function performUndo() {
  if (undoStack.length === 0) {
    showMessage('⚠️ NOTHING TO UNDO');
    return;
  }
 
  const snapshot = undoStack.pop();
  state.currentPattern = snapshot.pattern;
  state.currentTrack = snapshot.track;
  state.highlightedStep = Math.max(0, snapshot.step - 1);
 
  const newView = Math.floor(state.highlightedStep / 16);
  if (newView !== state.currentStepView) state.currentStepView = newView;
 
  patterns[state.currentPattern] = JSON.parse(JSON.stringify(snapshot.data));
 
  if (!state.mixOverride && snapshot.trackVolumes) state.trackVolumes = [...snapshot.trackVolumes];
  if (snapshot.drumVolumes) state.drumVolumes = [...snapshot.drumVolumes];
  if (!state.mixOverride && snapshot.trackPans) state.trackPans = [...snapshot.trackPans];
  if (snapshot.drumPans) state.drumPans = [...snapshot.drumPans];
 
  updateSteps();
  updateUI();
  if (state.currentPage === 'chord' && typeof updateChordSteps === 'function') updateChordSteps();
  showMessage(`↶ UNDO (${undoStack.length} left)`);
}

AFRAME.registerComponent('velocity-painter', {
  schema: {
    barIndex: { type: 'number', default: 0 }
  },
  init: function() {
    this.el.addEventListener('click', (e) => {
      e.stopPropagation();
      const barIndex = this.data.barIndex;
      const offset = state.currentStepView * 16;
      const stepIndex = offset + barIndex;
     
      // **CRITICAL: Calculate velocity from click Y position**
      const intersection = e.detail.intersection;
      if (intersection) {
        // Get the click point in world space
        const clickPoint = intersection.point;
       
        // Get the bar's world position
        const barWorldPos = new THREE.Vector3();
        this.el.object3D.getWorldPosition(barWorldPos);
       
        // Calculate relative Y position
        // Bar height range is 0.05 to 0.15 (total 0.1 range)
        const minHeight = 0.05;
        const maxHeight = 0.15;
        const barRange = maxHeight - minHeight;
       
        // Click Y relative to bar bottom
        const relativeY = clickPoint.y - (barWorldPos.y - (this.el.getAttribute('height') / 2));
       
        // Convert to velocity (0-1)
        let velocity = Math.max(0, Math.min(1, relativeY / barRange));
       
        // Snap to MIDI values (0-127)
        const midiVel = Math.round(velocity * 127);
        velocity = midiVel / 127;
       
        console.log(`🎚️ Velocity Bar Click: Y=${relativeY.toFixed(3)}, Vel=${velocity.toFixed(3)}, MIDI=${midiVel}`);
       
        this.paintVelocity(stepIndex, velocity);
      }
    });
   
    this.el.addEventListener('mousedown', (e) => {
      e.stopPropagation();
      window.isVelocityPainting = true;
      this.lastPaintedBar = this.data.barIndex;
    });
   
    this.el.addEventListener('mouseenter', (e) => {
      if (window.isVelocityPainting) {
        const barIndex = this.data.barIndex;
        const offset = state.currentStepView * 16;
        const stepIndex = offset + barIndex;
       
        // Get intersection point for continuous painting
        const raycaster = document.querySelector('[camera]').components.raycaster;
        if (raycaster && raycaster.raycaster) {
          const intersects = raycaster.raycaster.intersectObject(this.el.object3D, true);
          if (intersects.length > 0) {
            const clickPoint = intersects[0].point;
            const barWorldPos = new THREE.Vector3();
            this.el.object3D.getWorldPosition(barWorldPos);
           
            const minHeight = 0.05;
            const maxHeight = 0.15;
            const barRange = maxHeight - minHeight;
            const relativeY = clickPoint.y - (barWorldPos.y - (this.el.getAttribute('height') / 2));
           
            let velocity = Math.max(0, Math.min(1, relativeY / barRange));
            const midiVel = Math.round(velocity * 127);
            velocity = midiVel / 127;
           
            this.paintVelocity(stepIndex, velocity);
          }
        }
      }
    });
  },
 
  getCurrentVelocity: function(stepIndex) {
    const pat = patterns[state.currentPattern];
    if (state.currentTrack === 0) {
      return pat.drumVelocity[state.selectedDrum][stepIndex] ?? 1.0;
    } else {
      const trackKeys = ['', 'bass', 'lead', 'pad', 'arp'];
      const trackKey = trackKeys[state.currentTrack];
      return pat.velocity[trackKey][stepIndex] ?? 0.8;
    }
  },
 
  paintVelocity: function(stepIndex, velocity) {
    const pat = patterns[state.currentPattern];
   
    // Round to MIDI value
    const midiVel = Math.round(velocity * 127);
    const normalizedVel = midiVel / 127;
   
    if (state.currentTrack === 0) {
      pat.drumVelocity[state.selectedDrum][stepIndex] = normalizedVel;
    } else {
      const trackKeys = ['', 'bass', 'lead', 'pad', 'arp'];
      const trackKey = trackKeys[state.currentTrack];
      pat.velocity[trackKey][stepIndex] = normalizedVel;
    }
   
    updateVelocityLane();
    showMessage(`VEL: ${midiVel}/127 @ STEP ${stepIndex + 1}`);
  }
});

function createVelocityLane() {
  const container = document.getElementById('velocityLane');
  if (!container) return;
 
  container.innerHTML = '';
  velocityBars = [];
  const num = 16;
 
  window.isVelocityPainting = false;
  window.lastVelocityPaintedBar = -1;
  window.lastVelocityPaintedVal = -1;
 
  // Create clickable background plane - behind step row in Z so gaze hits steps first, not this plane
  const clickPlane = document.createElement('a-plane');
  clickPlane.setAttribute('width', num * 0.13 + 0.2);
  clickPlane.setAttribute('height', 0.35);
  clickPlane.setAttribute('position', '0 0.05 -0.08');
  clickPlane.setAttribute('rotation', '0 0 0');
  clickPlane.setAttribute('color', '#0a0a1a');
  clickPlane.setAttribute('opacity', '1.0');
  clickPlane.setAttribute('transparent', 'false');
  clickPlane.setAttribute('material', 'metalness:0.5;roughness:0.5;emissive:#0a0a1a;emissiveIntensity:0.1');
  clickPlane.setAttribute('class', 'clickable');
  clickPlane.setAttribute('id', 'velocity-click-plane');
  container.appendChild(clickPlane);
 
  // Paint velocity function (exposed for hand-fingertip-touch)
  window.paintVelocityAtPoint = (localPoint) => {
    const planeWidth = num * 0.13 + 0.2;
    const planeHeight = 0.35;
   
    // Calculate which bar (X position)
    const normalizedX = (localPoint.x + planeWidth/2) / planeWidth;
    const barIndex = Math.floor(normalizedX * num);
   
    if (barIndex < 0 || barIndex >= num) return;
   
    // Calculate velocity from Y - snap to 16 levels (0, 8, 16...127) for easier hand selection
    const minY = -planeHeight / 2;
    const maxY = planeHeight / 2;
    const normalizedY = (localPoint.y - minY) / (maxY - minY);
    const rawVel = Math.max(0, Math.min(1, normalizedY));
    const levels = 16;
    const snapped = Math.round(rawVel * (levels - 1)) / (levels - 1);
    const midiVel = Math.round(snapped * 127);
    const velocity = midiVel / 127;
    if (barIndex === window.lastVelocityPaintedBar && midiVel === window.lastVelocityPaintedVal) return;
    window.lastVelocityPaintedBar = barIndex;
    window.lastVelocityPaintedVal = midiVel;
   
    // Apply velocity
    const offset = state.currentStepView * 16;
    const stepIndex = offset + barIndex;
    const pat = patterns[state.currentPattern];
   
    if (state.currentTrack === 0) {
      pat.drumVelocity[state.selectedDrum][stepIndex] = velocity;
    } else {
      const trackKeys = ['', 'bass', 'lead', 'pad', 'arp'];
      const trackKey = trackKeys[state.currentTrack];
      pat.velocity[trackKey][stepIndex] = velocity;
    }
   
    updateVelocityLane();
    showMessage(`VEL: ${midiVel}/127 @ STEP ${stepIndex + 1}`);
  };
 
  // Click handler
  clickPlane.addEventListener('click', (e) => {
    e.stopPropagation();
    const intersection = e.detail.intersection;
    if (!intersection) return;
   
    const localPoint = clickPlane.object3D.worldToLocal(intersection.point.clone());
    window.paintVelocityAtPoint(localPoint);
  });
 
  // Mouse down - start painting
  clickPlane.addEventListener('mousedown', (e) => {
    e.stopPropagation();
    window.isVelocityPainting = true;
    window.lastVelocityPaintedBar = -1;
    window.lastVelocityPaintedVal = -1;
   
    const intersection = e.detail.intersection;
    if (intersection) {
      const localPoint = clickPlane.object3D.worldToLocal(intersection.point.clone());
      window.paintVelocityAtPoint(localPoint);
    }
  });
 
  // Mouse enter - continue painting if mouse is down
  clickPlane.addEventListener('mouseenter', (e) => {
    if (window.isVelocityPainting) {
      const intersection = e.detail.intersection;
      if (intersection) {
        const localPoint = clickPlane.object3D.worldToLocal(intersection.point.clone());
        window.paintVelocityAtPoint(localPoint);
      }
    }
  });
 
  // Mouse move - paint while dragging
  clickPlane.addEventListener('mousemove', (e) => {
    if (window.isVelocityPainting) {
      const intersection = e.detail.intersection;
      if (intersection) {
        const localPoint = clickPlane.object3D.worldToLocal(intersection.point.clone());
        window.paintVelocityAtPoint(localPoint);
      }
    }
  });
 
  // Global mouse up - stop painting
  window.addEventListener('mouseup', () => {
    window.isVelocityPainting = false;
    window.lastVelocityPaintedBar = -1;
    window.lastVelocityPaintedVal = -1;
  });
 
  // Create visual bars - SAME Z as step buttons
  for (let i = 0; i < num; i++) {
    const bar = document.createElement('a-box');
    const x = (i - num / 2 + 0.5) * 0.13;
    bar.setAttribute('position', `${x} 0 0`); // ← Z = 0 (same as step buttons)
    bar.setAttribute('width', '0.10');
    bar.setAttribute('height', '0.10');
    bar.setAttribute('depth', '0.04');
    container.appendChild(bar);
    velocityBars[i] = bar;
   
    // Add MIDI value label
    const stepLabel = document.createElement('a-text');
    stepLabel.setAttribute('value', '64');
    stepLabel.setAttribute('align', 'center');
    stepLabel.setAttribute('position', '0 0 0.025');
    stepLabel.setAttribute('scale', '0.12 0.12 0.12');
    stepLabel.setAttribute('color', '#000000');
    bar.appendChild(stepLabel);
  }
 
  console.log('✅ Created velocity lane with drag painting support');
}

function updateVelocityLane() {
  if (!velocityBars || velocityBars.length === 0) return;
 
  const offset = state.currentStepView * 16;
  // Match plinth colour (drums/strings/track)
  let plinthColor;
  if (state.displayTrack < 4) plinthColor = drumColors[state.displayTrack];
  else if (state.displayTrack === 8) plinthColor = stringsPurple;
  else plinthColor = trackColors[state.currentTrack];
  const currentColor = plinthColor || trackColors[state.currentTrack] || '#00AA00';
  const pat = patterns[state.currentPattern];
 
  if (!pat || !pat.velocity || !pat.drumVelocity) return;
 
  velocityBars.forEach((bar, i) => {
    const step = offset + i;
    let velValue = 0.8;
   
    if (state.currentTrack === 0) {
      if (pat.drumVelocity && pat.drumVelocity[state.selectedDrum]) {
        velValue = pat.drumVelocity[state.selectedDrum][step] ?? 1.0;
      }
    } else {
      const trackKeys = ['', 'bass', 'lead', 'pad', 'arp'];
      const trackKey = trackKeys[state.currentTrack];
      if (pat.velocity && pat.velocity[trackKey]) {
        velValue = pat.velocity[trackKey][step] ?? 0.8;
      }
    }
   
    // Height based on velocity (0.02 min to 0.18 max)
    const minHeight = 0.02;
    const maxHeight = 0.18;
    const h = minHeight + (velValue * (maxHeight - minHeight));
    bar.setAttribute('height', h.toFixed(3));
   
    // Position: Y = half the height, Z = 0 (same as step buttons)
    const x = (i - 8 + 0.5) * 0.13;
    const y = (h / 2) - 0.1;
    bar.setAttribute('position', `${x} ${y} 0`); // ← Z = 0
   
    // Color intensity based on velocity
    const glow = 0.3 + (velValue * 2.0);
    bar.setAttribute('material', `color: ${currentColor}; emissive: ${currentColor}; emissiveIntensity: ${glow}`);
   
    // UPDATE LABEL WITH MIDI VALUE
    const stepLabel = bar.querySelector('a-text');
    if (stepLabel) {
      const midiVal = Math.round(velValue * 127);
      stepLabel.setAttribute('value', `${midiVal}`);
     
      // Use white text on dark bars, black on bright bars
      const textColor = velValue < 0.5 ? '#FFFFFF' : '#000000';
      stepLabel.setAttribute('color', textColor);
      stepLabel.setAttribute('scale', '0.12 0.12 0.12');
    }
   
    // Highlight current/playing step
    if (step === state.highlightedStep) {
      bar.setAttribute('material', `emissive: #FFFF00; emissiveIntensity: 3`);
    } else if (state.isPlaying && step === state.currentStep) {
      bar.setAttribute('material', `emissive: #00FF00; emissiveIntensity: 3`);
    }
  });
}

function updateOsc2() {
  if (!analyser || !window.waveform2Data) return;
  if (Math.random() > 0.5) return; // Throttle updates
 
  const container = document.getElementById('oscilloscope');
  if (!container) return;
 
  analyser.getByteTimeDomainData(dataArray);
 
  const data = window.waveform2Data;
  const samples = 80; // Number of waveform points
  const width = 2.0; // Width of oscilloscope
  const height = 0.15; // Height of oscilloscope
 
  // Detect audio activity
  let maxAmplitude = 0;
  for (let i = 0; i < dataArray.length; i++) {
    const rawValue = Math.abs(dataArray[i] / 128.0 - 1.0);
    if (rawValue > maxAmplitude) maxAmplitude = rawValue;
  }
 
  const isPlayingAudio = maxAmplitude > 0.01 && state.isPlaying;
 
  // Advance time and hue
  data.time += 0.05;
  data.hueOffset = (data.hueOffset + 2) % 360;
 
  // Calculate new waveform points
  const newPoints = [];
  const step = Math.floor(dataArray.length / samples);
 
  if (isPlayingAudio) {
    // Real audio waveform
    const dynamicAmplification = maxAmplitude > 0.001 ? (0.6 / maxAmplitude) : 10.0;
    const amplification = Math.min(dynamicAmplification, 12.0);
   
    for (let i = 0; i < samples; i++) {
      const x = (i / samples - 0.5) * width;
      const rawValue = (dataArray[i * step] / 128.0 - 1.0);
      const y = rawValue * (height / 2) * amplification;
      newPoints.push({ x, y, z: 0.01 });
    }
  } else {
    // Demo animated waveform
    for (let i = 0; i < samples; i++) {
      const x = (i / samples - 0.5) * width;
      const wave1 = Math.sin((i / samples) * Math.PI * 4 + data.time) * 0.4;
      const wave2 = Math.sin((i / samples) * Math.PI * 8 + data.time * 1.5) * 0.2;
      const wave3 = Math.sin((i / samples) * Math.PI * 16 + data.time * 2) * 0.1;
      const y = (wave1 + wave2 + wave3) * (height / 2);
      newPoints.push({ x, y, z: 0.01 });
    }
  }
 
  // Update trail history (phosphor effect)
  if (data.currentPoints.length > 0) {
    data.trail3 = [...data.trail2];
    data.trail2 = [...data.trail1];
    data.trail1 = [...data.currentPoints];
  }
  data.currentPoints = newPoints;
 
  // Render main waveform
  renderWaveformLine('waveform-main', data.currentPoints, data.hueOffset, 1.0);
 
  // Render phosphor trails
  if (data.trail1.length > 0) {
    renderWaveformLine('waveform-trail1', data.trail1, data.hueOffset - 30, 0.6);
  }
  if (data.trail2.length > 0) {
    renderWaveformLine('waveform-trail2', data.trail2, data.hueOffset - 60, 0.3);
  }
  if (data.trail3.length > 0) {
    renderWaveformLine('waveform-trail3', data.trail3, data.hueOffset - 90, 0.15);
  }
 
  // Add glow spheres at peak points
  renderGlowSpheres(data.currentPoints, data.hueOffset);
}

function renderWaveformLine(id, points, hueBase, opacity) {
  const container = document.getElementById('oscilloscope');
  if (!container || points.length < 2) return;
 
  let lineEl = document.getElementById(id);
 
  if (!lineEl) {
    lineEl = document.createElement('a-entity');
    lineEl.setAttribute('id', id);
    container.appendChild(lineEl);
  }
 
  // Create line segments with rainbow gradient
  const segmentCount = points.length - 1;
  let pathStr = '';
 
  for (let i = 0; i < segmentCount; i++) {
    const p1 = points[i];
    const p2 = points[i + 1];
   
    // Calculate hue for this segment (rainbow gradient)
    const hue = (hueBase + (i / segmentCount) * 360) % 360;
    const color = `hsl(${hue}, 100%, 60%)`;
   
    // Create individual line segment
    let segmentEl = document.getElementById(`${id}-seg-${i}`);
    if (!segmentEl) {
      segmentEl = document.createElement('a-entity');
      segmentEl.setAttribute('id', `${id}-seg-${i}`);
      segmentEl.setAttribute('line', `start: ${p1.x} ${p1.y} ${p1.z}; end: ${p2.x} ${p2.y} ${p2.z}; color: ${color}; opacity: ${opacity}`);
      lineEl.appendChild(segmentEl);
    } else {
      segmentEl.setAttribute('line', `start: ${p1.x} ${p1.y} ${p1.z}; end: ${p2.x} ${p2.y} ${p2.z}; color: ${color}; opacity: ${opacity}`);
    }
  }
}

function renderGlowSpheres(points, hueBase) {
  const container = document.getElementById('oscilloscope');
  if (!container || points.length < 5) return;
 
  // Find peak points (every 10th point for performance)
  const peakIndices = [];
  for (let i = 10; i < points.length - 10; i += 10) {
    const current = Math.abs(points[i].y);
    const prev = Math.abs(points[i - 1].y);
    const next = Math.abs(points[i + 1].y);
   
    if (current > prev && current > next && current > 0.02) {
      peakIndices.push(i);
    }
  }
 
  // Limit to 8 glow spheres max
  const maxGlows = Math.min(8, peakIndices.length);
 
  for (let i = 0; i < maxGlows; i++) {
    const idx = peakIndices[i];
    const point = points[idx];
    const hue = (hueBase + (idx / points.length) * 360) % 360;
    const color = `hsl(${hue}, 100%, 70%)`;
   
    let glowEl = document.getElementById(`waveform-glow-${i}`);
    if (!glowEl) {
      glowEl = document.createElement('a-sphere');
      glowEl.setAttribute('id', `waveform-glow-${i}`);
      glowEl.setAttribute('radius', '0.008');
      container.appendChild(glowEl);
    }
   
    glowEl.setAttribute('position', `${point.x} ${point.y} ${point.z + 0.005}`);
    glowEl.setAttribute('color', color);
    glowEl.setAttribute('material', `shader: flat; transparent: true; opacity: 0.8; emissive: ${color}; emissiveIntensity: 2.0`);
  }
 
  // Hide unused glow spheres
  for (let i = maxGlows; i < 8; i++) {
    const glowEl = document.getElementById(`waveform-glow-${i}`);
    if (glowEl) {
      glowEl.setAttribute('visible', 'false');
    }
  }
}

function hslToHex(h, s, l) {
  l /= 100;
  const a = s * Math.min(l, 1 - l) / 100;
  const f = n => {
    const k = (n + h / 30) % 12;
    const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
    return Math.round(255 * color).toString(16).padStart(2, '0');
  };
  return `#${f(0)}${f(8)}${f(4)}`;
}

    waveformContext.fillRect(0, 0, waveformCanvas.width, waveformCanvas.height);
   
    const width = waveformCanvas.width;
    const height = waveformCanvas.height;
    const samples = 80;  // Reduced from 200 for lower CPU
   
    // Generate waveform points
    const points = [];
    if (isPlayingAudio) {
      const step = Math.floor(dataArray.length / samples);
      const dynamicAmplification = maxAmplitude > 0.001 ? (0.6 / maxAmplitude) : 10.0;
      const amplification = Math.min(dynamicAmplification, 10.0);
     
      for (let i = 0; i < samples; i++) {
        const x = (i / samples) * width;
        const rawValue = (dataArray[i * step] / 128.0 - 1.0);
        const y = (height / 2) + (rawValue * (height / 2) * amplification);
        points.push({x, y});
      }
    } else {
      if (!window.waveformTime) window.waveformTime = 0;
      window.waveformTime += 0.08;
      for (let i = 0; i < samples; i++) {
        const x = (i / samples) * width;
        const wave1 = Math.sin((i / samples) * Math.PI * 3 + window.waveformTime) * 0.5;
        const wave2 = Math.sin((i / samples) * Math.PI * 7 + window.waveformTime * 1.3) * 0.25;
        const y = (height / 2) + ((wave1 + wave2) * (height / 3));
        points.push({x, y});
      }
    }
   
    if (!window.waveformColorTime) window.waveformColorTime = 0;
    window.waveformColorTime += 0.5;
    waveformContext.lineWidth = 2;
    waveformContext.lineCap = 'round';
    waveformContext.lineJoin = 'round';
   
    // Single path for line (faster than per-segment strokeStyle)
    waveformContext.beginPath();
    waveformContext.moveTo(points[0].x, points[0].y);
    for (let i = 1; i < points.length; i++) {
      waveformContext.lineTo(points[i].x, points[i].y);
    }
    waveformContext.strokeStyle = `hsl(${window.waveformColorTime % 360}, 100%, 60%)`;
    waveformContext.stroke();
   
    // Glow only every 4th point to reduce CPU
    for (let i = 0; i < points.length; i += 4) {
      const p = points[i];
      const hue = (i / points.length) * 360 + window.waveformColorTime;
      const gradient = waveformContext.createRadialGradient(p.x, p.y, 0, p.x, p.y, 5);
      gradient.addColorStop(0, `hsla(${hue % 360}, 100%, 70%, 0.9)`);
      gradient.addColorStop(1, 'hsla(0,0%,70%,0)');
      waveformContext.fillStyle = gradient;
      waveformContext.fillRect(p.x - 5, p.y - 5, 10, 10);
    }
   
    // Update texture
    if (waveformTexture) {
      waveformTexture.needsUpdate = true;
    }
  }
}

// ← ADD THE FUNCTION HERE
function getQuantizedStep(step, blockStart, grid) {
  // Calculate position relative to block
  const relativePos = step - blockStart;
  const offset = relativePos % grid;
  let quantizedRelative;
 
  if (offset < grid / 2) {
    quantizedRelative = relativePos - offset; // Snap backwards
  } else {
    quantizedRelative = relativePos + (grid - offset); // Snap forwards
  }
 
  return blockStart + quantizedRelative;
}

function updateSongSlots() {
  if (!ui.songSlotButtons || ui.songSlotButtons.length === 0) return;
  if (typeof ui.selectedSongSlot === 'undefined') ui.selectedSongSlot = 0;

  ui.songSlotButtons.forEach((btn, i) => {
    const patternNum = state.songArrangement[i];
   
    let label = btn.querySelector('a-text');
    if (!label) {
      label = document.createElement('a-text');
      label.setAttribute('align', 'center');
      label.setAttribute('position', '0 0 0.055');
      btn.appendChild(label);
    }
   
    let textValue = patternNum > 0 ? `${patternNum}` : '-';
    let textColor = '#FFFFFF';
   let textScale = patternNum > 0 ? '0.35 0.35 0.35' : '0.15 0.15 0.15';  // Reduced from 0.5

    // PRIORITY 1: PLAYING HEAD (Inverted Colors)
    if (state.isPlaying && state.arrangementMode && i === state.currentArrangementIndex) {
      btn.setAttribute('color', '#FFFFFF');  // White background
      btn.setAttribute('material', 'metalness:0.1;roughness:0.2;emissive:#00FF00;emissiveIntensity:2.0');
      btn.setAttribute('scale', '1.2 1.2 1.2');
      textColor = '#000000';  // Black text on white
    textScale = '0.45 0.45 0.45';  // Reduced from 0.6 (for playing position)
    }
    // PRIORITY 2: SELECTED CURSOR (Purple outline)
    else if (i === ui.selectedSongSlot) {
      const color = patternNum > 0 ? (patternColors[patternNum] || '#5588AA') : '#9b5cff';
      btn.setAttribute('color', color);
      btn.setAttribute('material', `metalness:.3;roughness:.6;emissive:#9b5cff;emissiveIntensity:1.5`);
      btn.setAttribute('scale', '1.15 1.15 1.15');
      textColor = '#000000';
    }
    // PRIORITY 3: FILLED SLOT
    else if (patternNum > 0) {
      const color = patternColors[patternNum] || '#5588AA';
      btn.setAttribute('color', color);
      btn.setAttribute('material', `metalness:.3;roughness:.6;emissive:${color};emissiveIntensity:0.4`);
      btn.setAttribute('scale', '1 1 1');
      textColor = '#000000';
    }
    // PRIORITY 4: EMPTY SLOT
    else {
      btn.setAttribute('color', '#334455');
      btn.setAttribute('material', 'metalness:.3;roughness:.6;emissive:#000;emissiveIntensity:0');
      btn.setAttribute('scale', '1 1 1');
      textColor = '#555555';
    }

    label.setAttribute('value', textValue);
    label.setAttribute('color', textColor);
    label.setAttribute('scale', textScale);

// GENERATOR FUNCTIONS – 4/4 styles: Rock, Pop, Disco, 16ths, etc.; BEAT and FILL pick random style each time

function _clearDrums(pat, start, end) {
  ['kick', 'snare', 'hihat', 'open'].forEach(drum => {
    for (let i = start; i < end; i++) {
      pat.drums[drum][i] = false;
      pat.drumVelocity[drum][i] = 1.0;
    }
  });
}

function generateRandomBeat() {
  const pat = patterns[state.currentPattern];
  _clearDrums(pat, 0, 64);
  const styles = [
    function rock() {
      for (let i = 0; i < 64; i += 4) { pat.drums.kick[i] = true; pat.drumVelocity.kick[i] = 0.85 + Math.random() * 0.15; }
      for (let i = 4; i < 64; i += 8) { pat.drums.snare[i] = true; pat.drumVelocity.snare[i] = 0.85 + Math.random() * 0.15; }
      for (let i = 0; i < 64; i += 2) { pat.drums.hihat[i] = Math.random() > 0.15; pat.drumVelocity.hihat[i] = 0.5 + Math.random() * 0.35; }
    },
    function pop() {
      for (let i = 0; i < 64; i += 4) { pat.drums.kick[i] = true; pat.drumVelocity.kick[i] = 0.8 + Math.random() * 0.2; }
      for (let i = 4; i < 64; i += 8) { pat.drums.snare[i] = true; pat.drumVelocity.snare[i] = 0.75 + Math.random() * 0.2; }
      for (let i = 0; i < 64; i += 4) { pat.drums.hihat[i] = true; pat.drumVelocity.hihat[i] = 0.4 + Math.random() * 0.3; }
    },
    function disco() {
      for (let i = 0; i < 64; i++) { pat.drums.kick[i] = true; pat.drumVelocity.kick[i] = 0.7 + Math.random() * 0.25; }
      for (let i = 4; i < 64; i += 8) { pat.drums.snare[i] = true; pat.drumVelocity.snare[i] = 0.85 + Math.random() * 0.15; }
      for (let i = 0; i < 64; i += 2) { pat.drums.hihat[i] = true; pat.drumVelocity.hihat[i] = 0.45 + Math.random() * 0.35; }
    },
    function sixteenths() {
      for (let i = 0; i < 64; i += 4) { pat.drums.kick[i] = true; pat.drumVelocity.kick[i] = 0.85 + Math.random() * 0.15; }
      for (let i = 4; i < 64; i += 8) { pat.drums.snare[i] = true; pat.drumVelocity.snare[i] = 0.8 + Math.random() * 0.2; }
      for (let i = 0; i < 64; i++) { pat.drums.hihat[i] = Math.random() > 0.25; pat.drumVelocity.hihat[i] = 0.4 + Math.random() * 0.4; }
    },
    function halfTime() {
      for (let i = 0; i < 64; i += 8) { pat.drums.kick[i] = true; pat.drumVelocity.kick[i] = 0.9; }
      for (let i = 8; i < 64; i += 16) { pat.drums.snare[i] = true; pat.drumVelocity.snare[i] = 0.85; }
      for (let i = 0; i < 64; i += 2) { pat.drums.hihat[i] = Math.random() > 0.2; pat.drumVelocity.hihat[i] = 0.45 + Math.random() * 0.3; }
    },
    function fourOnFloor() {
      for (let i = 0; i < 64; i += 4) { pat.drums.kick[i] = true; pat.drumVelocity.kick[i] = 0.85 + Math.random() * 0.15; }
      for (let i = 4; i < 64; i += 8) { pat.drums.snare[i] = true; pat.drumVelocity.snare[i] = 0.8 + Math.random() * 0.2; }
      for (let i = 0; i < 64; i += 2) { pat.drums.hihat[i] = true; pat.drumVelocity.hihat[i] = 0.35 + Math.random() * 0.4; }
      for (let i = 8; i < 64; i += 16) { if (Math.random() > 0.4) { pat.drums.open[i] = true; pat.drumVelocity.open[i] = 0.5 + Math.random() * 0.3; } }
    },
    function brokenBeat() {
      for (let i = 0; i < 64; i++) { if (Math.random() > 0.55) pat.drums.kick[i] = true; pat.drumVelocity.kick[i] = 0.7 + Math.random() * 0.3; }
      for (let i = 0; i < 64; i++) { if (Math.random() > 0.6) pat.drums.snare[i] = true; pat.drumVelocity.snare[i] = 0.65 + Math.random() * 0.35; }
      for (let i = 0; i < 64; i += 2) { pat.drums.hihat[i] = Math.random() > 0.1; pat.drumVelocity.hihat[i] = 0.45 + Math.random() * 0.4; }
    }
  ];
  const pick = styles[Math.floor(Math.random() * styles.length)];
  pick();
}

function generateRandomFill() {
  const pat = patterns[state.currentPattern];
  const blockStart = state.currentStepView * 16;
  const blockEnd = blockStart + 16;
  _clearDrums(pat, blockStart, blockEnd);
  const fillStyles = [
    function roll() {
      for (let i = blockStart; i < blockEnd; i++) {
        if ((i - blockStart) % 4 === 0) { pat.drums.kick[i] = true; pat.drumVelocity.kick[i] = 0.8 + Math.random() * 0.2; }
        pat.drums.snare[i] = Math.random() > 0.35;
        pat.drumVelocity.snare[i] = 0.6 + Math.random() * 0.35;
        pat.drums.hihat[i] = Math.random() > 0.05;
        pat.drumVelocity.hihat[i] = 0.45 + Math.random() * 0.4;
      }
    },
    function build() {
      for (let i = blockStart; i < blockEnd; i++) {
        const t = i - blockStart;
        if (t % 4 === 0) pat.drums.kick[i] = true;
        pat.drumVelocity.kick[i] = 0.75 + Math.random() * 0.25;
        if (t >= 8) { pat.drums.snare[i] = Math.random() > 0.3; pat.drumVelocity.snare[i] = 0.6 + (t / 16) * 0.3; }
        pat.drums.hihat[i] = true;
        pat.drumVelocity.hihat[i] = 0.4 + (t / 16) * 0.4;
      }
    },
    function discoFill() {
      for (let i = blockStart; i < blockEnd; i++) {
        pat.drums.kick[i] = true;
        pat.drumVelocity.kick[i] = 0.7 + Math.random() * 0.25;
        pat.drums.snare[i] = (i - blockStart) % 4 === 2 || (i - blockStart) % 4 === 3;
        pat.drumVelocity.snare[i] = 0.7 + Math.random() * 0.25;
        pat.drums.hihat[i] = true;
        pat.drumVelocity.hihat[i] = 0.5 + Math.random() * 0.35;
      }
    },
    function sixteenthRoll() {
      for (let i = blockStart; i < blockEnd; i++) {
        const t = i - blockStart;
        if (t % 4 === 0) pat.drums.kick[i] = true;
        pat.drums.snare[i] = t >= 4;
        pat.drumVelocity.snare[i] = 0.5 + (t / 16) * 0.5;
        pat.drums.hihat[i] = true;
        pat.drumVelocity.hihat[i] = 0.4 + Math.random() * 0.4;
      }
    },
    function halfBar() {
      for (let i = blockStart; i < blockEnd; i++) {
        if ((i - blockStart) < 8) {
          if ((i - blockStart) % 4 === 0) pat.drums.kick[i] = true;
          pat.drums.snare[i] = (i - blockStart) === 4 || (i - blockStart) === 6;
        } else {
          pat.drums.kick[i] = (i - blockStart) % 2 === 0;
          pat.drums.snare[i] = true;
          pat.drumVelocity.snare[i] = 0.7 + Math.random() * 0.3;
        }
        pat.drums.hihat[i] = Math.random() > 0.1;
        pat.drumVelocity.hihat[i] = 0.5 + Math.random() * 0.35;
      }
    },
    function randomDense() {
      for (let i = blockStart; i < blockEnd; i++) {
        pat.drums.kick[i] = (i - blockStart) % 4 === 0 || Math.random() > 0.6;
        pat.drums.snare[i] = Math.random() > 0.4;
        pat.drums.hihat[i] = Math.random() > 0.05;
        pat.drumVelocity.kick[i] = 0.7 + Math.random() * 0.3;
        pat.drumVelocity.snare[i] = 0.6 + Math.random() * 0.35;
        pat.drumVelocity.hihat[i] = 0.45 + Math.random() * 0.4;
      }
    }
  ];
  const pick = fillStyles[Math.floor(Math.random() * fillStyles.length)];
  pick();
}

function generateBassline() {
  const pat = patterns[state.currentPattern];
  const scale = ['C2', 'D2', 'E2', 'F2', 'G2', 'A2', 'B2', 'C3'];
 
  // Generate bassline for whole pattern
  for (let i = 0; i < 64; i += 4) {
    const note = scale[Math.floor(Math.random() * scale.length)];
    pat.bass[i] = note;
    pat.velocity.bass[i] = 0.7 + (Math.random() * 0.2);
   
    // Add some ties
    if (Math.random() > 0.6 && i + 2 < 64) {
      pat.bass[i + 2] = 'TIE';
    }
  }
}

function generateRandomPattern() {
  const pat = patterns[state.currentPattern];
 
  // Randomize drums
  generateRandomBeat();
 
  // Randomize bass
  generateBassline();
 
  // Randomize lead (octave higher)
  const leadScale = ['C4', 'D4', 'E4', 'F4', 'G4', 'A4', 'B4', 'C5'];
  for (let i = 0; i < 64; i++) {
    if (Math.random() > 0.6) {
      pat.lead[i] = leadScale[Math.floor(Math.random() * leadScale.length)];
      pat.velocity.lead[i] = 0.6 + (Math.random() * 0.3);
    } else {
      pat.lead[i] = '';
    }
  }
}

// Add function to update edit step buttons
function updateEditSteps() {
  if (!ui.editStepButtons || ui.editStepButtons.length === 0) return;
 
  const pat = patterns[state.currentPattern];
  const offset = state.currentStepView * 16;

  ui.editStepButtons.forEach((btn, i) => {
    const step = offset + i;
    const beyondLength = step >= patterns[state.currentPattern].length;
   
    let hasNote = false;
    let stepText = '';
    let targetColor = '#FFFFFF';
   
    if (state.displayTrack === 8) {
      hasNote = !!(pat.strings && pat.strings[step]);
      targetColor = stringsPurple;
      stepText = hasNote ? 'S' : '';
    } else if (state.currentTrack === 0) {
      const drumName = state.selectedDrum || 'kick';
      if (pat.drums[drumName] && pat.drums[drumName][step]) hasNote = true;
      const drumIdx = ['kick', 'snare', 'hihat', 'open'].indexOf(drumName);
      if (drumIdx >= 0) targetColor = drumColors[drumIdx];
    } else {
      targetColor = trackColors[state.currentTrack];
      const trackKeys = ['', 'bass', 'lead', 'pad', 'arp'];
      const currentKey = trackKeys[state.currentTrack];
     
      if (currentKey && pat[currentKey]) {
        const note = pat[currentKey][step];
        if (note && note !== '') {
          hasNote = true;
          if (note === '-' || note === 'TIE') {
            stepText = '/';
            targetColor = '#00FFFF';
          } else if (note === '^' || note === 'REST') {
            stepText = '^';
            targetColor = '#FFAA00';
          }
        }
       
        if (state.currentTrack === 4 && pat.arpChords && pat.arpChords[step]) {
          const root = pat.arpChords[step].root;
          if (typeof root !== 'undefined' && chordColors[root]) {
            targetColor = chordColors[root];
          }
        }
      }
    }
   
    const label = btn.querySelector('a-text');
    if (label) {
      if (stepText) {
        label.setAttribute('value', stepText);
        label.setAttribute('scale', '0.18 0.18 0.18');
      } else {
        label.setAttribute('value', `${i + 1}`);
        label.setAttribute('scale', '0.12 0.12 0.12');
      }
    }
    if (beyondLength) {
      btn.setAttribute('color', '#1a1a2a');
      btn.setAttribute('material', 'metalness:0.5;roughness:0.5;emissive:#000000;emissiveIntensity:0');
      btn.setAttribute('scale', '1 1 1');
    } else if (state.isPlaying && step === state.currentStep) {
      btn.setAttribute('color', '#00FF00');
      btn.setAttribute('material', 'metalness:0;roughness:1;emissive:#00FF00;emissiveIntensity:3.5');
      btn.setAttribute('scale', '1 1 1');
    } else if (step === state.highlightedStep) {
      const hiColor = state.displayTrack === 8 ? stringsPurple : purple;
      btn.setAttribute('color', hiColor);
      btn.setAttribute('material', `metalness:0;roughness:1;emissive:${hiColor};emissiveIntensity:2.5`);
      btn.setAttribute('scale', '1.1 1.1 1.1');
    } else if (hasNote) {
      btn.setAttribute('color', targetColor);
      btn.setAttribute('material', `metalness:0;roughness:1;emissive:${targetColor};emissiveIntensity:2.5`);
      btn.setAttribute('scale', '1.05 1.05 1.05');
    } else {
      btn.setAttribute('color', '#0a0a1a');
      btn.setAttribute('material', 'metalness:0.5;roughness:0.5;emissive:#000000;emissiveIntensity:0');
      btn.setAttribute('scale', '1 1 1');
    }
    // Dark text on light background for readability
    if (label) {
      const btnColor = btn.getAttribute('color') || '#0a0a1a';
      const hex = String(btnColor).replace('#', '');
      if (hex.length >= 6) {
        const r = parseInt(hex.substr(0, 2), 16);
        const g = parseInt(hex.substr(2, 2), 16);
        const b = parseInt(hex.substr(4, 2), 16);
        const brightness = (r * 299 + g * 587 + b * 114) / 1000;
        label.setAttribute('color', brightness > 128 ? '#111111' : '#ffffff');
      }
    }
  });
}

let midiOutput = null;
let midiOutputInitialized = false;

async function initMIDIOutput() {
  if (!navigator.requestMIDIAccess) {
    console.warn('⚠️ Web MIDI API not supported');
    return;
  }
 
  try {
    if (!midiAccess) {
     window.midiAccess = await navigator.requestMIDIAccess();
    }
   
    const outputs = midiAccess.outputs.values();
    for (let output of outputs) {
      console.log(`📤 MIDI Output: ${output.name}`);
      midiOutput = output; // Use first available output
      break;
    }
   
    if (midiOutput) {
      midiOutputInitialized = true;
      showMessage('📤 MIDI OUT READY');
    } else {
      showMessage('⚠️ NO MIDI OUT FOUND');
    }
  } catch (err) {
    console.error('❌ MIDI output init failed:', err);
  }
}

function sendMIDINote(channel, note, velocity, duration = 100) {
  if (!state.midiOutEnabled || !midiOutput) return;
 
  const noteOn = [0x90 | channel, note, velocity];
  const noteOff = [0x80 | channel, note, 0];
 
  try {
    midiOutput.send(noteOn);
    setTimeout(() => midiOutput.send(noteOff), duration);
  } catch (err) {
    console.error('MIDI send error:', err);
  }
}

function sendMIDIAllNotesOff() {
  if (!midiOutput) return;
  try {
    for (let ch = 0; ch < 16; ch++) {
      midiOutput.send([0xb0 | ch, 123, 0]);
    }
  } catch (err) {
    console.error('MIDI all-notes-off error:', err);
  }
}

function getSongLibrary() {
  try {
    const raw = localStorage.getItem('mobile5000_song_index');
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  } catch (e) {
    console.warn('Song library index parse failed', e);
    return [];
  }
}

// Combined list: Demo 1–3 first, then all library songs (Music10000 and any other saved JSON)
function getFileListForBrowser() {
  return DEMO_FILE_ENTRIES.concat(getSongLibrary());
}

function saveSongLibrary(list) {
  try {
    localStorage.setItem('mobile5000_song_index', JSON.stringify(list));
  } catch (e) {
    console.warn('Song library index save failed', e);
  }
}

function nextSongId(list) {
  let maxN = 0;
  const re = new RegExp('^' + AUTO_SONG_PREFIX + '[-_](\\d+)$', 'i');
  for (let i = 0; i < list.length; i++) {
    const m = String(list[i].id || '').match(re);
    if (m) {
      const n = parseInt(m[1], 10);
      if (!isNaN(n) && n > maxN) maxN = n;
    }
  }
  const next = maxN + 1;
  const padded = String(next).padStart(3, '0');
  return AUTO_SONG_PREFIX + '-' + padded;
}

function refreshFileBrowser() {
  const list = getFileListForBrowser();
  const maxVisible = 6;
  const baseY = 0.20;
  const stepY = 0.09;
  let offset = state.fileBrowserOffset || 0;
  let sel = state.fileBrowserSelected || 0;
  if (offset < 0) offset = 0;
  if (offset >= list.length) offset = Math.max(0, list.length - 1);
  if (sel < 0) sel = 0;
  if (sel >= maxVisible) sel = maxVisible - 1;
  state.fileBrowserOffset = offset;
  state.fileBrowserSelected = sel;

  for (let i = 0; i < maxVisible; i++) {
    const rowEl = document.getElementById('fileListRow' + i);
    if (!rowEl) continue;
    const item = list[offset + i];
    const label = item ? (item.id || 'Unnamed') : '';
    rowEl.setAttribute('value', label);
    rowEl.setAttribute('color', i === sel ? '#000000' : '#ffffff');
  }

  const hl = document.getElementById('fileListHighlight');
  if (hl) {
    const y = baseY - sel * stepY;
    hl.setAttribute('position', '0 ' + y + ' 0.01');
  }
}

function saveSongToLibrary() {
  try {
    const data = buildSongSaveData();
    const list = getSongLibrary();
    const id = nextSongId(list);
    const key = 'mobile5000_song_' + id;
    localStorage.setItem(key, JSON.stringify(data));

function applyLoadedSongData(data) {
  // 1. Stop Audio
  state.isPlaying = false;
  stopAllSources();

  // 2. FIRST - Create ALL 16 empty patterns to prevent undefined errors
  for (let i = 0; i < 16; i++) {
    patterns[i] = createEmptyPattern();
  }

  // 3. NOW load the saved patterns on top of the empty ones
  if (data.patterns && Array.isArray(data.patterns)) {
    for (let i = 0; i < Math.min(data.patterns.length, 16); i++) {
      if (data.patterns[i]) {
        const loadedPat = data.patterns[i];
        if (loadedPat.drums) patterns[i].drums = { ...patterns[i].drums, ...loadedPat.drums };
        if (loadedPat.drumVelocity) patterns[i].drumVelocity = { ...patterns[i].drumVelocity, ...loadedPat.drumVelocity };
        if (loadedPat.bass) patterns[i].bass = [...loadedPat.bass];
        if (loadedPat.lead) patterns[i].lead = [...loadedPat.lead];
        if (loadedPat.pad) patterns[i].pad = [...loadedPat.pad];
        if (loadedPat.arp) patterns[i].arp = [...loadedPat.arp];
        if (loadedPat.arpChords) patterns[i].arpChords = JSON.parse(JSON.stringify(loadedPat.arpChords));
        if (loadedPat.strings && Array.isArray(loadedPat.strings)) patterns[i].strings = [...loadedPat.strings];
        else if (!patterns[i].strings) patterns[i].strings = new Array(64).fill(false);
        if (loadedPat.mix) patterns[i].mix = JSON.parse(JSON.stringify(loadedPat.mix));
        if (loadedPat.velocity) patterns[i].velocity = { ...patterns[i].velocity, ...loadedPat.velocity };
        if (loadedPat.length) patterns[i].length = loadedPat.length;
        else patterns[i].length = 64;
      }
    }
  }

  // 4. Load State (mirrors loadFromFile)
  if (data.tempo) state.tempo = data.tempo;
  if (data.arrangement) state.songArrangement = [...data.arrangement];
  if (data.tapeState) {
    if (data.tapeState.deck1) Object.assign(tapeState.deck1, data.tapeState.deck1);
    if (data.tapeState.deck2) Object.assign(tapeState.deck2, data.tapeState.deck2);
    if (typeof data.tapeState.bounce !== 'undefined') tapeState.bounce = data.tapeState.bounce;
    if (typeof data.tapeState.seqToTape !== 'undefined') tapeState.seqToTape = data.tapeState.seqToTape;
    if (typeof data.tapeState.radio !== 'undefined') tapeState.radio = data.tapeState.radio;
    if (typeof data.tapeState.mic !== 'undefined') tapeState.mic = data.tapeState.mic;
    if (typeof data.tapeState.browser !== 'undefined' && !('mic' in data.tapeState)) tapeState.mic = false;
  }
  if (data.tapeMetadata) Object.assign(tapeMetadata, data.tapeMetadata);
  if (data.tapeRecordingData && typeof audioContext !== 'undefined' && audioContext) {
    const promises = [];
    Object.keys(data.tapeRecordingData).forEach(function(slotId) {
      const ab = decodeWavBase64ToArrayBuffer(data.tapeRecordingData[slotId]);
      if (ab) promises.push(audioContext.decodeAudioData(ab.slice(0)).then(function(buf) { tapeRecordings[slotId] = buf; }).catch(function() {}));
    });
    if (promises.length) Promise.all(promises).then(function() { if (typeof updateDeckCassetteLabel === 'function') { updateDeckCassetteLabel(1); updateDeckCassetteLabel(2); } });
  }
  if (data.trackVolumes && Array.isArray(data.trackVolumes)) {
    state.trackVolumes = data.trackVolumes.length >= 6 ? [...data.trackVolumes] : [...data.trackVolumes, 0.8, 1, 0.9, 0.9, 0.3, 0.7].slice(0, 6);
  }
  if (data.trackPans && Array.isArray(data.trackPans)) {
    state.trackPans = data.trackPans.length >= 6 ? [...data.trackPans] : [...data.trackPans, 0, 0, 0, 0, 0, 0].slice(0, 6);
  }
  if (data.drumVolumes && Array.isArray(data.drumVolumes)) state.drumVolumes = [...data.drumVolumes];
  if (data.drumPans && Array.isArray(data.drumPans)) state.drumPans = [...data.drumPans];
  if (data.trackDecay && Array.isArray(data.trackDecay)) {
    state.trackDecay = data.trackDecay.length >= 6 ? [...data.trackDecay] : [...data.trackDecay, 1, 1, 1, 1, 1, 1].slice(0, 6);
  }
  if (data.drumDecay && Array.isArray(data.drumDecay)) state.drumDecay = [...data.drumDecay];
  if (data.arp) state.arp = { ...data.arp };
  if (typeof data.drumReduceOn !== 'undefined') state.drumReduceOn = data.drumReduceOn;
  if (typeof data.chordLineArpOn !== 'undefined') state.chordLineArpOn = data.chordLineArpOn;
  if (typeof data.chordLineChordOn !== 'undefined') state.chordLineChordOn = data.chordLineChordOn;
  if (typeof data.chordLineStringsOn !== 'undefined') state.chordLineStringsOn = data.chordLineStringsOn;
  if (data.chordLineRhythmOffsets && Array.isArray(data.chordLineRhythmOffsets)) state.chordLineRhythmOffsets = data.chordLineRhythmOffsets.slice();
  if (typeof data.chordLineArpStyle === 'number') state.chordLineArpStyle = Math.max(0, Math.min(15, data.chordLineArpStyle));
  if (typeof data.chordLineChordStyle === 'number') state.chordLineChordStyle = Math.max(0, Math.min(15, data.chordLineChordStyle));
  if (typeof data.chordLineArpSubdivision === 'number') state.chordLineArpSubdivision = Math.max(0, Math.min(2, data.chordLineArpSubdivision));

function loadSongFromLibrary(id) {
  try {
    const key = 'mobile5000_song_' + id;
    const json = localStorage.getItem(key);
    if (!json) {
      showMessage('❌ NOT FOUND: ' + id);
      return;
    }
    const data = JSON.parse(json);
    applyLoadedSongData(data);
    flashFloppy('load');
    showMessage('📂 LOADED ' + id);
  } catch (e) {
    console.error('Song library load failed', e);
    showMessage('❌ LIBRARY LOAD FAILED');
  }
}

function loadSelectedSongFromBrowser() {
  const list = getFileListForBrowser();
  if (!list.length) {
    showMessage('📂 NO FILES');
    return;
  }
  const maxVisible = 8;
  let offset = state.fileBrowserOffset || 0;
  let sel = state.fileBrowserSelected || 0;
  if (sel < 0) sel = 0;
  if (sel >= maxVisible) sel = maxVisible - 1;
  const idx = offset + sel;
  const item = list[idx];
  if (!item) {
    showMessage('📂 NO SONG SELECTED');
    return;
  }
  if (item.demoNum) {
    loadDemoByNumber(item.demoNum);
    return;
  }
  loadSongFromLibrary(item.id);
}

function refreshMidiChannelPanel() {
  const map = state.midiChannelMap || {};
  const defaults = {
    kick: 10, snare: 10, hihat: 10, openhi: 10,
    bass: 2, lead: 3, pad: 4, arp: 5, strings: 6
  };
  function valFor(key) {
    const v = map[key];
    return (typeof v === 'number' && v >= 1 && v <= 16) ? v : defaults[key];
  }
  Object.keys(defaults).forEach(function (key) {
    const el = document.getElementById('midi-' + key + '-value');
    if (el) el.setAttribute('value', String(valFor(key)));
  });
}

function saveToFile() {
  console.log('💾 Starting save operation...');
 
  try {
